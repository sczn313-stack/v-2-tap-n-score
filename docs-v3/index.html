        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);

      position: absolute;
      width: 18px;

    }

<body>

<header>
  <h1>TAP-N-SCORE™</h1>
  <p>The Smart Target™ powered by SCZN3</p>
</header>

<div id="statusBar">Tap aim point</div>

<div id="app">
  <div id="targetArea">
    <button id="matrixBtn">MATRIX</button>

    <div class="bull"></div>

    <div id="matrixPanel">
      <div class="field">
        <label>Distance</label>
        <input id="distance" type="number" value="100" min="1" />
      </div>

      <div class="row">
        <div class="field">
          <label>Unit</label>
          <select id="unit">
            <option value="yd">Yards</option>
            <option value="m">Meters</option>
          </select>
        </div>

        <div class="field">
          <label>Dial</label>
          <select id="dial">
            <option value="MOA">MOA</option>
            <option value="MRAD">MRAD</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label>Click Value</label>
        <input id="click" type="number" step="0.01" value="0.25" />
      </div>

      <button id="closeMatrix" class="btn btn-primary">Apply</button>
    </div>

    <div class="chip" id="distanceChip">100 yd • MOA • 0.25</div>
  </div>

  <div class="controls">
    <button id="undoBtn" class="btn btn-ghost">Undo</button>
    <button id="resetBtn" class="btn btn-ghost">Reset</button>
    <button id="modeBtn" class="btn btn-ghost">Mode: Aim</button>
    <button id="resultsBtn" class="btn">Show Results</button>
  </div>
</div>

<script>
const state = {
  distance: 100,
  unit: "yd",
  dial: "MOA",
  click: 0.25,
  aim: null,
  shots: [],
  mode: "aim"
};

const targetArea = document.getElementById("targetArea");
const statusBar = document.getElementById("statusBar");
const matrixBtn = document.getElementById("matrixBtn");
const panel = document.getElementById("matrixPanel");
const closeBtn = document.getElementById("closeMatrix");
const undoBtn = document.getElementById("undoBtn");
const resetBtn = document.getElementById("resetBtn");
const modeBtn = document.getElementById("modeBtn");
const resultsBtn = document.getElementById("resultsBtn");

const distanceInput = document.getElementById("distance");
const unitSelect = document.getElementById("unit");
const dialSelect = document.getElementById("dial");
const clickInput = document.getElementById("click");
const chip = document.getElementById("distanceChip");

function updateChip() {
  chip.textContent = `${state.distance} ${state.unit} • ${state.dial} • ${state.click}`;
}

function updateStatus(text) {
  statusBar.textContent = text;
}

function updateModeButton() {
  modeBtn.textContent = state.mode === "aim" ? "Mode: Aim" : "Mode: Impacts";
}

function getPoint(e) {
  const rect = targetArea.getBoundingClientRect();
  return {
    x: e.clientX - rect.left,
    y: e.clientY - rect.top
  };
}

function addDot(point, type, label = "") {
  const dot = document.createElement("div");
  dot.className = `dot ${type}`;
  dot.style.left = `${point.x}px`;
  dot.style.top = `${point.y}px`;
  targetArea.appendChild(dot);

  if (label) {
    const lbl = document.createElement("div");
    lbl.className = "shotLabel";
    lbl.textContent = label;
    lbl.style.left = `${point.x}px`;
    lbl.style.top = `${point.y}px`;
    targetArea.appendChild(lbl);
  }
}

function redraw() {
  targetArea.querySelectorAll(".dot, .shotLabel").forEach(el => el.remove());

  if (state.aim) addDot(state.aim, "aim");

  state.shots.forEach((shot, i) => {
    addDot(shot, "shot", String(i + 1));
  });
}

function handleTargetTap(e) {
  if (panel.style.display === "flex") return;

  const point = getPoint(e);

  if (state.mode === "aim" || !state.aim) {
    state.aim = point;
    state.mode = "shots";
    updateStatus("Aim point set. Tap 3–5 bullet holes.");
  } else {
    if (state.shots.length >= 7) {
      updateStatus("Maximum 7 shots recorded. Show results or reset.");
      return;
    }

    state.shots.push(point);

    if (state.shots.length < 3) {
      updateStatus(`${state.shots.length} shot(s) recorded. Add at least 3.`);
    } else {
      updateStatus(`${state.shots.length} shots recorded. Ready for results.`);
    }
  }

  redraw();
  updateModeButton();
}

function undoLast() {
  if (state.shots.length > 0) {
    state.shots.pop();
    updateStatus("Last shot removed.");
  } else if (state.aim) {
    state.aim = null;
    state.mode = "aim";
    updateStatus("Aim point removed. Tap aim point.");
  }

  redraw();
  updateModeButton();
}

function resetAll() {
  state.aim = null;
  state.shots = [];
  state.mode = "aim";
  redraw();
  updateStatus("Reset. Tap aim point.");
  updateModeButton();
}

function showResults() {
  if (!state.aim) {
    updateStatus("Set aim point first.");
    return;
  }

  if (state.shots.length < 3) {
    updateStatus("Add at least 3 shots before results.");
    return;
  }

  updateStatus("Results engine next: POIB + clicks will render here.");
}

matrixBtn.onclick = () => {
  panel.style.display = "flex";
};

closeBtn.onclick = () => {
  state.distance = Number(distanceInput.value) || 100;
  state.unit = unitSelect.value;
  state.dial = dialSelect.value;
  state.click = Number(clickInput.value) || (state.dial === "MRAD" ? 0.1 : 0.25);

  updateChip();
  panel.style.display = "none";
  updateStatus(`Matrix applied: ${state.distance} ${state.unit} • ${state.dial}`);
};

dialSelect.addEventListener("change", () => {
  clickInput.value = dialSelect.value === "MRAD" ? "0.10" : "0.25";
});

targetArea.addEventListener("click", handleTargetTap);
undoBtn.addEventListener("click", undoLast);
resetBtn.addEventListener("click", resetAll);
resultsBtn.addEventListener("click", showResults);

updateChip();
updateModeButton();
</script>

</body>
</html>
