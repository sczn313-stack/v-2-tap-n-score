<!-- docs/sec.html (FULL REPLACEMENT — FIXED IMAGE RENDER) -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#06070a" />

  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <title>SEC — Tap-n-Score™</title>

  <link rel="stylesheet" href="./sec.css?v=SEC-2P-REV-FIX" />
</head>

<body>
  <main class="secPage">

    <!-- =========================
         PAGE 1 — PRECISION
    ========================== -->
    <section id="viewPrecision" class="view viewOn">

      <section class="card">
        <div class="scoreWrap">
          <div class="scoreLabel">SCORE</div>
          <div id="scoreValue" class="scoreValue">—</div>
          <div id="scoreBand" class="scoreBand">—</div>
        </div>

        <div class="clicksBig">
          <div>
            <div>WINDAGE</div>
            <div id="windageBig">—</div>
            <div id="windageDir">—</div>
          </div>

          <div>
            <div>ELEVATION</div>
            <div id="elevationBig">—</div>
            <div id="elevationDir">—</div>
          </div>
        </div>

        <div class="miniLine">
          <span id="runDistance">—</span>
          <span id="runHits">—</span>
          <span id="runTime">—</span>
        </div>

        <button id="toReportBtn"
          onclick="window.__SEC_GO_REPORT && window.__SEC_GO_REPORT()">
          Save SEC + Shooter History
        </button>

        <button id="goHomeBtn">Zero another target</button>
      </section>

    </section>

    <!-- =========================
         PAGE 2 — REPORT CARD
    ========================== -->
    <section id="viewReport" class="view">

      <section class="card">

        <div>Tap & hold image to save</div>

        <div>
          <img id="secCardImg"
               alt="SEC report card image"
               style="display:block; width:100%; max-width:420px; height:auto; min-height:560px; margin:0 auto;" />
        </div>

        <button id="backBtn">Back</button>

        <a id="vendorBtn" href="#" target="_blank">Visit Vendor</a>

        <a id="surveyBtn" href="#" target="_blank">Survey</a>

      </section>

    </section>

  </main>

  <script defer src="./sec.js?v=SEC-2P-REV-FIX"></script>
</body>
</html>
