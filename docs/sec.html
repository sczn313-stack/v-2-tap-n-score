<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>SEC</title>
  <link rel="stylesheet" href="./sec.css?v=THUMB-01" />
</head>
<body>
<main class="secPage">

<header class="secHeader">
  <div class="secMark"><span class="r">S</span><span class="w">E</span><span class="b">C</span></div>
  <div class="secTitle">Shooter Experience Card</div>
</header>

<section class="topRow">
  <div class="card">
    <div class="eyebrow">Smart Score</div>
    <div id="scoreValue" class="scoreValue">—</div>
  </div>

  <a id="vendorBtn" class="card vendorCard" href="#">
    <div class="eyebrow">Official Target Partner</div>
    <div id="vendorText" class="vendorText">Vendor</div>
  </a>
</section>

<section class="card">
  <div class="eyebrow">Correction</div>
  <div id="corrClicksInline" class="correctionInlineValue">—</div>
</section>

<section class="card">
  <div id="sessionMeta" class="metaLine">—</div>
</section>

<!-- ✅ THUMBNAIL (NEW) -->
<section id="thumbWrap" class="card thumbWrap hidden">
  <img id="thumbImg" class="thumbImg" />
</section>

<section class="card">
  <div class="historyHeader">Session History</div>
  <div id="historyGrid" class="historyGrid"></div>
</section>

<section class="compactActions">
  <a id="surveyBtn" class="miniAction">Survey</a>
  <button id="saveSecBtn" class="miniAction miniActionPrimary">Save SEC</button>
</section>

<button id="goHomeBtn" class="primaryBtn">Zero Another Target</button>

</main>

<script src="./sec.js?v=THUMB-01"></script>
</body>
</html>
