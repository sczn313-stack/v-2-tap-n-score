<!-- docs/sec.html (FULL REPLACEMENT — PERFORMANCE UPGRADE) -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#06070a" />

  <title>SEC — Tap-n-Score™</title>

  <link rel="stylesheet" href="./sec.css?v=SEC-PERF-UPGRADE-A" />
</head>

<body>
  <main class="secPage">

    <!-- =========================
         PAGE 2 — REPORT CARD
    ========================== -->
    <section id="viewReport" class="view viewOn">

      <header class="secHeader secHeaderTight">
        <div class="secHeaderTop">
          <div class="secRWB bigSEC">
            <span class="r">S</span><span class="w">E</span><span class="b">C</span>
          </div>
          <div class="secSub">Shooter Experience Card</div>
        </div>
      </header>

      <section class="card reportCard">

        <div class="saveHint">
          Tap & hold the card to save to Photos.
        </div>

        <div class="cardImgShell">
          <img id="secCardImg" />
        </div>

        <!-- 🔥 NEW PERFORMANCE PANEL -->
        <div class="perfPanel">

          <div class="perfTitle">
            PERFORMANCE TREND
          </div>

          <div class="perfStats">

            <div class="perfStat">
              <div class="perfValue">50</div>
              <div class="perfLabel">Best (Last 10)</div>
            </div>

            <div class="perfStat">
              <div class="perfValue">50.00</div>
              <div class="perfLabel">Average</div>
            </div>

          </div>

          <div class="perfListTitle">
            LAST 10 RESULTS
          </div>

          <div class="perfList">

            <div class="perfRow highlight">
              <span>01</span>
              <span>50</span>
              <span>273 yds</span>
              <span>10 hits</span>
            </div>

            <div class="perfRow">
              <span>02</span>
              <span>50</span>
              <span>273 yds</span>
              <span>10 hits</span>
            </div>

            <div class="perfRow">
              <span>03</span>
              <span>50</span>
              <span>273 yds</span>
              <span>—</span>
            </div>

          </div>

        </div>

        <!-- ACTIONS -->
        <div class="reportActions">
          <button id="backBtn" class="btnSecondary">Back</button>
          <a id="vendorBtn" class="vendorBtn">Visit Vendor</a>
          <a id="surveyBtn" class="surveyBtn">Quick Survey (30 seconds)</a>
        </div>

        <div class="reportMicro">
          Vendor link is only live here (after you complete the loop).
        </div>

      </section>

      <footer class="secFooter">
        <span class="footerMark">SCZN3</span>
      </footer>

    </section>

  </main>

  <script src="./sec.js?v=SEC-PERF-UPGRADE-A"></script>
</body>
</html>
