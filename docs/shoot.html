}

function activeMissionFamily() {
  const sessionSource = session || {};
  const matrixSource = matrix || {};
  const targetAuthority = sessionSource.targetAuthority || {};
  const targetProfileId = activeTargetProfileId();
  if (targetProfileId === "gssf_ac_1") return "gssf";
  if (isDotTortureProfileId(targetProfileId)) return "";

    sessionSource.mission_family
    || sessionSource.missionFamily
    || sessionSource.missionFamilyId
    || matrixSource.mission_family
    || matrixSource.missionFamily

function authoritativeTargetName(value) {
  const name = String(value || "").trim();
  if (!name) return "";
  if (/^(target|generic target|default target|unknown baker target)$/i.test(name)) return "";
  return name;
}

  const authorityPackage = compatibleAuthorityPackage(backendAuthorityPackage) || {};
  const authorityTarget = authorityPackage.target || authorityPackage.targetProfile || {};
  const sessionSource = session || {};
  const matrixSource = matrix || {};
  const targetAuthority = sessionSource.targetAuthority || {};
  const targetProfileId = String(
    authorityPackage.target_profile_id
    || authorityPackage.targetProfileId
    || authorityTarget.target_profile_id
    || authorityTarget.targetProfileId
    || authorityTarget.targetId
    || activeTargetProfileId()
    || ""
  ).toLowerCase();
  const staticIdentity = STATIC_TARGET_IDENTITY[targetProfileId] || {};
  const targetName = [
    authorityPackage.target_display_name,
    authorityPackage.targetDisplayName,
    authorityPackage.target_name,
    authorityPackage.targetName,
    authorityTarget.target_display_name,
    authorityTarget.targetDisplayName,
    authorityTarget.target_name,
    authorityTarget.targetName,
    sessionSource.target_display_name,
    sessionSource.targetDisplayName,
    sessionSource.target_name,
    sessionSource.targetName,
    matrixSource.target_display_name,
    matrixSource.targetDisplayName,
    matrixSource.target_name,
    matrixSource.targetName,
    targetAuthority.target_display_name,
    targetAuthority.targetDisplayName,
    targetAuthority.target_name,
    targetAuthority.targetName
  ].map(authoritativeTargetName).find(Boolean) || "";
  return {
    targetName,
    targetProfileId: targetProfileId || staticIdentity.targetProfileId || "",
    qrId: authorityPackage.qr_id || authorityPackage.qrId || sessionSource.qr_id || sessionSource.qrId || matrixSource.qr_id || matrixSource.qrId || staticIdentity.qrId || "",
    missionFamily: authorityPackage.mission_family || authorityPackage.missionFamily || authorityPackage.missionFamilyId || activeMissionFamily() || staticIdentity.missionFamily || "",
    manufacturer: authorityPackage.manufacturer || authorityTarget.manufacturer || sessionSource.manufacturer || matrixSource.manufacturer || staticIdentity.manufacturer || "",
    discipline: authorityPackage.discipline || authorityTarget.discipline || sessionSource.discipline || matrixSource.discipline || staticIdentity.discipline || ""
  };
}

}

}

  }
  if (isMissionResolutionUnavailable()) {

    };
  }
  if (isGssfAuthoritySession()) {
    return {

      title: targetName,
      meta: gssfMissionProgress(),
      status: gssfMissionStatus(),
      guidance: gssfMissionGuidance(),
      chooseLabel: "Add Target Photo",
      impactLabel: "Tap Stage Hits",
      completeLabel: "Show Results"
    };
  }
  return {
    eyebrow: "Zeroing",
    title: targetName,
    meta: zeroingMissionProgress(),
    status: zeroingMissionStatus(),
    guidance: zeroingMissionGuidance(),
    chooseLabel: "Add Target Photo",
    impactLabel: "Tap Bullet Holes",
    completeLabel: "Show Results"
  };
}

function isDotTortureAuthoritySession() {
  const missionName = activeMissionName();
  return isDotTortureProfileId(activeTargetProfileId())
    || (activeMissionFamily() === "marksmanshiptraining" && (
      missionName === "dottorture"
      || missionName === "dottorturestandard"
      || missionName === "dottorturelite"
      || missionName === "revolvingdottorture"
    ));
}

function isGssfAuthorityPackage(authorityPackage) {
  if (!authorityPackage || typeof authorityPackage !== "object") return false;
  if (authorityPackage.ok !== true || authorityPackage.status !== "calculated") return false;
  if (authorityPackage.target_profile_id !== "gssf_ac_1" || authorityPackage.mission_family !== "gssf") return false;
  if (authorityPackage.resultPackageType !== "gssfPaperPenaltyResult" || authorityPackage.resultSource !== "backend") return false;
  if (typeof authorityPackage.totalPaperPenaltySeconds !== "number" || !Number.isFinite(authorityPackage.totalPaperPenaltySeconds) || authorityPackage.totalPaperPenaltySeconds < 0) return false;
  const breakdown = authorityPackage.scoringBreakdown;
  if (!Array.isArray(breakdown) || breakdown.length !== 4) return false;
  const expectedZones = new Set(["downZero", "plusOne", "plusThree", "miss"]);
  const seenZones = new Set();
  const seenShotIds = new Set();
  for (const bucket of breakdown) {
    if (!bucket || typeof bucket !== "object" || !expectedZones.has(bucket.zone) || seenZones.has(bucket.zone)) return false;
    if (typeof bucket.count !== "number" || !Number.isFinite(bucket.count) || !Number.isInteger(bucket.count) || bucket.count < 0) return false;
    if (typeof bucket.penaltySecondsPerHit !== "number" || !Number.isFinite(bucket.penaltySecondsPerHit)) return false;
    if (typeof bucket.subtotalPenaltySeconds !== "number" || !Number.isFinite(bucket.subtotalPenaltySeconds)) return false;
    if (!Array.isArray(bucket.shotIds) || bucket.shotIds.length !== bucket.count) return false;
    for (const shotId of bucket.shotIds) {
      if (typeof shotId !== "number" || !Number.isFinite(shotId) || !Number.isInteger(shotId) || shotId < 1 || seenShotIds.has(shotId)) return false;
      seenShotIds.add(shotId);
    }
    seenZones.add(bucket.zone);
  }
  return seenZones.size === expectedZones.size;
}

function isDotTortureTrainingPackage(authorityPackage) {
  if (!authorityPackage) return false;
  const missionFamily = String(authorityPackage.mission_family || authorityPackage.missionFamily || authorityPackage.missionFamilyId || "");
  const missionName = String(authorityPackage.mission_name || authorityPackage.missionName || "");
  const missionGroup = String(authorityPackage.mission_group || authorityPackage.missionGroup || "");
  const secTemplate = String(authorityPackage.sec_template || authorityPackage.secTemplate || "");
  return missionFamily === "marksmanshipTraining"
    && secTemplate === "trainingSEC"
    && (
      missionGroup === "dotTortureFamily"
      || missionName === "dotTorture"
      || missionName === "dotTortureStandard"
      || missionName === "dotTortureLite"
      || missionName === "revolvingDotTorture"
    );
}

function isNonZeroingAuthorityPackage(authorityPackage) {

  if (isDotTortureAuthoritySession()) return "dotTortureFamily";

function authorityPackageMissionKind(authorityPackage) {
  if (!authorityPackage) return "";
  if (isDotTortureTrainingPackage(authorityPackage)) return "dotTortureFamily";
  if (isGssfAuthorityPackage(authorityPackage)) return "gssf";
  if (authorityPackage.status && authorityPackage.status.hasCorrection) return "zeroing";
  return "";
}

function authorityPackageTargetProfileId(authorityPackage) {
  return String(
    authorityPackage && (
      authorityPackage.target_profile_id
      || authorityPackage.targetProfileId
      || authorityPackage.targetId
      || ""
    )
  ).toLowerCase();
}

function isAuthorityPackageCompatibleWithActiveMission(authorityPackage) {
  const packageKind = authorityPackageMissionKind(authorityPackage);
  if (!packageKind) return false;
  const activeProfileId = activeTargetProfileId();
  const packageProfileId = authorityPackageTargetProfileId(authorityPackage);
  if (activeProfileId && packageProfileId && activeProfileId !== packageProfileId) return false;
  return packageKind === activeMissionKind();
}

function compatibleAuthorityPackage(authorityPackage) {
  return isAuthorityPackageCompatibleWithActiveMission(authorityPackage) ? authorityPackage : null;
}

function stripStaleAuthorityFields(record = {}) {
  if (!record || typeof record !== "object") return {};
  const next = { ...record };
  [
    "backendAuthorityPackage",
    "ugeoAuthorityPackage",
    "authorityPackage",
    "correctionData",
    "correctionStatus",
    "clicks",
    "poib",
    "groupCenter",
    "score",
    "scoreValue",
    "rawScore",
    "qualityPossible",
    "trainingManualResult"
  ].forEach(key => delete next[key]);
  return next;
}

function hasIncompatibleAuthorityPackage(record = {}) {
  if (!record || typeof record !== "object") return false;
  const packageToCheck = record.backendAuthorityPackage || record.ugeoAuthorityPackage || record.authorityPackage || null;
  return !!(packageToCheck && !isAuthorityPackageCompatibleWithActiveMission(packageToCheck));
}

function authoritySafeRecord(record = {}) {
  return hasIncompatibleAuthorityPackage(record) ? stripStaleAuthorityFields(record) : { ...record };
}

function clearIncompatibleAuthorityFromSession(candidate) {
  if (!candidate) return candidate;
  if (!hasIncompatibleAuthorityPackage(candidate)) return candidate;
  return {
    ...stripStaleAuthorityFields(candidate),
    matrixSnapshot: candidate.matrixSnapshot || {},
    targetAuthority: candidate.targetAuthority || {},
    shotData: {
      ...(candidate.shotData || {}),
      status: "authority-cleared-for-mission-change",
      score: null,
      scoreValue: null
    }
  };
}

function zeroingClicksFromAuthorityPackage(authorityPackage) {
  if (!authorityPackage || isNonZeroingAuthorityPackage(authorityPackage)) return null;
  const correction = authorityPackage.correction || {};
  const clicks = authorityPackage.clicks || {};
  return {
    ...clicks,
    elevation: correction.elevation,
    windage: correction.windage,
    poib: authorityPackage.poib,
    authorityPackage
  };
}

function isAuthorityPackageCalculated(authorityPackage) {
  if (!authorityPackage) return false;
  if (isDotTortureTrainingPackage(authorityPackage)) {
    return authorityPackage.ok === true && ["created", "calculated"].includes(String(authorityPackage.status || ""));
  }
  if (isGssfAuthorityPackage(authorityPackage)) {
    const classifications = backendHitClassifications(authorityPackage);
    const render = authorityPackage.renderCoordinates || {};
    const renderHits = Array.isArray(render.hits) ? render.hits : [];
    return authorityPackage.ok === true
      && authorityPackage.status === "calculated"
      && (classifications.length > 0 || renderHits.length > 0);
  }
  return !!(authorityPackage.status && authorityPackage.status.hasCorrection);
}

function parseTrainingTimeInput(value) {
  const raw = String(value || "").trim();
  if (!raw) return { ok: true, seconds: null, display: "optional/pending" };
  const clock = raw.match(/^(\d+):([0-5]\d)$/);
  if (clock) {
    const minutes = Number(clock[1]);
    const seconds = Number(clock[2]);
    return { ok: true, seconds: (minutes * 60) + seconds, display: `${minutes}:${String(seconds).padStart(2, "0")}` };
  }
  if (/^\d+(\.\d+)?$/.test(raw) && Number(raw) >= 0) {
    const seconds = Number(raw);
    return { ok: true, seconds, display: `${seconds} sec` };
  }
  return { ok: false, message: "Time must be seconds or mm:ss." };
}

function readTrainingStageScores() {
  const inputs = Array.from(document.querySelectorAll(".training-stage-score-input"));
  const hasAnyStageScore = inputs.some(input => String(input.value || "").trim() !== "");
  if (!hasAnyStageScore) return { ok: true, stageScores: null, total: null };
  const stageScores = [];
  for (const input of inputs) {
    const raw = String(input.value || "").trim();
    const label = input.dataset.stageLabel || "Stage";
    const max = Number(input.dataset.stageMax || 0);
    if (!raw) return { ok: false, message: "Enter all stage scores or use Total Score." };
    if (!/^\d+$/.test(raw)) return { ok: false, message: `${label} score must be a whole number from 0 to ${max}.` };
    const score = Number(raw);
    if (score < 0 || score > max) return { ok: false, message: `${label} score must be between 0 and ${max}.` };
    stageScores.push({
      stageIndex: Number(input.dataset.stageIndex || stageScores.length),
      label,
      score,
      max
    });
  }
  return {
    ok: true,
    stageScores,
    total: stageScores.reduce((sum, stage) => sum + stage.score, 0)
  };
}

function readTrainingManualResult({ requireScore = false } = {}) {
  const maxScore = trainingMaxScore();
  const scoreInput = document.getElementById("trainingManualScore");
  const missesInput = document.getElementById("trainingManualMisses");
  const timeInput = document.getElementById("trainingManualTime");
  const notesInput = document.getElementById("trainingManualNotes");
  const stageRead = readTrainingStageScores();
  if (!stageRead.ok) return stageRead;
  const scoreRaw = String(scoreInput ? scoreInput.value : "").trim();
  let score = stageRead.stageScores ? stageRead.total : null;
  if (score === null && !scoreRaw) {
    return requireScore
      ? { ok: false, message: `Enter a score from 0 to ${maxScore}.` }
      : { ok: true, result: null };
  }
  if (score === null) {
    if (!/^\d+$/.test(scoreRaw)) return { ok: false, message: `Score must be a whole number from 0 to ${maxScore}.` };
    score = Number(scoreRaw);
  }
  if (score < 0 || score > maxScore) return { ok: false, message: `Score must be between 0 and ${maxScore}.` };
  const missesRaw = String(missesInput ? missesInput.value : "").trim();
  let misses = null;
  if (missesRaw) {
    if (!/^\d+$/.test(missesRaw)) return { ok: false, message: "Misses must be zero or greater." };
    misses = Number(missesRaw);
  }
  const parsedTime = parseTrainingTimeInput(timeInput ? timeInput.value : "");
  if (!parsedTime.ok) return parsedTime;
  const notes = String(notesInput ? notesInput.value : "").trim();
  return {
    ok: true,
    result: {
      status: "manual",
      score,
      maxScore,
      percentage: trainingPercentage(score, maxScore),
      scoreSource: stageRead.stageScores ? "stageScores" : "totalScore",
      stageScores: stageRead.stageScores || [],
      misses,
      timeSeconds: parsedTime.seconds,
      timeDisplay: parsedTime.display,
      notes,
      source: "manual"
    }
  };
}

}

function downsizeImageDataUrl(dataUrl, maxSize = 1200) {
  return new Promise(resolve => {
    const image = new Image();
    image.onload = () => {
      const scale = Math.min(1, maxSize / Math.max(image.naturalWidth || 1, image.naturalHeight || 1));
      if (scale >= 1) {
        resolve(dataUrl);
        return;
      }
      const canvas = document.createElement("canvas");
      canvas.width = Math.max(1, Math.round(image.naturalWidth * scale));
      canvas.height = Math.max(1, Math.round(image.naturalHeight * scale));
      const context = canvas.getContext("2d");
      context.drawImage(image, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL("image/jpeg", 0.86));
    };
    image.onerror = () => resolve(dataUrl);
    image.src = dataUrl;
  });
}

  if (GSSF_CANONICAL_EXPORT_ENABLED && isGssfAuthoritySession()) {

      observationSemantics: "xPx/yPx are ordered observation locations on the exact registered canonical asset; they are not scoring coordinates.",
      authorityChain: [
        "registered_asset_observation",

      ],
      request: exactWireRequest,

    };
    window.__SCZN3_GSSF_CANONICAL_VALIDATION_EVIDENCE__ = gssfCanonicalValidationTransaction;
  }
  authorityPackage.frontendRequest = requestPayload;

}

function applyBackendAuthorityPackage(authorityPackage) {
  authorityStatusMessage = isGssfAuthoritySession() && !isGssfAuthorityPackage(authorityPackage)
    ? "GSSF result unavailable: authoritative paper-penalty seconds are missing or invalid."
    : "";
  backendAuthorityPackage = compatibleAuthorityPackage(authorityPackage);
  syncAuthorityDerivedState();
  renderTargetHeaderIdentity();
  sessionSaved = false;
}

async function resolveMissionFromTargetProfile() {
  if (!TARGET_PROFILE_LAUNCH_ID) return;
  missionResolutionStatus = "resolving";
  missionResolutionMessage = "Loading target...";
  backendAuthorityPackage = null;
  syncAuthorityDerivedState();
  renderMissionResolutionState();
  try {
    if (!session) ensureTargetSession();
    if (isGssfAuthoritySession()) {
      const evidence = installGssfCanonicalEvidence();
      missionResolutionStatus = "resolved";
      missionResolutionMessage = "";
      renderEvidencePreview(evidence);
      setMode("impact");
      renderSetupSummary();
      renderResults();
      renderMarkStatus();
      return;
    }
    const authorityPackage = await requestBackendAuthority();
    applyBackendAuthorityPackage(authorityPackage);
    if (!backendAuthorityPackage) {
      throw new Error("Backend returned incompatible mission package");
    }
    missionResolutionStatus = "resolved";
    missionResolutionMessage = "";
    renderEvidencePreview(activeEvidence());
    setMode(isGssfAuthoritySession() ? "impact" : (currentAimPoint ? "impact" : "aim"));
    renderSetupSummary();
    renderResults();
    renderMarkStatus();
  } catch (error) {
    console.warn("Mission resolution failed", error);
    backendAuthorityPackage = null;
    syncAuthorityDerivedState();
    missionResolutionStatus = "unavailable";
    missionResolutionMessage = "Unable to load this target. Try again.";
    renderMissionResolutionState();
  }
}

function displayedImageBox() {
  const surface = document.getElementById("markSurface");
  const image = surface && surface.querySelector("img");
  return SCZN3M4.UGEO.displayedImageContentBox(image, surface);
}

function evidencePointFromPointer(event) {
  const box = displayedImageBox();
  if (!box || !box.width || !box.height) return null;
  const xPercent = Math.max(0, Math.min(100, ((event.clientX - box.pageLeft) / box.width) * 100));
  const yPercent = Math.max(0, Math.min(100, ((event.clientY - box.pageTop) / box.height) * 100));
  const point = {
    xPercent: Number(xPercent.toFixed(2)),
    yPercent: Number(yPercent.toFixed(2))
  };
  if (isGssfAuthoritySession()) {
    point.xPx = Number(((xPercent / 100) * GSSF_CANONICAL_AUTHORITY.imageWidthPx).toFixed(4));
    point.yPx = Number(((yPercent / 100) * GSSF_CANONICAL_AUTHORITY.imageHeightPx).toFixed(4));
    point.shotId = currentImpactPoints.reduce((highest, impact) => Math.max(highest, Number(impact && impact.shotId) || 0), 0) + 1;
  }
  return point;
}

function storedGssfPoint(point) {
  if (!point || !Number.isInteger(point.shotId) || !Number.isFinite(point.xPx) || !Number.isFinite(point.yPx)) return null;
  return {
    shotId: point.shotId,
    xPx: point.xPx,
    yPx: point.yPx,
    xPercent: point.xPercent,
    yPercent: point.yPercent
  };
}

function columnLabel(index) {
  let value = index + 1;
  let label = "";
  while (value > 0) {
    value -= 1;
    label = String.fromCharCode(65 + (value % 26)) + label;
    value = Math.floor(value / 26);
  }
  return label;
}

function renderGridCoordinateOverlay() {
  const layer = document.getElementById("gridCoordinateLayer");
  if (!layer) return;
  if (!showGridCoordinates) {
    layer.textContent = "";
    layer.classList.remove("is-visible");
    return;
  }
  const grid = BAKER_GRID_AUDIT;
  const left = (grid.leftPx / grid.imageWidth) * 100;
  const top = (grid.topPx / grid.imageHeight) * 100;
  const width = ((grid.rightPx - grid.leftPx) / grid.imageWidth) * 100;
  const height = ((grid.bottomPx - grid.topPx) / grid.imageHeight) * 100;
  const columns = Math.round((grid.rightPx - grid.leftPx) / grid.squarePx);
  const rows = Math.round((grid.bottomPx - grid.topPx) / grid.squarePx);
  const columnLabels = Array.from({ length: columns }, (_, index) => {
    const x = left + (((index + 0.5) / columns) * width);
    return `<span class="grid-coordinate-label grid-column-label" style="left:${x}%;top:${top}%">${columnLabel(index)}</span>`;
  }).join("");
  const rowLabels = Array.from({ length: rows }, (_, index) => {
    const y = top + (((index + 0.5) / rows) * height);
    return `<span class="grid-coordinate-label grid-row-label" style="left:${left}%;top:${y}%">${index + 1}</span>`;
  }).join("");
  layer.classList.add("is-visible");
  layer.innerHTML = `
    <div class="grid-coordinate-box" style="left:${left}%;top:${top}%;width:${width}%;height:${height}%"></div>
    ${columnLabels}
    ${rowLabels}`;
}

function syncArrowLayerToMarkerLayer() {

}

function renderedPercentFromRect(childRect, parentRect) {
  if (!childRect || !parentRect || !parentRect.width || !parentRect.height) return null;
  return {
    xPercent: Number((((childRect.left + (childRect.width / 2) - parentRect.left) / parentRect.width) * 100).toFixed(2)),
    yPercent: Number((((childRect.top + (childRect.height / 2) - parentRect.top) / parentRect.height) * 100).toFixed(2))
  };
}

    });

    console.log("3. Rendered POIB marker coordinates", renderedPoib);
    console.log("4. Arrow start coordinates", arrowStart);
    console.log("5. Arrow end coordinates", arrowEnd);
    console.log("Debug dot: calculated POIB rendered center", renderedCalculatedPoibDot);
    console.log("Debug dot: arrow start rendered center", renderedArrowStartDot);

function backendRenderedHitEntries(authorityPackage) {
  const render = authorityPackage && authorityPackage.renderCoordinates ? authorityPackage.renderCoordinates : {};

function gssfZoneTone(zone) {
  const normalized = String(zone || "").trim().toLowerCase().replace(/[\s_-]+/g, "");
  if (normalized === "downzero" || normalized === "0") return "down-zero";
  if (normalized === "plusone" || normalized === "+1" || normalized === "1") return "plus-one";
  if (normalized === "plusthree" || normalized === "+3" || normalized === "3") return "plus-three";
  if (normalized === "miss") return "miss";
  return "other";
}

function gssfZoneMarkerClass(zone) {
  return `gssf-zone-${gssfZoneTone(zone)}`;
}

function gssfResultLineClass(line) {
  const label = String(line || "").split(":")[0];
  if (/^down zero$/i.test(label)) return "gssf-result-line gssf-zone-text-down-zero";
  if (/^\+1$/i.test(label)) return "gssf-result-line gssf-zone-text-plus-one";
  if (/^\+3$/i.test(label)) return "gssf-result-line gssf-zone-text-plus-three";
  if (/^miss$/i.test(label)) return "gssf-result-line gssf-zone-text-miss";
  return "gssf-result-line";
}

function isGssfBucketLine(line) {
  const label = String(line || "").split(":")[0].trim().toLowerCase();
  return label === "down zero" || label === "+1" || label === "+3" || label === "miss";
}

function gssfContextResultLines(lines) {
  return Array.isArray(lines) ? lines.filter(line => !isGssfBucketLine(line)) : [];
}

function gssfShooterResultLines(lines) {
  return gssfContextResultLines(lines).filter(line => /^paper penalty:/i.test(String(line || "").trim()));
}

function gssfFormatSeconds(value) {
  return typeof value === "number" && Number.isFinite(value) ? `${value.toFixed(2)} sec` : "unavailable";
}

function gssfPaperPenaltySeconds(authorityPackage) {
  return isGssfAuthorityPackage(authorityPackage) ? authorityPackage.totalPaperPenaltySeconds : null;
}

function gssfOfficialCompetitionResult(authorityPackage) {
  const officialMatchTimeSeconds = typeof gssfOfficialMatchTimeSeconds === "number"
    && Number.isFinite(gssfOfficialMatchTimeSeconds)
    && gssfOfficialMatchTimeSeconds >= 0
    ? gssfOfficialMatchTimeSeconds
    : null;
  const totalPaperPenaltySeconds = gssfPaperPenaltySeconds(authorityPackage);
  const officialFinalScoreSeconds = officialMatchTimeSeconds === null || totalPaperPenaltySeconds === null
    ? null
    : Number((officialMatchTimeSeconds + totalPaperPenaltySeconds).toFixed(2));
  return {
    officialMatchTimeSeconds,
    totalPaperPenaltySeconds,
    officialFinalScoreSeconds,
    finalScoreStatus: totalPaperPenaltySeconds === null
      ? "authority_unavailable"
      : (officialFinalScoreSeconds === null ? "unavailable_without_official_time" : "calculated"),
    manualTimeSource: "shooter-entered-official-timer",
    scoringSource: "backend-penalty-plus-manual-time"
  };
}

function gssfOfficialFinalScoreHtml(authorityPackage) {
  const result = gssfOfficialCompetitionResult(authorityPackage);
  const hasTimerTime = result.officialMatchTimeSeconds !== null;
  const finalText = result.finalScoreStatus === "authority_unavailable"
    ? "Authority unavailable"
    : (result.officialFinalScoreSeconds === null
      ? gssfFormatSeconds(result.totalPaperPenaltySeconds)
      : gssfFormatSeconds(result.officialFinalScoreSeconds));
  const inputValue = result.officialMatchTimeSeconds === null ? "" : Number(result.officialMatchTimeSeconds).toFixed(2);
  const officialTimeText = hasTimerTime ? gssfFormatSeconds(result.officialMatchTimeSeconds) : "Not entered";
  const paperPenaltyText = result.totalPaperPenaltySeconds === null
    ? "Authority unavailable"
    : `+${gssfFormatSeconds(result.totalPaperPenaltySeconds)}`;
  return `
    <section class="gssf-final-score-panel" aria-label="Competition paper target result">
      <span id="gssfOfficialResultLabel">${hasTimerTime ? "Final Time" : "Paper Penalty"}</span>
      <strong id="gssfOfficialFinalScore">${escapeHtml(finalText)}</strong>
      <p id="gssfOfficialResultStatus"${hasTimerTime ? " hidden" : ""}>Timer time required for Final Time</p>
      <div class="gssf-final-score-breakdown" aria-label="Score breakdown">
        <div>
          <span>Timer Time</span>
          <strong id="gssfOfficialTimeDisplay">${escapeHtml(officialTimeText)}</strong>
        </div>
        <div>
          <span>Paper Penalty</span>
          <strong>${escapeHtml(paperPenaltyText)}</strong>
        </div>
      </div>
      <small>Timer time + paper penalty = Final Time</small>
    </section>
    <label class="gssf-official-time-entry" for="gssfOfficialMatchTime">
      <span>Timer Time</span>
      <input id="gssfOfficialMatchTime" type="number" inputmode="decimal" min="0" step="0.01" placeholder="42.31" value="${escapeHtml(inputValue)}" />
      <small>Enter the official timer value from the range.</small>
      <em id="gssfOfficialTimeSource">Entered manually</em>
    </label>
  `;
}

function updateGssfOfficialFinalScoreDisplay(authorityPackage) {
  const finalScore = document.getElementById("gssfOfficialFinalScore");
  const officialTimeDisplay = document.getElementById("gssfOfficialTimeDisplay");
  const resultLabel = document.getElementById("gssfOfficialResultLabel");
  const resultStatus = document.getElementById("gssfOfficialResultStatus");
  if (!finalScore) return;
  const result = gssfOfficialCompetitionResult(authorityPackage);
  const hasTimerTime = result.officialMatchTimeSeconds !== null;
  finalScore.textContent = result.finalScoreStatus === "authority_unavailable"
    ? "Authority unavailable"
    : (result.officialFinalScoreSeconds === null
      ? gssfFormatSeconds(result.totalPaperPenaltySeconds)
      : gssfFormatSeconds(result.officialFinalScoreSeconds));
  if (resultLabel) resultLabel.textContent = hasTimerTime ? "Final Time" : "Paper Penalty";
  if (resultStatus) resultStatus.hidden = hasTimerTime;
  if (officialTimeDisplay) {
    officialTimeDisplay.textContent = hasTimerTime
      ? gssfFormatSeconds(result.officialMatchTimeSeconds)
      : "Not entered";
  }
}

function gssfBucketDefinitions() {

    { id: "plus-one", zone: "plusOne", label: "+1" },

  const breakdownByZone = new Map(authorityPackage.scoringBreakdown.map(bucket => [bucket.zone, bucket]));
  return gssfBucketDefinitions().map(bucket => ({ ...bucket, source: breakdownByZone.get(bucket.zone) }));

function renderBackendAuthorityMarkers(authorityPackage) {
  const render = authorityPackage && authorityPackage.renderCoordinates ? authorityPackage.renderCoordinates : {};
  const parts = [];
  const classifications = backendHitClassifications(authorityPackage);
  parts.push(vectorHtmlFromBackend(render.vector));
  backendRenderedHitCoordinates(authorityPackage).forEach((point, index) => {
    const hit = classifications[index] || {};
    const shotNumber = backendShotIdForHit(authorityPackage, hit, index);
    const zone = escapeHtml(hit.zone || "");
    const zoneClass = isGssfAuthorityPackage(authorityPackage) ? ` ${gssfZoneMarkerClass(hit.zone)}` : "";
    const label = shotNumber === null ? "" : String(shotNumber);
    parts.push(markerPointHtml(`target-marker impact-marker${zoneClass}`, point, label, `data-shot-index="${escapeHtml(label)}" data-backend-zone="${zone}"`));
  });
  if (render.aim) {
    parts.push(markerPointHtml("target-marker aim-marker", render.aim, "A"));
  }
  const poib = backendPoibDisplayCoordinate(authorityPackage);
  if (poib) {
    parts.push(markerPointHtml("target-marker poib-auto-marker", poib, "", 'aria-label="Point of impact"'));

function auditBackendMarkerAlignment(authorityPackage) {
  if (!authorityPackage || !authorityPackage.renderCoordinates || typeof console === "undefined") return;
  requestAnimationFrame(() => {
    const layer = document.getElementById("markerLayer");
    if (!layer) return;
    const layerRect = layer.getBoundingClientRect();
    const backendHits = backendRenderedHitCoordinates(authorityPackage);
    if (!backendHits.length) return;
    const markers = Array.from(layer.querySelectorAll(".impact-marker"));
    const mismatches = backendHits
      .map((point, index) => {
        const marker = markers[index];
        if (!marker) return { shot: index + 1, reason: "missing rendered marker", point };
        const rendered = renderedPercentFromRect(marker.getBoundingClientRect(), layerRect);
        if (!rendered) return { shot: index + 1, reason: "unreadable marker", point };
        const xDelta = Number((rendered.xPercent - point.xPercent).toFixed(2));
        const yDelta = Number((rendered.yPercent - point.yPercent).toFixed(2));
        return Math.abs(xDelta) > 0.25 || Math.abs(yDelta) > 0.25
          ? { shot: index + 1, expected: point, rendered, xDelta, yDelta }
          : null;
      })
      .filter(Boolean);
    if (mismatches.length) {
      console.warn("Backend hit marker display does not match backend render coordinates.", mismatches);
    }
  });
}

function compactClick(value, axis) {
  if (!value) return "Not calculated";
  const label = typeof value === "object" && value.label ? value.label : String(value);
  const amount = typeof value === "object" && Number.isFinite(Number(value.clicks))
    ? String(Math.abs(Number(value.clicks)))
    : (label.match(/\d+/)?.[0] || "0");
  const upper = typeof value === "object" && value.direction
    ? String(value.direction).toUpperCase()
    : label.toUpperCase();
  if (axis === "elevation") {
    if (upper.includes("UP")) return `${amount} Clicks ↑`;
    if (upper.includes("DOWN")) return `${amount} Clicks ↓`;
  }
  if (axis === "windage") {
    if (upper.includes("RIGHT")) return `${amount} Clicks →`;
    if (upper.includes("LEFT")) return `${amount} Clicks ←`;
  }
  return `${amount} Clicks`;
}

function compactClickToken(value, axis) {
  if (!value) return "--";
  const label = typeof value === "object" && value.label ? value.label : String(value);
  const amount = typeof value === "object" && Number.isFinite(Number(value.clicks))
    ? String(Math.abs(Number(value.clicks)))
    : (label.match(/\d+/)?.[0] || "0");
  const upper = typeof value === "object" && value.direction
    ? String(value.direction).toUpperCase()
    : label.toUpperCase();
  if (axis === "elevation") {
    if (upper.includes("UP")) return `${amount}↑ Clicks`;
    if (upper.includes("DOWN")) return `${amount}↓ Clicks`;
  }
  if (axis === "windage") {
    if (upper.includes("RIGHT")) return `${amount}→ Clicks`;
    if (upper.includes("LEFT")) return `${amount}← Clicks`;
  }
  return `${amount} Clicks`;
}

function scoreClass(score) {
  if (!Number.isFinite(score)) return "score-pending";
  if (score >= 90) return "score-green";
  if (score >= 80) return "score-yellow";
  if (score >= 70) return "score-orange";
  return "score-red";
}

function renderDotTortureTrainingResults(authorityPackage) {
  const grid = document.getElementById("resultsGrid");
  if (grid && !document.getElementById("dotTortureTrainingResult")) {
    grid.innerHTML = dotTortureTrainingHtml(authorityPackage);
  }
  const stages = Array.isArray(authorityPackage.stages) ? authorityPackage.stages : [];
  const hasBackendTrainingPackage = isDotTortureTrainingPackage(authorityPackage) && authorityPackage.ok === true;
  const maxIndex = Math.max(stages.length - 1, 0);
  trainingStageIndex = Math.min(Math.max(trainingStageIndex, 0), maxIndex);
  const counter = document.getElementById("trainingStageCounter");
  const guidance = document.getElementById("trainingCurrentGuidance");
  const stageLabel = document.getElementById("trainingStageLabel");
  const stageTitle = document.getElementById("trainingStageTitle");
  const stageRounds = document.getElementById("trainingStageRounds");
  const beginButton = document.getElementById("trainingBeginStage");
  const previousButton = document.getElementById("trainingPreviousStage");
  const nextButton = document.getElementById("trainingNextStage");
  const finishButton = document.getElementById("trainingFinishDrill");
  const status = document.getElementById("trainingDrillStatus");
  const secPreview = document.getElementById("trainingSecPreview");
  const savedStatus = document.getElementById("trainingSecSavedStatus");
  const manualFields = ["trainingManualScore", "trainingManualMisses", "trainingManualTime", "trainingManualNotes"]
    .map(id => document.getElementById(id))
    .filter(Boolean)
    .concat(Array.from(document.querySelectorAll(".training-stage-score-input")));
  if (counter) counter.textContent = `Stage ${trainingStageIndex + 1} of ${Math.max(stages.length, 1)}`;
  if (stageLabel) stageLabel.textContent = trainingStageLabel(authorityPackage, trainingStageIndex);
  if (stageTitle) stageTitle.textContent = `Stage ${trainingStageIndex + 1}`;
  if (stageRounds) stageRounds.textContent = String((stages[trainingStageIndex] && stages[trainingStageIndex].rounds) || "--");
  if (guidance) guidance.innerHTML = hasBackendTrainingPackage
    ? conciseTrainingInstruction(authorityPackage, trainingStageIndex)
    : "Stage guidance is loading.";
  if (beginButton) {
    beginButton.disabled = !hasBackendTrainingPackage || trainingDrillFinished;
    beginButton.textContent = trainingStageIndex >= maxIndex ? "Finish Drill" : (trainingStageIndex === 0 ? "Begin Stage" : "Next Stage");
    beginButton.onclick = () => {
      if (!hasBackendTrainingPackage || trainingDrillFinished) return;
      if (trainingStageIndex < maxIndex) {
        trainingStageIndex += 1;
        renderDotTortureTrainingResults(authorityPackage);
      } else {
        trainingDrillFinished = true;
        renderDotTortureTrainingResults(authorityPackage);
        renderMarkStatus();
      }
    };
  }
  if (previousButton) {
    previousButton.disabled = !hasBackendTrainingPackage || trainingDrillFinished || trainingStageIndex <= 0;
    previousButton.onclick = () => {
      if (trainingStageIndex > 0) {
        trainingStageIndex -= 1;
        renderDotTortureTrainingResults(authorityPackage);
      }
    };
  }
  if (nextButton) {
    nextButton.disabled = !hasBackendTrainingPackage || trainingDrillFinished || trainingStageIndex >= maxIndex;
    nextButton.classList.toggle("secondary", !hasBackendTrainingPackage || trainingDrillFinished || trainingStageIndex >= maxIndex);
    nextButton.onclick = () => {
      if (trainingStageIndex < maxIndex) {
        trainingStageIndex += 1;
        renderDotTortureTrainingResults(authorityPackage);
      }
    };
  }
  if (finishButton) {
    const finishIsPrimary = hasBackendTrainingPackage && !trainingDrillFinished && trainingStageIndex >= maxIndex;
    finishButton.disabled = !hasBackendTrainingPackage;
    finishButton.textContent = trainingDrillFinished ? "Drill Complete" : "Finish Drill";
    finishButton.classList.toggle("secondary", !finishIsPrimary);
    finishButton.onclick = () => {
      trainingDrillFinished = true;
      renderDotTortureTrainingResults(authorityPackage);
      renderMarkStatus();
    };
  }
  if (status) {
    status.textContent = !hasBackendTrainingPackage
      ? "Stage guidance required."
      : (trainingDrillFinished ? "Results ready. Save when ready." : "");
  }
  if (secPreview) secPreview.classList.toggle("is-hidden", !trainingDrillFinished);
  if (savedStatus) savedStatus.textContent = sessionSaved ? "saved" : "pending";
  manualFields.forEach(field => {
    if (!field.dataset.trainingManualBound) {
      field.addEventListener("input", updateTrainingManualPreview);
      field.dataset.trainingManualBound = "true";
    }
  });
  updateTrainingManualPreview();
  const message = document.getElementById("authorityStatusMessage");
  if (message) {
    message.innerHTML = authorityStatusMessage
      ? `<strong>${authorityStatusMessage}</strong><span class="authority-status-subtext">Your target data has not been lost.</span>`
      : "";
    message.classList.toggle("is-hidden", !authorityStatusMessage);
  }
}

function formatValidationPercent(value) {
  return Number.isFinite(Number(value)) ? `${Number(value).toFixed(2)}%` : "--";
}

function formatValidationDelta(value) {
  return Number.isFinite(Number(value)) ? `${Number(value).toFixed(2)}%` : "--";
}

function renderGssfMarkerValidation(authorityPackage) {
  const container = document.getElementById("gssfMarkerValidationRows");
  if (!container || !isGssfAuthorityPackage(authorityPackage)) return;
  requestAnimationFrame(() => {
    const layer = document.getElementById("markerLayer");
    if (!layer) {
      container.innerHTML = `<div class="gssf-marker-validation-summary is-fail">FAIL: marker layer unavailable.</div>`;
      return;
    }
    const layerRect = layer.getBoundingClientRect();
    const classifications = backendHitClassifications(authorityPackage);
    const backendHits = backendRenderedHitCoordinates(authorityPackage);
    const markers = Array.from(layer.querySelectorAll(".impact-marker"));
    const source = authorityPackage.renderCoordinates && Array.isArray(authorityPackage.renderCoordinates.hits) && authorityPackage.renderCoordinates.hits.length
      ? "renderCoordinates.hits"
      : "renderCoordinates.impacts";
    const rowCount = Math.max(classifications.length, backendHits.length);
    if (!rowCount) {
      container.innerHTML = `<div class="gssf-marker-validation-summary is-fail">FAIL: backend returned no hit render coordinates.</div>`;
      return;
    }
    const rows = Array.from({ length: rowCount }, (_, index) => {
      const hit = classifications[index] || {};
      const marker = markers[index];
      const backendPoint = backendHitCoordinateForValidation(authorityPackage, hit, index);
      const renderedPoint = marker ? renderedPercentFromRect(marker.getBoundingClientRect(), layerRect) : null;
      const backendShotId = backendShotIdForHit(authorityPackage, hit, index);
      const backendShot = backendShotId === null ? "" : String(backendShotId);
      const markerShot = marker ? String((marker.textContent || "").trim()) : "";
      const backendZone = String(hit.zone || "unclassified");
      const renderedZone = marker ? String(marker.getAttribute("data-backend-zone") || "unclassified") : "missing";
      const xDelta = renderedPoint && backendPoint ? Number((renderedPoint.xPercent - backendPoint.xPercent).toFixed(2)) : NaN;
      const yDelta = renderedPoint && backendPoint ? Number((renderedPoint.yPercent - backendPoint.yPercent).toFixed(2)) : NaN;
      const coordinatePass = Number.isFinite(xDelta) && Number.isFinite(yDelta) && Math.abs(xDelta) <= 0.25 && Math.abs(yDelta) <= 0.25;
      const orderPass = markerShot === backendShot;
      const classificationPass = renderedZone === backendZone;
      const pass = !!marker && !!backendPoint && coordinatePass && orderPass && classificationPass;
      return {
        pass,
        html: `
          <li class="${pass ? "is-pass" : "is-fail"}">
            <strong>Shot ${escapeHtml(backendShot)}: ${pass ? "PASS" : "FAIL"}</strong>
            <span>Backend x/y: ${formatValidationPercent(backendPoint && backendPoint.xPercent)} / ${formatValidationPercent(backendPoint && backendPoint.yPercent)}</span>
            <span>Marker x/y: ${formatValidationPercent(renderedPoint && renderedPoint.xPercent)} / ${formatValidationPercent(renderedPoint && renderedPoint.yPercent)}</span>
            <span>Backend classification: ${escapeHtml(backendZone)}</span>
            <span>Rendered classification: ${escapeHtml(renderedZone)}</span>
            <span>Delta: ${formatValidationDelta(xDelta)} / ${formatValidationDelta(yDelta)}</span>
            <span>Order: marker ${escapeHtml(markerShot || "missing")} vs backend ${escapeHtml(backendShot)}</span>
          </li>
        `
      };
    });
    const countPass = markers.length === backendHits.length;
    const overallPass = countPass && rows.every(row => row.pass);
    container.innerHTML = `
      <div class="gssf-marker-validation-summary ${overallPass ? "is-pass" : "is-fail"}">
        ${overallPass ? "PASS" : "FAIL"}: backend evidence rendered within 0.25%.
      </div>
      <div class="gssf-marker-validation-meta">
        <span>Source: backend ${escapeHtml(source)}</span>
        <span>Markers: ${escapeHtml(markers.length)} / Backend shots: ${escapeHtml(backendHits.length)}</span>
        <span>Frontend tap coordinates are not used after backend authority returns.</span>
      </div>
      <ol>${rows.map(row => row.html).join("")}</ol>
    `;
  });
}

function gssfShotClassificationsHtml(authorityPackage) {
  const classifications = Array.isArray(authorityPackage.hitClassifications)
    ? authorityPackage.hitClassifications
    : [];
  if (!classifications.length) {
    return `
      <details class="gssf-classification-debug">
        <summary>Backend shot classifications</summary>
        <p>No shot classifications returned yet.</p>
      </details>
    `;
  }
  const rows = classifications.map(hit => {
    const coordinate = hit.coordinate || {};
    const x = Number.isFinite(Number(coordinate.xPercent)) ? `${Number(coordinate.xPercent).toFixed(2)}%` : "--";
    const y = Number.isFinite(Number(coordinate.yPercent)) ? `${Number(coordinate.yPercent).toFixed(2)}%` : "--";
    const penalty = Number.isFinite(Number(hit.penaltySeconds)) ? `+${hit.penaltySeconds} sec` : "--";
    const zoneClass = `gssf-zone-card-${gssfZoneTone(hit.zone)}`;
    return `
      <li class="${zoneClass}">
        <strong>Shot ${escapeHtml(hit.shot || "")}</strong>
        <span>${escapeHtml(hit.zone || "unclassified")}</span>
        <em>${escapeHtml(penalty)}</em>
        <small>${escapeHtml(x)} / ${escapeHtml(y)}</small>
      </li>
    `;
  }).join("");
  return `
    <details class="gssf-classification-debug">
      <summary>Backend shot classifications</summary>
      <ol>${rows}</ol>
    </details>
  `;
}

function renderResults() {
  if (isMissionResolving() || isMissionResolutionUnavailable()) {
    renderMissionResolutionState();
    return;
  }
  syncAuthorityDerivedState();
  const impacts = currentImpactPoints;
  const numericScore = currentScore === null ? NaN : Number(currentScore);
  document.body.dataset.authorityStatus = authorityStatusMessage ? "true" : "false";
  if (isDotTortureAuthoritySession() || isDotTortureTrainingPackage(backendAuthorityPackage)) {
    renderDotTortureTrainingResults(dotTortureWorkspacePackage());
    return;
  }
  if (isGssfAuthorityPackage(backendAuthorityPackage)) {
    let resultBlock = document.getElementById("gssfAuthorityResult");
    if (!resultBlock) {
      const grid = document.getElementById("resultsGrid");
      if (grid) grid.innerHTML = targetIntelStackHtml();
      resultBlock = document.getElementById("gssfAuthorityResult");
    }
    const lines = backendAuthorityPackage.display && Array.isArray(backendAuthorityPackage.display.resultLines)
      ? backendAuthorityPackage.display.resultLines
      : [];
    if (resultBlock) {
      const mode = gssfResultDisplayMode === "developer" && TARGET_QUERY.get("gssf_display_mode") !== "developer"
        ? "validation"
        : gssfResultDisplayMode;
      const modeHtml = mode === "developer"
        ? gssfDeveloperModeHtml(backendAuthorityPackage, lines)
        : (mode === "validation"
          ? gssfValidationModeHtml(backendAuthorityPackage, lines)
          : gssfShooterModeHtml(backendAuthorityPackage, lines));
      resultBlock.innerHTML = `
        ${modeHtml}
        ${gssfModeControlsHtml(mode)}
        ${gssfCanonicalValidationExportHtml()}
      `;
      bindGssfResultModeControls();
      bindGssfOfficialTimeInput(backendAuthorityPackage);
      renderGssfMarkerValidation(backendAuthorityPackage);
    }
    const message = document.getElementById("authorityStatusMessage");
    if (message) {
      message.innerHTML = authorityStatusMessage
        ? `<strong>${authorityStatusMessage}</strong><span class="authority-status-subtext">Your target data has not been lost.</span>`
        : "";
      message.classList.toggle("is-hidden", !authorityStatusMessage);
    }
    return;
  }
  const scoreCell = document.getElementById("scoreCell");
  if (!scoreCell) return;
  scoreCell.className = `target-intel-score ${scoreClass(numericScore)}`;
  document.getElementById("scoreValue").textContent = Number.isFinite(numericScore) ? String(numericScore) : "--";
  const hitsParts = [`${impacts.length} Hits`];
  if (currentClicks) {
    hitsParts.push(compactClickToken(currentClicks.elevation, "elevation"), compactClickToken(currentClicks.windage, "windage"));
  }
  document.getElementById("hitsValue").textContent = hitsParts.join(" • ");
  const message = document.getElementById("authorityStatusMessage");
  if (message) {
    message.innerHTML = authorityStatusMessage
      ? `<strong>${authorityStatusMessage}</strong><span class="authority-status-subtext">Your target data has not been lost.</span>`
      : "";
    message.classList.toggle("is-hidden", !authorityStatusMessage);
  }
}

function shooterTipFromResults() {
  if (!currentClicks || !currentImpactPoints.length) return "Record confirmed impacts before saving.";
  if (currentImpactPoints.length < 3) return "Add more confirmed impacts for a stronger read.";
  const windage = Number(currentClicks.windageClicks || 0);
  const elevation = Number(currentClicks.elevationClicks || 0);
  const windageDirection = String(currentClicks.windageDirection || "CENTER").toLowerCase();
  const elevationDirection = String(currentClicks.elevationDirection || "CENTER").toLowerCase();
  if (windage === 0 && elevation === 0) return "Group is centered; confirm with another string.";
  if (elevation > windage) return "Apply elevation " + elevationDirection + ", then confirm.";
  if (windage > elevation) return "Apply windage " + windageDirection + ", then confirm.";
  return "Apply both corrections, then confirm.";
}

    ["chooseTargetButton", "setAimMode", "addImpactMode", "showResults", "undoImpact", "clearMarks", "saveMarks"].forEach(id => {
      const control = document.getElementById(id);
      if (control) {
        control.disabled = true;
        control.classList.remove("next-step");
      }
    });
    document.body.dataset.rangeState = isMissionResolving() ? "mission-resolving" : "mission-unavailable";
    document.body.dataset.hasEvidence = "false";
    document.body.dataset.hasResults = "false";
    document.body.dataset.targetMission = "resolving";
    return;
  }
  setMissionResolutionChrome();
  const isGssf = isGssfAuthoritySession();
  const isTraining = isDotTortureAuthoritySession();
  const hasEvidence = hasMarkableEvidence();
  const canProceed = hasEvidence || isTraining;
  updateHitCounter();
  renderMissionWorkspaceChrome();
  document.getElementById("setAimMode").disabled = !hasEvidence || isGssf || isTraining;
  document.getElementById("addImpactMode").disabled = !hasEvidence || isTraining || (!currentAimPoint && !isGssf);
  document.getElementById("undoImpact").disabled = !hasEvidence || isTraining || currentImpactPoints.length === 0;
  document.getElementById("clearMarks").disabled = !hasEvidence || isTraining || (!currentAimPoint && currentImpactPoints.length === 0);
  document.getElementById("saveMarks").disabled = !session || sessionSaved || !resultsShown || (isTraining && !trainingDrillFinished);
  document.getElementById("showResults").disabled = !canProceed || (!isTraining && currentImpactPoints.length === 0);
  let nextStep = "chooseTargetButton";
  if (canProceed && isTraining && !resultsShown) nextStep = "showResults";
  if (hasEvidence && isGssf && !currentImpactPoints.length) nextStep = "addImpactMode";
  if (hasEvidence && !isGssf && !isTraining && !currentAimPoint) nextStep = "setAimMode";
  if (hasEvidence && !isGssf && !isTraining && currentAimPoint && !currentImpactPoints.length) nextStep = "addImpactMode";
  if (hasEvidence && !isTraining && currentImpactPoints.length && !resultsShown) nextStep = "showResults";
  if (canProceed && resultsShown && (!isTraining || trainingDrillFinished)) nextStep = "saveMarks";
  if (sessionSaved) nextStep = null;
  setNextStep(nextStep);
  document.body.dataset.rangeState = rangeWorkflowState(canProceed);
  document.body.dataset.hasEvidence = hasEvidence ? "true" : "false";
  document.body.dataset.hasResults = resultsShown ? "true" : "false";
  document.body.dataset.targetMission = isTraining ? "marksmanshipTraining" : (isGssf ? "gssf" : "zeroing");
}

function setMode(mode) {
  markMode = mode;
  renderMarkStatus();
}

function handleMarkTap(event) {
  if (!hasMarkableEvidence()) return;
  if (resultsShown) return;
  syncOverlayLayerToDisplayedImage();
  const point = evidencePointFromPointer(event);
  if (!point) return;
  if (isGssfAuthoritySession()) {
    currentImpactPoints.push(point);
  } else if (markMode === "aim" || !currentAimPoint) {
    currentAimPoint = point;
    markMode = "impact";
  } else {
    currentImpactPoints.push(point);
  }
  clearCalculatedResults();
  setMode(markMode);
  renderMarkers();
  renderMarkStatus();
}

function resetMarkPointerState() {
  activeMarkPointers.clear();
  markTapCandidate = null;
  markGestureCancelled = false;
}

function handleMarkPointerDown(event) {
  if (resultsShown) return;
  if (!hasMarkableEvidence()) return;
  activeMarkPointers.add(event.pointerId);
  if (activeMarkPointers.size > 1) {
    markGestureCancelled = true;
    markTapCandidate = null;
    return;
  }
  markGestureCancelled = false;
  markTapCandidate = {
    pointerId: event.pointerId,
    pointerType: event.pointerType,
    clientX: event.clientX,
    clientY: event.clientY
  };
}

function handleMarkPointerUp(event) {
  const wasOnlyPointer = activeMarkPointers.size === 1 && activeMarkPointers.has(event.pointerId);
  activeMarkPointers.delete(event.pointerId);
  if (resultsShown || !hasMarkableEvidence()) {
    resetMarkPointerState();
    return;
  }
  if (!wasOnlyPointer || markGestureCancelled || !markTapCandidate || markTapCandidate.pointerId !== event.pointerId) {
    if (!activeMarkPointers.size) resetMarkPointerState();
    return;
  }
  const moveDistance = Math.hypot(event.clientX - markTapCandidate.clientX, event.clientY - markTapCandidate.clientY);
  const maxTapMove = markTapCandidate.pointerType === "touch" ? 12 : 6;
  if (moveDistance <= maxTapMove) handleMarkTap(event);
  resetMarkPointerState();
}

function handleMarkPointerCancel(event) {
  activeMarkPointers.delete(event.pointerId);
  if (!activeMarkPointers.size) resetMarkPointerState();
}

function handleMarkTouchMove(event) {
  if (resultsShown || !hasMarkableEvidence()) return;
  if (event.touches && event.touches.length === 1) event.preventDefault();
}

if (TARGET_PROFILE_LAUNCH_ID) {
  renderMissionResolutionState();
} else {
  renderEvidencePreview(session && session.targetEvidenceImage);
}

document.getElementById("chooseTargetButton").addEventListener("click", () => {
  if (isGssfAuthoritySession()) return;
  ensureTargetSession();
  const input = document.getElementById("targetImageInput");
  input.value = "";
});
document.getElementById("chooseTargetButton").addEventListener("keydown", event => {
  if (event.key === "Enter" || event.key === " ") {
    event.preventDefault();
    event.currentTarget.click();
  }
});

document.getElementById("targetImageInput").addEventListener("change", event => {
  if (isGssfAuthoritySession()) return;
  ensureTargetSession();
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  readFileAsDataUrl(file).then(dataUrl => downsizeImageDataUrl(dataUrl)).then(dataUrl => {
    currentAimPoint = null;
    currentImpactPoints = [];
    sessionSaved = false;
    unlockDistanceForNewTarget();
    if (isDotTortureAuthoritySession()) {
      currentClicks = null;
      currentScore = null;
      authorityStatusMessage = "";
      hideShooterTip();
    } else {
      clearCalculatedResults();
    }
    pendingEvidence = {
      dataUrl,
      name: file.name,
      type: file.type,
      size: dataUrl.length,
      originalSize: file.size
    };
    renderEvidencePreview(pendingEvidence);
    setMode(isGssfAuthoritySession() ? "impact" : "aim");
    renderMarkStatus();
  }).catch(error => {
    console.warn("Target image read failed", error);
  });
});

document.getElementById("showGridCoordinates").addEventListener("change", event => {
  showGridCoordinates = event.target.checked;
  syncOverlayLayerToDisplayedImage();
  renderGridCoordinateOverlay();
});

document.getElementById("setAimMode").addEventListener("click", () => setMode("aim"));
document.getElementById("addImpactMode").addEventListener("click", () => {
  if (currentAimPoint || isGssfAuthoritySession()) setMode("impact");
});
document.getElementById("undoImpact").addEventListener("click", () => {
  currentImpactPoints.pop();
  clearCalculatedResults();
  renderMarkers();
  renderMarkStatus();
});
document.getElementById("clearMarks").addEventListener("click", () => {
  currentAimPoint = null;
  currentImpactPoints = [];
  clearCalculatedResults();
  SCZN3M4.updateActiveSession({
    aimPoint: null,
    impactPoints: [],
    backendAuthorityPackage: null,
    ugeoAuthorityPackage: null,
    poib: null,
    groupCenter: null,
    clicks: null,
    score: null,
    rawScore: null,
    qualityPossible: null,
    hits: 0,
    shotCount: 0,
    correctionStatus: "not-calculated",
    shotData: { shotCount: 0, hits: 0, score: null, status: "marks-cleared" },
    correctionData: { status: "not-calculated", clicks: null, windage: null, elevation: null }
  });
  setMode("aim");
  renderMarkers();
  renderMarkStatus();
});
document.getElementById("showResults").addEventListener("click", async () => {
  if ((!isGssfAuthoritySession() && !isDotTortureAuthoritySession() && !currentAimPoint) || (!isDotTortureAuthoritySession() && !currentImpactPoints.length)) return;
  if (isDotTortureAuthoritySession() && !session) ensureTargetSession();
  authorityStatusMessage = "";
  renderResults();
  try {
    const authorityPackage = await requestBackendAuthority();
    applyBackendAuthorityPackage(authorityPackage);
    try {
      if (window.SCZN3Ops) window.SCZN3Ops.recordShowResults(authorityPackage);
    } catch (error) {}
    renderMarkers();
    renderResults();
    if (resultsShown && !isNonZeroingAuthorityPackage(authorityPackage)) showShooterTip();
    if (resultsShown && isNonZeroingAuthorityPackage(authorityPackage)) hideShooterTip();
  } catch (error) {
    console.warn("Backend authority request failed", error);
    currentClicks = null;
    currentScore = null;
    backendAuthorityPackage = null;
    resultsShown = false;
    authorityStatusMessage = "Scoring service unavailable. Please try again.";
    renderResults();
  }
  renderMarkStatus();
});
document.getElementById("saveMarks").addEventListener("click", () => {
  if (!session || !backendAuthorityPackage) return;
  let saved = null;
  if (pendingEvidence) {
    saved = SCZN3M4.saveTargetEvidenceImage(pendingEvidence);
    pendingEvidence = null;
  }
  lockDistanceForSession();
  const savedTimestamp = new Date().toISOString();
  let authorityPackage = backendAuthorityPackage;
  let trainingManualResult = null;
  if (isDotTortureTrainingPackage(authorityPackage)) {
    const manualRead = readTrainingManualResult({ requireScore: true });
    if (!manualRead.ok) {
      trainingDrillFinished = true;
      renderResults();
      showTrainingManualError(manualRead.message);
      return;
    }
    trainingManualResult = {
      ...manualRead.result,
      savedAt: savedTimestamp
    };
    authorityPackage = authorityPackageWithTrainingManualResult(authorityPackage, trainingManualResult, true);
    backendAuthorityPackage = authorityPackage;
  }
  const authorityClicks = zeroingClicksFromAuthorityPackage(authorityPackage);
  const gssfOfficialResult = isGssfAuthorityPackage(authorityPackage)
    ? gssfOfficialCompetitionResult(authorityPackage)
    : null;
  const hadSavedHistoryBefore = (SCZN3M4.getSessionHistory ? SCZN3M4.getSessionHistory() : [])
    .some(historySession => historySession && historySession.savedToSEC === true && historySession.sessionId !== session.sessionId);
  const savePatch = isGssfAuthorityPackage(authorityPackage) ? {
    aimPoint: null,
    impactPoints: currentImpactPoints.map(storedGssfPoint).filter(Boolean),
    backendAuthorityPackage: authorityPackage,
    ugeoAuthorityPackage: null,
    authorityPackage,
    score: null,
    scoreValue: null,
    poib: null,
    groupCenter: null,
    clicks: null,
    correctionData: {
      status: "not-applicable",
      clicks: null,
      correction: null,
      moa: null,
      vectors: null
    },
    shotData: {
      status: "backend-gssf-authority-calculated",
      impactPoints: currentImpactPoints.map(storedGssfPoint).filter(Boolean),
      shotCount: currentImpactPoints.length,
      hits: currentImpactPoints.length,
      hitClassifications: authorityPackage.hitClassifications || [],
      counts: authorityPackage.counts || {},
      downZeroCount: authorityPackage.downZeroCount,
      plusOneCount: authorityPackage.plusOneCount,
      plusThreeCount: authorityPackage.plusThreeCount,
      missCount: authorityPackage.missCount,
      totalPaperPenaltySeconds: authorityPackage.totalPaperPenaltySeconds,
      finalTimeSeconds: authorityPackage.finalTimeSeconds,
      finalTimeStatus: authorityPackage.finalTimeStatus,
      officialMatchTimeSeconds: gssfOfficialResult.officialMatchTimeSeconds,
      officialFinalScoreSeconds: gssfOfficialResult.officialFinalScoreSeconds,
      officialFinalScoreStatus: gssfOfficialResult.finalScoreStatus,
      manualTimeSource: gssfOfficialResult.manualTimeSource,
      authoritySource: "backend"
    },
    officialMatchTimeSeconds: gssfOfficialResult.officialMatchTimeSeconds,
    gssfOfficialMatchTimeSeconds: gssfOfficialResult.officialMatchTimeSeconds,
    totalPaperPenaltySeconds: gssfOfficialResult.totalPaperPenaltySeconds,
    officialFinalScoreSeconds: gssfOfficialResult.officialFinalScoreSeconds,
    officialFinalScoreStatus: gssfOfficialResult.finalScoreStatus,
    gssfManualTimeSource: gssfOfficialResult.manualTimeSource,
    gssfScoringSource: gssfOfficialResult.scoringSource,
    hits: currentImpactPoints.length,
    shotCount: currentImpactPoints.length,
    correctionStatus: "not-applicable",
    savedToSEC: true,
    targetDistance: targetDistanceValue(),
    targetDistanceValue: selectedDistanceValue,
    targetDistanceUnit: selectedDistanceUnit,
    targetDistanceLocked: true,
    distance: targetDistanceValue(),
    timestamp: savedTimestamp,
    savedAt: savedTimestamp
  } : isDotTortureTrainingPackage(authorityPackage) ? {
    backendAuthorityPackage: authorityPackage,
    ugeoAuthorityPackage: authorityPackage,
    trainingManualResult,
    score: authorityPackage.score || null,
    scoreValue: trainingManualResult ? trainingManualResult.score : null,
    shotData: {
      status: "training-manual",
      score: authorityPackage.score || null,
      scoreValue: trainingManualResult ? trainingManualResult.score : null,
      authoritySource: "backend",
      manualSource: "shooter-entry"
    },
    hits: 0,
    shotCount: 0,
    correctionStatus: "not-applicable",
    savedToSEC: true,
    targetDistance: targetDistanceValue(),
    targetDistanceValue: selectedDistanceValue,
    targetDistanceUnit: selectedDistanceUnit,
    targetDistanceLocked: true,
    distance: targetDistanceValue(),
    timestamp: savedTimestamp,
    savedAt: savedTimestamp
  } : {
    aimPoint: safePoint(currentAimPoint),
    impactPoints: currentImpactPoints.map(safePoint).filter(Boolean),
    backendAuthorityPackage: authorityPackage,
    ugeoAuthorityPackage: authorityPackage,
    score: authorityPackage.score || null,
    scoreValue: backendScoreValue(authorityPackage),
    poib: authorityPackage.poib || null,
    groupCenter: authorityPackage.groupCenter || null,
    clicks: authorityClicks,
    correctionData: {
      status: authorityPackage.status && authorityPackage.status.hasCorrection ? "backend-authority-calculated" : "not-calculated",
      clicks: authorityClicks,
      correction: authorityPackage.correction || null,
      moa: authorityPackage.moa || null,
      vectors: authorityPackage.vectors || null
    },
    shotData: {
      aimPoint: safePoint(currentAimPoint),
      impactPoints: currentImpactPoints.map(safePoint).filter(Boolean),
      shotCount: currentImpactPoints.length,
      hits: currentImpactPoints.length,
      poib: authorityPackage.poib || null,
      groupCenter: authorityPackage.groupCenter || null,
      score: authorityPackage.score || null,
      scoreValue: backendScoreValue(authorityPackage),
      authoritySource: "backend"
    },
    hits: currentImpactPoints.length,
    shotCount: currentImpactPoints.length,
    correctionStatus: "backend-authority-calculated",
    savedToSEC: true,
    targetDistance: targetDistanceValue(),
    targetDistanceValue: selectedDistanceValue,
    targetDistanceUnit: selectedDistanceUnit,
    targetDistanceLocked: true,
    distance: targetDistanceValue(),
    timestamp: savedTimestamp,
    savedAt: savedTimestamp
  };
  saved = SCZN3M4.updateActiveSession(savePatch);
  if (saved && saved.targetEvidenceImage) {
    renderEvidencePreview(saved.targetEvidenceImage);
  }
  try {
    if (window.SCZN3Ops) window.SCZN3Ops.recordSessionSaved(saved, { hadSavedHistoryBefore });
  } catch (error) {}
  sessionSaved = true;
  renderMarkStatus();
  renderResults();
  if (saved) window.location.href = "records.html";
});

window.addEventListener("resize", () => {
  syncOverlayLayerToDisplayedImage();
  renderMarkers();
});

if (TARGET_PROFILE_LAUNCH_ID) {
  resolveMissionFromTargetProfile();
} else {
  setMode(isGssfAuthoritySession() ? "impact" : (currentAimPoint ? "impact" : "aim"));
  renderSetupSummary();
  renderResults();
}
</script>
</body>
</html>
