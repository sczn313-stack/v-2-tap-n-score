<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="sczn3-authority-endpoint" content="https://sczn3-authority.onrender.com/api/authority/ugeo/" />
<title>Target</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<main class="shell">
  <header class="m4-header">
    <div class="vendor-slot">
      <img src="assets/BAKER_ST_100YD_SMART_AUTHORITY_v1_ORIGINAL.png" alt="Baker 100 Yard Smart Target thumbnail" />
      <div class="brand-lockup">
        <span class="kicker">Target</span>
        <a class="vendor-name" href="index.html">Baker Smart Targets</a>
      </div>
    </div>
    <button class="mobile-menu-toggle" type="button" aria-label="Open navigation menu" aria-expanded="false">☰</button>
    <nav class="locked-nav" aria-label="Baker workflow navigation">
      <a class="locked-nav-item" href="index.html"><span class="nav-dot"></span><span>🏠 Home</span></a>
      <a class="locked-nav-item" href="matrix.html"><span class="nav-dot"></span><span>Weapon Setup</span></a>
      <a class="locked-nav-item is-active" href="shoot.html"><span class="nav-dot"></span><span class="target-nav-icon" aria-hidden="true"></span><span>Target</span></a>
      <a class="locked-nav-item" href="records.html"><span class="nav-dot"></span><span>SEC</span></a>
    </nav>
  </header>
  <section class="active-session-bar" id="activeSessionBar"></section>
  <section class="shoot-workflow">
    <div class="panel">
      <h1 class="target-work-heading"><span>🎯</span><span class="nav-separator">|</span><span>Target</span><span class="shooter-tip is-hidden" id="shooterTip"><span class="nav-separator">|</span><span class="tip-label">Tip:</span><span id="shooterTipText"></span></span></h1>
      <section class="upload-panel" aria-label="Upload or capture target evidence">
        <div class="workflow-control-row" aria-label="SCZN3 shooting workflow controls">
          <label class="button neon-file-button next-step" id="chooseTargetButton" for="targetImageInput" role="button" tabindex="0">Choose Target</label>
          <input class="visually-hidden-file" id="targetImageInput" type="file" accept="image/*" />
          <button class="button" type="button" id="setAimMode">Tap Aim Point</button>
          <button class="button" type="button" id="addImpactMode">Tap Bullet Holes</button>
          <button class="button" type="button" id="showResults">Show Results</button>
          <button class="button" type="button" id="undoImpact">Undo</button>
          <button class="button" type="button" id="clearMarks">Clear</button>
          <button class="button" type="button" id="saveMarks">Save Session</button>
        </div>
        <div class="shooter-step-prompt is-hidden" id="shooterStepPrompt" aria-live="polite"></div>
        <div class="evidence-preview evidence-workspace" id="targetEvidencePreview">
          <div class="evidence-meta evidence-status-stack">
            <div class="target-intel-stack" id="resultsGrid"></div>
            <strong>No target evidence uploaded</strong>
            <span>Choose Target to begin</span>
          </div>
        </div>
      </section>
    </div>
  </section>
</main>
<script src="app_state.js"></script>
<script>
let session = SCZN3M4.read(SCZN3M4.KEYS.activeSession, null);

function isFinalizedSession(candidate) {
  return !!(candidate && (candidate.savedToSEC === true || candidate.targetDistanceLocked === true || candidate.savedAt));
}

if (isFinalizedSession(session)) {
  session = null;
}

if (!session && SCZN3M4.getActiveMatrix()) {
  session = SCZN3M4.createSession(SCZN3M4.getActiveMatrix());
}
let matrix = session && session.matrixSnapshot ? session.matrixSnapshot : SCZN3M4.getActiveMatrix();
function configuredAuthorityEndpoint() {
  const metaEndpoint = document.querySelector('meta[name="sczn3-authority-endpoint"]')?.content;
  const storedEndpoint = (() => {
    try {
      return localStorage.getItem("SCZN3_BACKEND_AUTHORITY_ENDPOINT");
    } catch (_error) {
      return "";
    }
  })();
  const explicitEndpoint = window.SCZN3_BACKEND_AUTHORITY_ENDPOINT || metaEndpoint || storedEndpoint;
  if (explicitEndpoint) return explicitEndpoint;
  if (["localhost", "127.0.0.1", "::1"].includes(window.location.hostname)) {
    return "http://127.0.0.1:8098/api/authority/ugeo";
  }
  return "";
}
const BACKEND_AUTHORITY_ENDPOINT = configuredAuthorityEndpoint();
let pendingEvidence = null;
let displayedEvidence = null;
let backendAuthorityPackage = session && (session.backendAuthorityPackage || session.ugeoAuthorityPackage)
  ? (session.backendAuthorityPackage || session.ugeoAuthorityPackage)
  : null;
let markMode = "aim";
let currentAimPoint = session && session.aimPoint ? session.aimPoint : null;
let currentImpactPoints = session && Array.isArray(session.impactPoints) ? [...session.impactPoints] : [];
function backendScoreValue(authorityPackage) {
  const score = authorityPackage && authorityPackage.score;
  const value = score && typeof score === "object" ? score.value : score;
  return Number.isFinite(Number(value)) ? Number(value) : null;
}
let currentClicks = backendAuthorityPackage ? {
  ...(backendAuthorityPackage.clicks || {}),
  elevation: backendAuthorityPackage.correction && backendAuthorityPackage.correction.elevation,
  windage: backendAuthorityPackage.correction && backendAuthorityPackage.correction.windage,
  poib: backendAuthorityPackage.poib,
  authorityPackage: backendAuthorityPackage
} : null;
let currentScore = backendScoreValue(backendAuthorityPackage);
let resultsShown = !!(backendAuthorityPackage && backendAuthorityPackage.status && backendAuthorityPackage.status.hasCorrection);
let authorityRequestInFlight = false;
let authorityStatusMessage = "";
let sessionSaved = false;
const savedDistance = session && (session.targetDistanceValue || session.targetDistance || session.distance || session.matrixSnapshot?.targetDistance || session.matrixSnapshot?.distance);
let selectedDistanceUnit = (session && (session.targetDistanceUnit || session.matrixSnapshot?.targetDistanceUnit)) || (/m(eters?)?$/i.test(String(savedDistance || "")) ? "M" : "YDS");
let selectedDistanceValue = parseDistanceValue(savedDistance) || "100";
let distanceLocked = !!(session && session.targetDistanceLocked);
const BAKER_GRID_AUDIT = {
  imageWidth: 1102,
  imageHeight: 1713,
  leftPx: 68,
  topPx: 282,
  rightPx: 1047,
  bottomPx: 1652,
  squarePx: 49
};
const MARK_TAP_MOVE_THRESHOLD_PX = 8;
let markPointerCandidate = null;

function currentSetupName() {
  return matrix ? [matrix.weaponCategory, matrix.weaponManufacturer, matrix.weaponModelType, matrix.weaponModelCaliber].filter(Boolean).join(" / ") : "Create setup in Weapon Setup";
}

function renderActiveSessionBar() {
  const bar = document.getElementById("activeSessionBar");
  bar.innerHTML = session
    ? `<strong>${currentSetupName()}</strong><span></span>`
    : `<strong>No Active Session</strong><span>Create one in Weapon Setup</span>`;
  bar.classList.toggle("target-loaded-collapse", !!displayedEvidence);
}

function defaultTargetMatrix() {
  return {
    weaponCategory: "Rifle",
    weaponManufacturer: "Baker",
    weaponModelType: "Smart Target",
    weaponModelCaliber: "Baker 100 Yard Smart Target",
    opticType: "Iron Sights",
    ammoLoad: "--",
    targetDistance: "100 yds",
    targetDistanceValue: "100",
    targetDistanceUnit: "YDS"
  };
}

function ensureTargetSession() {
  if (session) return session;
  matrix = SCZN3M4.getActiveMatrix() || SCZN3M4.saveMatrixSnapshot(defaultTargetMatrix());
  session = SCZN3M4.createSession(matrix);
  renderActiveSessionBar();
  return session;
}

renderActiveSessionBar();

function cleanSetupValue(value) {
  return /^(Select Manufacturer|Select Model Type|Select Model Caliber|Select Caliber|Select Load|Select Grain)$/i.test(value || "") ? "" : value;
}

function setupLine(label, value) {
  return `<div class="metric"><span>${label}</span><strong>${value || "--"}</strong></div>`;
}

function renderSetupSummary() {
  const setupSummaryGrid = document.getElementById("setupSummaryGrid");
  if (!setupSummaryGrid) return;
  const source = matrix || {};
  const weapon = [source.weaponCategory, source.weaponManufacturer, source.weaponModelType, source.weaponModelCaliber]
    .map(cleanSetupValue)
    .filter(Boolean)
    .join(" / ");
  const optic = [source.opticType, source.opticBrand, source.opticModel, source.magnification]
    .map(cleanSetupValue)
    .filter(Boolean)
    .join(" / ");
  const adjustment = [source.opticAdjustmentUnit, source.opticClickValueLabel]
    .map(cleanSetupValue)
    .filter(Boolean)
    .join(" / ");
  const ammo = [source.ammoCaliber, source.ammoManufacturer, source.ammoLoad, source.bulletWeight]
    .map(cleanSetupValue)
    .filter(Boolean)
    .join(" / ");
  setupSummaryGrid.innerHTML = [
    setupLine("Weapon", weapon || source.rifle),
    setupLine("Optic", optic),
    setupLine("Adjustment", adjustment),
    setupLine("Ammunition", ammo)
  ].join("");
}

function targetDistanceValue() {
  syncDistanceFromControls();
  return formatDistanceDisplay();
}

function parseDistanceValue(value) {
  const match = String(value || "").match(/\d+/);
  return match ? match[0] : "";
}

function distanceUnitLabel() {
  return selectedDistanceUnit === "M" ? "m" : "yds";
}

function formatDistanceDisplay() {
  return `${selectedDistanceValue || "100"} ${distanceUnitLabel()}`;
}

function distanceOptions() {
  return ["25", "50", "75", "100", "150", "175", "200", "250", "300", "400", "500", "Other"]
    .map(value => `<option${value === selectedDistanceValue || (value === "Other" && !["25", "50", "75", "100", "150", "175", "200", "250", "300", "400", "500"].includes(selectedDistanceValue)) ? " selected" : ""}>${value}</option>`)
    .join("");
}

function targetIntelStackHtml() {
  return `
    <div class="target-intel-distance" aria-label="Distance">
      <strong id="distanceDisplay">${formatDistanceDisplay()}</strong>
      <div class="unit-toggle target-distance-unit-toggle" role="group" aria-label="Distance units">
        <button class="unit-button${selectedDistanceUnit === "YDS" ? " is-active" : ""}" type="button" data-target-distance-unit="YDS"${distanceLocked ? " disabled" : ""}>YDS</button>
        <button class="unit-button${selectedDistanceUnit === "M" ? " is-active" : ""}" type="button" data-target-distance-unit="M"${distanceLocked ? " disabled" : ""}>M</button>
      </div>
      <select id="targetDistance"${distanceLocked ? " disabled" : ""}>${distanceOptions()}</select>
      <input class="distance-other-input${isPresetDistance(selectedDistanceValue) ? " is-hidden" : ""}" id="targetDistanceOther" inputmode="numeric" pattern="[0-9]*" placeholder="" value="${isPresetDistance(selectedDistanceValue) ? "" : selectedDistanceValue}"${distanceLocked ? " disabled" : ""} />
    </div>
    <div class="target-intel-score score-pending" id="scoreCell"><span class="target-score-label">Your Score</span><strong id="scoreValue">--</strong></div>
    <div class="target-intel-item"><strong id="elevationValue">--</strong></div>
    <div class="target-intel-item"><strong id="windageValue">--</strong></div>
    <div class="target-intel-item"><strong id="hitsValue">0 Hits</strong></div>
    <div class="authority-status-message is-hidden" id="authorityStatusMessage" role="status" aria-live="polite"></div>
    ${guidanceCardHtml()}
  `;
}

function isPresetDistance(value) {
  return ["25", "50", "75", "100", "150", "175", "200", "250", "300", "400", "500"].includes(String(value || ""));
}

function guidanceCardHtml() {
  const presets = [100, 150, 200, 250, 300, 400, 500]
    .map(distance => `<div>25m → ${distance}m ↑ X Clicks</div>`)
    .join("");
  return `
    <details class="guidance-card" open>
      <summary>Clicks to Next Distance</summary>
      <div class="guidance-list">${presets}</div>
      <details class="custom-distance-card">
        <summary>Custom Distance</summary>
        <label>Current Zero<input id="currentZeroDistance" inputmode="decimal" placeholder="" /></label>
        <label>Desired Distance<input id="desiredZeroDistance" inputmode="decimal" placeholder="" /></label>
        <div class="unit-toggle" role="group" aria-label="Distance units">
          <button class="unit-button is-active" type="button" data-distance-unit="YDS">YDS</button>
          <button class="unit-button" type="button" data-distance-unit="M">M</button>
        </div>
        <button class="button guidance-calc-button" type="button" id="calculateDistanceClicks">Calculate</button>
        <div class="guidance-result" id="guidanceResult">Result:</div>
      </details>
    </details>
  `;
}

function bindDistanceControl() {
  const distanceInput = document.getElementById("targetDistance");
  if (!distanceInput) return;
  const otherInput = document.getElementById("targetDistanceOther");
  distanceInput.addEventListener("change", () => {
    if (distanceLocked) return;
    if (distanceInput.value === "Other") {
      selectedDistanceValue = "";
      otherInput.classList.remove("is-hidden");
      otherInput.value = "";
      otherInput.focus();
    } else {
      selectedDistanceValue = distanceInput.value;
      otherInput.classList.add("is-hidden");
      otherInput.value = "";
    }
    updateDistanceDisplay();
  });
  if (otherInput) {
    otherInput.addEventListener("input", () => {
      otherInput.value = otherInput.value.replace(/\D/g, "");
      selectedDistanceValue = otherInput.value;
      updateDistanceDisplay();
    });
  }
  document.querySelectorAll("[data-target-distance-unit]").forEach(button => {
    button.addEventListener("click", () => {
      if (distanceLocked) return;
      selectedDistanceUnit = button.dataset.targetDistanceUnit;
      document.querySelectorAll("[data-target-distance-unit]").forEach(item => item.classList.toggle("is-active", item === button));
      updateDistanceDisplay();
    });
  });
  updateDistanceDisplay();
}

function syncDistanceFromControls() {
  const distanceInput = document.getElementById("targetDistance");
  const otherInput = document.getElementById("targetDistanceOther");
  if (!distanceInput) return;
  selectedDistanceValue = distanceInput.value === "Other" ? (otherInput.value || "100") : distanceInput.value;
}

function updateDistanceDisplay() {
  const display = document.getElementById("distanceDisplay");
  const chip = document.getElementById("mobileDistanceChip");
  if (display) display.textContent = formatDistanceDisplay();
  if (chip) chip.textContent = formatDistanceDisplay();
}

function unlockDistanceForNewTarget() {
  distanceLocked = false;
}

function lockDistanceForSession() {
  syncDistanceFromControls();
  if (!selectedDistanceValue) selectedDistanceValue = "100";
  distanceLocked = true;
}

function bindGuidanceCard() {
  let selectedUnit = "YDS";
  document.querySelectorAll("[data-distance-unit]").forEach(button => {
    button.addEventListener("click", () => {
      selectedUnit = button.dataset.distanceUnit;
      document.querySelectorAll("[data-distance-unit]").forEach(item => item.classList.toggle("is-active", item === button));
    });
  });
  const calculateButton = document.getElementById("calculateDistanceClicks");
  if (!calculateButton) return;
  calculateButton.addEventListener("click", () => {
    const current = Number(document.getElementById("currentZeroDistance").value);
    const desired = Number(document.getElementById("desiredZeroDistance").value);
    const result = document.getElementById("guidanceResult");
    if (!Number.isFinite(current) || !Number.isFinite(desired)) {
      result.textContent = "Result:";
      return;
    }
    // Non-authoritative distance guidance placeholder; backend owns click calculations.
    result.textContent = "Backend authority required";
    result.dataset.unit = selectedUnit;
  });
}

function renderEvidencePreview(image) {
  const preview = document.getElementById("targetEvidencePreview");
  const evidence = image && image.dataUrl ? image : null;
  displayedEvidence = evidence;
  if (!evidence) {
    preview.innerHTML = `
      <div class="evidence-meta evidence-status-stack empty-target-start">
        <strong>Choose Target Photo To Begin</strong>
      </div>
    `;
    renderMarkStatus();
    return;
  }
  preview.innerHTML = `
    <div class="mark-surface" id="markSurface">
      <img src="${evidence.dataUrl}" alt="Uploaded target evidence preview" />
      <div class="mobile-distance-chip" id="mobileDistanceChip">${formatDistanceDisplay()}</div>
      <div class="marker-layer" id="markerLayer"></div>
    </div>
    <div class="evidence-meta evidence-status-stack"><div class="target-intel-stack" id="resultsGrid">${targetIntelStackHtml()}</div></div>
  `;
  bindDistanceControl();
  bindGuidanceCard();
  const markSurface = document.getElementById("markSurface");
  const targetImage = markSurface.querySelector("img");
  if (targetImage.complete) {
    requestAnimationFrame(() => {
      syncOverlayLayerToDisplayedImage();
      renderMarkers();
    });
  } else {
    targetImage.addEventListener("load", () => {
      syncOverlayLayerToDisplayedImage();
      renderMarkers();
    }, { once: true });
  }
  markSurface.addEventListener("pointerdown", handleMarkPointerDown, { passive: false });
  markSurface.addEventListener("pointermove", handleMarkPointerMove, { passive: true });
  markSurface.addEventListener("pointerup", handleMarkPointerUp, { passive: false });
  markSurface.addEventListener("pointercancel", clearMarkPointerCandidate);
  markSurface.addEventListener("pointerleave", clearMarkPointerCandidate);
  markSurface.addEventListener("contextmenu", event => event.preventDefault());
  renderMarkers();
  renderMarkStatus();
}

function activeEvidence() {
  return pendingEvidence || (SCZN3M4.read(SCZN3M4.KEYS.activeSession, null) || {}).targetEvidenceImage || null;
}

function readFileAsDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(reader.error);
    reader.readAsDataURL(file);
  });
}

function downsizeImageDataUrl(dataUrl, maxSize = 1200) {
  return new Promise(resolve => {
    const image = new Image();
    image.onload = () => {
      const scale = Math.min(1, maxSize / Math.max(image.naturalWidth || 1, image.naturalHeight || 1));
      if (scale >= 1) {
        resolve(dataUrl);
        return;
      }
      const canvas = document.createElement("canvas");
      canvas.width = Math.max(1, Math.round(image.naturalWidth * scale));
      canvas.height = Math.max(1, Math.round(image.naturalHeight * scale));
      const context = canvas.getContext("2d");
      context.drawImage(image, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL("image/jpeg", 0.86));
    };
    image.onerror = () => resolve(dataUrl);
    image.src = dataUrl;
  });
}

function hasMarkableEvidence() {
  const evidence = activeEvidence();
  return !!(session && evidence && evidence.dataUrl);
}

function safePoint(point) {
  return SCZN3M4.UGEO.normalizePoint(point);
}

// Non-authoritative display accessor. Backend calculates; frontend displays.
function currentVisualCorrection() {
  if (!resultsShown || !backendAuthorityPackage) return null;
  const correction = backendAuthorityPackage.correction || {};
  const clicks = backendAuthorityPackage.clicks || {};
  return {
    ...correction,
    ...clicks,
    poib: backendAuthorityPackage.poib,
    authorityPackage: backendAuthorityPackage
  };
}

function backendTargetGeometry() {
  return {
    imageWidth: BAKER_GRID_AUDIT.imageWidth,
    imageHeight: BAKER_GRID_AUDIT.imageHeight,
    gridLeftPx: BAKER_GRID_AUDIT.leftPx,
    gridTopPx: BAKER_GRID_AUDIT.topPx,
    gridRightPx: BAKER_GRID_AUDIT.rightPx,
    gridBottomPx: BAKER_GRID_AUDIT.bottomPx,
    gridSquarePx: BAKER_GRID_AUDIT.squarePx,
    gridSquareInches: 1
  };
}

function backendAuthorityRequest() {
  const source = matrix || {};
  const adjustment = opticAdjustmentConfig(source);
  const optic = {
    type: source.opticType,
    manufacturer: source.opticBrand,
    model: source.opticModel,
    adjustmentUnit: adjustment.unit,
    clickValue: adjustment.value,
    clickValueLabel: adjustment.label
  };
  if (adjustment.unit === "MOA") {
    optic.clickValueMOA = adjustment.value;
  } else {
    optic.clickValueMRAD = adjustment.value;
  }
  return {
    targetId: "BAKER_ST_100YD_SMART",
    targetName: "Baker 100 Yard Smart Target",
    vendor: "Baker Smart Targets",
    targetAuthorityGeometry: backendTargetGeometry(),
    aimCoordinate: safePoint(currentAimPoint),
    impactCoordinates: currentImpactPoints.map(safePoint).filter(Boolean),
    distance: {
      value: Number(selectedDistanceValue || 100),
      unit: selectedDistanceUnit === "M" ? "m" : "yds"
    },
    shooterSetup: {
      ...source,
      optic
    }
  };
}

function opticAdjustmentConfig(source) {
  const unit = source.opticAdjustmentUnit === "MRAD" ? "MRAD" : "MOA";
  const rawValue = unit === "MRAD"
    ? (source.opticClickValueMRAD || source.opticClickValue)
    : (source.opticClickValueMOA || source.clickValueMOA || source.opticClickValue || source.clickValue);
  const fallback = unit === "MRAD" ? 0.1 : 0.25;
  const value = Math.max(0.0001, Number(String(rawValue || fallback).match(/[\d.]+/)?.[0] || fallback));
  const label = source.opticClickValueLabel || `${value} ${unit}`;
  return { unit, value, label };
}

async function requestBackendAuthority() {
  const requestPayload = backendAuthorityRequest();
  if (!BACKEND_AUTHORITY_ENDPOINT) {
    throw new Error("Backend authority service is not configured");
  }
  const response = await fetch(BACKEND_AUTHORITY_ENDPOINT, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(requestPayload)
  });
  if (!response.ok) {
    throw new Error(`Backend authority failed: ${response.status}`);
  }
  const authorityPackage = await response.json();
  validateBackendAuthorityPackage(authorityPackage);
  authorityPackage.frontendRequest = requestPayload;
  return authorityPackage;
}

function isAuthorityPoint(point) {
  return !!(
    point &&
    Number.isFinite(Number(point.xPercent)) &&
    Number.isFinite(Number(point.yPercent))
  );
}

function validateBackendAuthorityPackage(authorityPackage) {
  const status = authorityPackage && authorityPackage.status;
  const render = authorityPackage && authorityPackage.renderCoordinates;
  const correction = authorityPackage && authorityPackage.correction;
  const clicks = authorityPackage && authorityPackage.clicks;
  const hasValidImpacts = !!(render && Array.isArray(render.impacts) && render.impacts.length === currentImpactPoints.length);
  const hasValidClicks = !!(
    clicks &&
    Number.isFinite(Number(clicks.elevationClicks)) &&
    Number.isFinite(Number(clicks.windageClicks))
  );
  const valid = !!(
    status &&
    status.hasAim === true &&
    status.hasPOIB === true &&
    status.hasCorrection === true &&
    Number(status.impactCount) === currentImpactPoints.length &&
    isAuthorityPoint(authorityPackage.poib) &&
    isAuthorityPoint(render && render.aim) &&
    isAuthorityPoint(render && render.poib) &&
    render.vector &&
    isAuthorityPoint(render.vector.start) &&
    isAuthorityPoint(render.vector.end) &&
    correction &&
    hasValidClicks &&
    hasValidImpacts
  );
  if (!valid) {
    throw new Error("Backend authority response incomplete");
  }
}

function applyBackendAuthorityPackage(authorityPackage) {
  authorityStatusMessage = "";
  backendAuthorityPackage = authorityPackage;
  const correction = authorityPackage && authorityPackage.correction ? authorityPackage.correction : {};
  const clicks = authorityPackage && authorityPackage.clicks ? authorityPackage.clicks : {};
  currentClicks = authorityPackage ? {
    ...clicks,
    elevation: correction.elevation,
    windage: correction.windage,
    poib: authorityPackage.poib,
    authorityPackage
  } : null;
  currentScore = backendScoreValue(authorityPackage);
  resultsShown = !!(authorityPackage && authorityPackage.status && authorityPackage.status.hasCorrection);
  sessionSaved = false;
}

function correctionCardDistance() {
  syncDistanceFromControls();
  return formatDistanceDisplay().toUpperCase();
}

function renderCorrectionOverlay(correction) {
  if (!correction || !correction.poib || !currentAimPoint) return "";
  const elevation = compactClick(correction.elevation, "elevation");
  const windage = compactClick(correction.windage, "windage");
  return `
    <div class="target-correction-card" aria-label="Calculated correction summary">
      <strong>${correctionCardDistance()}</strong>
      <span>${elevation}</span>
      <span>${windage}</span>
      <span>${currentImpactPoints.length} Hits</span>
    </div>`;
}

// Non-authoritative legacy adapter retained temporarily; do not use for POIB/click/vector truth.
function targetEvidencePackage(correction) {
  return SCZN3M4.UGEO.normalizeEvidencePackage({
    session,
    targetImage: activeEvidence() && activeEvidence().dataUrl,
    distance: correctionCardDistance(),
    aim: safePoint(currentAimPoint),
    impacts: currentImpactPoints,
    poib: correction && correction.poib,
    correction,
    clicks: correction,
    hitCount: currentImpactPoints.length,
    score: currentScore
  });
}

function displayedImageBox() {
  const surface = document.getElementById("markSurface");
  const image = surface && surface.querySelector("img");
  return SCZN3M4.UGEO.displayedImageContentBox(image, surface);
}

function syncOverlayLayerToDisplayedImage() {
  const layer = document.getElementById("markerLayer");
  const box = displayedImageBox();
  if (!layer || !box) return null;
  const surface = document.getElementById("markSurface");
  const image = surface && surface.querySelector("img");
  SCZN3M4.UGEO.syncEvidenceLayerToImage(layer, image, surface);
  return box;
}

function syncArrowLayerToMarkerLayer() {
  const layer = document.getElementById("markerLayer");
  const arrowSvg = layer && layer.querySelector(".target-correction-vector");
  if (!layer || !arrowSvg) return;
  const layerRect = layer.getBoundingClientRect();
  arrowSvg.style.left = "0px";
  arrowSvg.style.top = "0px";
  arrowSvg.style.width = `${layerRect.width}px`;
  arrowSvg.style.height = `${layerRect.height}px`;
}

function markerPointHtml(className, point, content = "", attributes = "") {
  const safe = safePoint(point);
  if (!safe) return "";
  return `<span class="${className}" style="left:${safe.xPercent}%;top:${safe.yPercent}%"${attributes ? ` ${attributes}` : ""}>${content}</span>`;
}

function vectorHtmlFromBackend(vector) {
  if (!vector || !vector.start || !vector.end) return "";
  const start = safePoint(vector.start);
  const end = safePoint(vector.end);
  if (!start || !end) return "";
  return `<svg class="target-correction-vector" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true" focusable="false">
    <defs>
      <marker id="targetCorrectionArrowhead" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L8,4 L0,8 Z"></path>
      </marker>
    </defs>
    <line x1="${start.xPercent}" y1="${start.yPercent}" x2="${end.xPercent}" y2="${end.yPercent}" marker-end="url(#targetCorrectionArrowhead)"></line>
  </svg>`;
}

function renderPendingInputMarkers() {
  const parts = [];
  currentImpactPoints.map(safePoint).filter(Boolean).forEach((point, index) => {
    parts.push(markerPointHtml("target-marker impact-marker", point, String(index + 1)));
  });
  if (currentAimPoint) {
    parts.push(markerPointHtml("target-marker aim-marker", currentAimPoint, "A"));
  }
  return parts.join("");
}

function renderBackendAuthorityMarkers(authorityPackage) {
  const render = authorityPackage && authorityPackage.renderCoordinates ? authorityPackage.renderCoordinates : {};
  const parts = [];
  parts.push(vectorHtmlFromBackend(render.vector));
  (render.impacts || []).map(safePoint).filter(Boolean).forEach((point, index) => {
    parts.push(markerPointHtml("target-marker impact-marker", point, String(index + 1)));
  });
  if (render.aim) {
    parts.push(markerPointHtml("target-marker aim-marker", render.aim, "A"));
  }
  if (render.poib) {
    parts.push(markerPointHtml("target-marker poib-auto-marker", render.poib, "", 'aria-label="Backend authority POIB"'));
  }
  return parts.join("");
}

function renderMarkers() {
  const layer = document.getElementById("markerLayer");
  if (!layer) return;
  syncOverlayLayerToDisplayedImage();
  const correction = currentVisualCorrection();
  const authorityPackage = resultsShown ? backendAuthorityPackage : null;
  layer.innerHTML = (authorityPackage ? renderBackendAuthorityMarkers(authorityPackage) : renderPendingInputMarkers()) + renderCorrectionOverlay(correction);
  syncArrowLayerToMarkerLayer();
  renderResults();
}

function compactClick(value, axis) {
  if (!value) return "Not calculated";
  const amount = String(value).match(/\d+/)?.[0] || "0";
  const upper = String(value).toUpperCase();
  if (axis === "elevation") {
    if (upper.includes("UP")) return `${amount} Clicks ↑`;
    if (upper.includes("DOWN")) return `${amount} Clicks ↓`;
  }
  if (axis === "windage") {
    if (upper.includes("RIGHT")) return `${amount} Clicks →`;
    if (upper.includes("LEFT")) return `${amount} Clicks ←`;
  }
  return `${amount} Clicks`;
}

function scoreClass(score) {
  if (!Number.isFinite(score)) return "score-pending";
  if (score >= 90) return "score-green";
  if (score >= 80) return "score-yellow";
  if (score >= 70) return "score-orange";
  return "score-red";
}

function renderResults() {
  const impacts = currentImpactPoints;
  const numericScore = currentScore === null ? NaN : Number(currentScore);
  const scoreCell = document.getElementById("scoreCell");
  if (!scoreCell) return;
  scoreCell.className = `target-intel-score ${scoreClass(numericScore)}`;
  document.getElementById("scoreValue").textContent = Number.isFinite(numericScore) ? String(numericScore) : "--";
  document.getElementById("elevationValue").textContent = compactClick(currentClicks && currentClicks.elevation, "elevation");
  document.getElementById("windageValue").textContent = compactClick(currentClicks && currentClicks.windage, "windage");
  document.getElementById("hitsValue").textContent = `${impacts.length} Hits`;
  const message = document.getElementById("authorityStatusMessage");
  if (message) {
    message.innerHTML = authorityStatusMessage
      ? `<strong>${authorityStatusMessage}</strong><span class="authority-status-subtext">Your target data has not been lost.</span>`
      : "";
    message.classList.toggle("is-hidden", !authorityStatusMessage);
  }
}

function hideShooterTip() {
  const tip = document.getElementById("shooterTip");
  const text = document.getElementById("shooterTipText");
  if (tip) tip.classList.add("is-hidden");
  if (text) text.textContent = "";
}

function shooterTipFromResults() {
  if (!currentClicks || !currentImpactPoints.length) return "Record confirmed impacts before saving.";
  if (currentImpactPoints.length < 3) return "Add more confirmed impacts for a stronger read.";
  const windage = Number(currentClicks.windageClicks || 0);
  const elevation = Number(currentClicks.elevationClicks || 0);
  const windageDirection = String(currentClicks.windageDirection || "CENTER").toLowerCase();
  const elevationDirection = String(currentClicks.elevationDirection || "CENTER").toLowerCase();
  if (windage === 0 && elevation === 0) return "Group is centered; confirm with another string.";
  if (elevation > windage) return "Apply elevation " + elevationDirection + ", then confirm.";
  if (windage > elevation) return "Apply windage " + windageDirection + ", then confirm.";
  return "Apply both corrections, then confirm.";
}

function showShooterTip() {
  const tip = document.getElementById("shooterTip");
  const text = document.getElementById("shooterTipText");
  if (!tip || !text) return;
  text.textContent = shooterTipFromResults();
  tip.classList.remove("is-hidden");
}

function settleViewportAfterResults() {
  if (!window.matchMedia("(max-width: 900px)").matches) return;
  requestAnimationFrame(() => {
    const saveButton = document.getElementById("saveMarks");
    if (saveButton) {
      saveButton.scrollIntoView({ block: "center", inline: "nearest" });
    }
  });
}

function clearCalculatedResults() {
  currentClicks = null;
  currentScore = null;
  backendAuthorityPackage = null;
  resultsShown = false;
  authorityRequestInFlight = false;
  authorityStatusMessage = "";
  sessionSaved = false;
  hideShooterTip();
  renderResults();
}

function setNextStep(activeId) {
  ["chooseTargetButton", "setAimMode", "addImpactMode", "showResults", "saveMarks"].forEach(id => {
    document.getElementById(id).classList.toggle("next-step", !!activeId && id === activeId);
  });
}

function setControlVisibility(id, visible) {
  const element = document.getElementById(id);
  if (element) element.classList.toggle("is-hidden", !visible);
}

function setShooterPrompt(text) {
  const prompt = document.getElementById("shooterStepPrompt");
  if (!prompt) return;
  prompt.textContent = text || "";
  prompt.classList.toggle("is-hidden", !text);
}

function renderMarkStatus() {
  const canMark = hasMarkableEvidence();
  const hasAim = !!currentAimPoint;
  const hasImpacts = currentImpactPoints.length > 0;
  document.getElementById("setAimMode").disabled = !canMark;
  document.getElementById("addImpactMode").disabled = !canMark || !hasAim;
  document.getElementById("undoImpact").disabled = authorityRequestInFlight || !canMark || !hasImpacts;
  document.getElementById("clearMarks").disabled = authorityRequestInFlight || !canMark || (!hasAim && !hasImpacts);
  document.getElementById("saveMarks").disabled = authorityRequestInFlight || !session || sessionSaved || !resultsShown;
  document.getElementById("showResults").disabled = authorityRequestInFlight || !canMark || !hasImpacts;
  setControlVisibility("chooseTargetButton", !canMark);
  setControlVisibility("setAimMode", false);
  setControlVisibility("addImpactMode", false);
  setControlVisibility("showResults", canMark && hasImpacts && !resultsShown);
  setControlVisibility("undoImpact", canMark && hasImpacts && !resultsShown);
  setControlVisibility("clearMarks", canMark && (hasAim || hasImpacts) && !resultsShown);
  setControlVisibility("saveMarks", canMark && resultsShown);
  document.getElementById("showResults").textContent = authorityRequestInFlight ? "Working..." : "Show Results";
  const uploadPanel = document.querySelector(".upload-panel");
  if (uploadPanel) {
    uploadPanel.classList.toggle("target-first-mode", canMark);
    uploadPanel.classList.toggle("results-ready", !!resultsShown || !!authorityStatusMessage);
    uploadPanel.classList.toggle("workflow-actions-ready", canMark && (hasImpacts || resultsShown || !!authorityStatusMessage));
    uploadPanel.classList.toggle("pre-results-actions", canMark && hasImpacts && !resultsShown && !authorityStatusMessage);
  }
  renderActiveSessionBar();
  if (!canMark) {
    setShooterPrompt("");
  } else if (!hasAim) {
    setShooterPrompt("Tap Aim Point");
  } else if (!hasImpacts) {
    setShooterPrompt("Tap Bullet Holes");
  } else {
    setShooterPrompt("");
  }
  let nextStep = "chooseTargetButton";
  if (canMark && !hasAim) nextStep = "setAimMode";
  if (canMark && hasAim && !hasImpacts) nextStep = "addImpactMode";
  if (canMark && hasAim && hasImpacts && !resultsShown) nextStep = "showResults";
  if (canMark && hasAim && hasImpacts && resultsShown) nextStep = "saveMarks";
  if (sessionSaved) nextStep = null;
  setNextStep(nextStep);
}

function setMode(mode) {
  markMode = mode;
  renderMarkStatus();
}

function handleMarkTap(event) {
  if (!hasMarkableEvidence()) return;
  if (authorityRequestInFlight) return;
  if (resultsShown) return;
  syncOverlayLayerToDisplayedImage();
  const layer = document.getElementById("markerLayer");
  const rect = (layer || event.currentTarget).getBoundingClientRect();
  const xPercent = Math.max(0, Math.min(100, ((event.clientX - rect.left) / rect.width) * 100));
  const yPercent = Math.max(0, Math.min(100, ((event.clientY - rect.top) / rect.height) * 100));
  const point = {
    xPercent: Number(xPercent.toFixed(2)),
    yPercent: Number(yPercent.toFixed(2))
  };
  if (markMode === "aim" || !currentAimPoint) {
    currentAimPoint = point;
    markMode = "impact";
  } else {
    currentImpactPoints.push(point);
  }
  clearCalculatedResults();
  setMode(markMode);
  renderMarkers();
  renderMarkStatus();
}

function clearMarkPointerCandidate() {
  markPointerCandidate = null;
}

function handleMarkPointerDown(event) {
  if (event.button && event.button !== 0) return;
  if (!hasMarkableEvidence() || authorityRequestInFlight || resultsShown) return;
  if (event.target && event.target.closest("button,a,input,select,textarea,label,summary,details")) return;
  markPointerCandidate = {
    pointerId: event.pointerId,
    startX: event.clientX,
    startY: event.clientY,
    moved: false
  };
}

function handleMarkPointerMove(event) {
  if (!markPointerCandidate || markPointerCandidate.pointerId !== event.pointerId) return;
  const dx = event.clientX - markPointerCandidate.startX;
  const dy = event.clientY - markPointerCandidate.startY;
  if (Math.hypot(dx, dy) > MARK_TAP_MOVE_THRESHOLD_PX) {
    markPointerCandidate.moved = true;
  }
}

function handleMarkPointerUp(event) {
  if (!markPointerCandidate || markPointerCandidate.pointerId !== event.pointerId) return;
  const candidate = markPointerCandidate;
  clearMarkPointerCandidate();
  const dx = event.clientX - candidate.startX;
  const dy = event.clientY - candidate.startY;
  if (candidate.moved || Math.hypot(dx, dy) > MARK_TAP_MOVE_THRESHOLD_PX) return;
  if (event.target && event.target.closest("button,a,input,select,textarea,label,summary,details")) return;
  event.preventDefault();
  handleMarkTap(event);
}

renderEvidencePreview(session && session.targetEvidenceImage);

document.getElementById("chooseTargetButton").addEventListener("click", () => {
  ensureTargetSession();
  const input = document.getElementById("targetImageInput");
  input.value = "";
});
document.getElementById("chooseTargetButton").addEventListener("keydown", event => {
  if (event.key === "Enter" || event.key === " ") {
    event.preventDefault();
    event.currentTarget.click();
  }
});

document.getElementById("targetImageInput").addEventListener("change", event => {
  ensureTargetSession();
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  readFileAsDataUrl(file).then(dataUrl => downsizeImageDataUrl(dataUrl)).then(dataUrl => {
    currentAimPoint = null;
    currentImpactPoints = [];
    sessionSaved = false;
    unlockDistanceForNewTarget();
    clearCalculatedResults();
    pendingEvidence = {
      dataUrl,
      name: file.name,
      type: file.type,
      size: dataUrl.length,
      originalSize: file.size
    };
    renderEvidencePreview(pendingEvidence);
    setMode("aim");
    renderMarkStatus();
  }).catch(error => {
    console.warn("Target image read failed", error);
  });
});

document.getElementById("setAimMode").addEventListener("click", () => setMode("aim"));
document.getElementById("addImpactMode").addEventListener("click", () => {
  if (currentAimPoint) setMode("impact");
});
document.getElementById("undoImpact").addEventListener("click", () => {
  currentImpactPoints.pop();
  clearCalculatedResults();
  renderMarkers();
  renderMarkStatus();
});
document.getElementById("clearMarks").addEventListener("click", () => {
  currentAimPoint = null;
  currentImpactPoints = [];
  clearCalculatedResults();
  SCZN3M4.updateActiveSession({
    aimPoint: null,
    impactPoints: [],
    backendAuthorityPackage: null,
    ugeoAuthorityPackage: null,
    poib: null,
    groupCenter: null,
    clicks: null,
    score: null,
    rawScore: null,
    qualityPossible: null,
    hits: 0,
    shotCount: 0,
    correctionStatus: "not-calculated",
    shotData: { shotCount: 0, hits: 0, score: null, status: "marks-cleared" },
    correctionData: { status: "not-calculated", clicks: null, windage: null, elevation: null }
  });
  setMode("aim");
  renderMarkers();
  renderMarkStatus();
});
document.getElementById("showResults").addEventListener("click", async () => {
  if (authorityRequestInFlight) return;
  if (resultsShown) return;
  if (!currentAimPoint || !currentImpactPoints.length) return;
  authorityRequestInFlight = true;
  authorityStatusMessage = "";
  renderResults();
  renderMarkStatus();
  try {
    const authorityPackage = await requestBackendAuthority();
    applyBackendAuthorityPackage(authorityPackage);
    renderMarkers();
    renderResults();
    if (resultsShown) showShooterTip();
    if (resultsShown) settleViewportAfterResults();
  } catch (error) {
    currentClicks = null;
    currentScore = null;
    backendAuthorityPackage = null;
    resultsShown = false;
    authorityStatusMessage = error && String(error.message || "").includes("incomplete")
      ? "Authority response incomplete. Please try again."
      : "Authority service unavailable. Please try again.";
    renderResults();
  } finally {
    authorityRequestInFlight = false;
  }
  renderMarkStatus();
});
document.getElementById("saveMarks").addEventListener("click", () => {
  if (!session || !backendAuthorityPackage) return;
  let saved = null;
  if (pendingEvidence) {
    saved = SCZN3M4.saveTargetEvidenceImage(pendingEvidence);
    pendingEvidence = null;
  }
  lockDistanceForSession();
  const savedTimestamp = new Date().toISOString();
  const authorityPackage = backendAuthorityPackage;
  const authorityClicks = currentClicks;
  saved = SCZN3M4.updateActiveSession({
    aimPoint: safePoint(currentAimPoint),
    impactPoints: currentImpactPoints.map(safePoint).filter(Boolean),
    backendAuthorityPackage: authorityPackage,
    ugeoAuthorityPackage: authorityPackage,
    score: authorityPackage.score || null,
    scoreValue: backendScoreValue(authorityPackage),
    poib: authorityPackage.poib || null,
    groupCenter: authorityPackage.groupCenter || null,
    clicks: authorityClicks,
    correctionData: {
      status: authorityPackage.status && authorityPackage.status.hasCorrection ? "backend-authority-calculated" : "not-calculated",
      clicks: authorityClicks,
      correction: authorityPackage.correction || null,
      moa: authorityPackage.moa || null,
      vectors: authorityPackage.vectors || null
    },
    shotData: {
      aimPoint: safePoint(currentAimPoint),
      impactPoints: currentImpactPoints.map(safePoint).filter(Boolean),
      shotCount: currentImpactPoints.length,
      hits: currentImpactPoints.length,
      poib: authorityPackage.poib || null,
      groupCenter: authorityPackage.groupCenter || null,
      score: authorityPackage.score || null,
      scoreValue: backendScoreValue(authorityPackage),
      authoritySource: "backend"
    },
    hits: currentImpactPoints.length,
    shotCount: currentImpactPoints.length,
    correctionStatus: "backend-authority-calculated",
    savedToSEC: true,
    targetDistance: targetDistanceValue(),
    targetDistanceValue: selectedDistanceValue,
    targetDistanceUnit: selectedDistanceUnit,
    targetDistanceLocked: true,
    distance: targetDistanceValue(),
    timestamp: savedTimestamp,
    savedAt: savedTimestamp
  });
  if (saved && saved.targetEvidenceImage) {
    renderEvidencePreview(saved.targetEvidenceImage);
  }
  sessionSaved = true;
  renderMarkStatus();
  renderResults();
  if (saved) window.location.href = "records.html";
});

window.addEventListener("resize", () => {
  syncOverlayLayerToDisplayedImage();
  renderMarkers();
});

setMode(currentAimPoint ? "impact" : "aim");
renderSetupSummary();
renderResults();
</script>
</body>
</html>
