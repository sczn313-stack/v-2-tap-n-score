<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="sczn3-authority-endpoint" content="https://sczn3-authority.onrender.com/api/authority/ugeo" />
<title>Target</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body class="platform-page target-page">
<main class="shell">
  <header class="m4-header">
    <div class="vendor-slot">
      <img src="assets/BAKER_ST_100YD_SMART_AUTHORITY_v1_ORIGINAL.png" alt="Baker 100 Yard Smart Target thumbnail" />
      <div class="brand-lockup">
        <span class="kicker">Target</span>
        <a class="vendor-name" href="index.html">Baker Smart Targets</a>
      </div>
    </div>
    <details class="mobile-platform-menu target-mobile-menu">
      <summary aria-label="Open navigation">☰</summary>
      <a href="index.html">Home</a>
      <a href="matrix.html">Weapon Library</a>
      <a href="shoot.html" aria-current="page">Target</a>
      <a href="records.html">SEC</a>
      <a href="survey.html">Survey</a>
    </details>
  </header>
  <section class="active-session-bar" id="activeSessionBar"></section>
  <section class="shoot-workflow">
    <div class="panel">
      <section class="target-session-context" aria-label="Today's range session">
        <span>Today's Range Session</span>
        <strong id="targetSessionSummary">No active weapon profile</strong>
        <p class="shooter-tip is-hidden" id="shooterTip"><span class="tip-label">Tip:</span><span id="shooterTipText"></span></p>
      </section>
      <section class="upload-panel" aria-label="Upload or capture target evidence">
        <div class="workflow-control-row" aria-label="SCZN3 shooting workflow controls">
          <div class="target-hit-counter" id="targetHitCounter" aria-live="polite">
            <strong>0</strong>
            <span>Taps</span>
          </div>
          <label class="button neon-file-button next-step" id="chooseTargetButton" for="targetImageInput" role="button" tabindex="0">Choose Target</label>
          <input class="visually-hidden-file" id="targetImageInput" type="file" accept="image/*" />
          <button class="button" type="button" id="setAimMode">Tap Aim Point</button>
          <button class="button" type="button" id="addImpactMode">Tap Bullet Holes</button>
          <button class="button" type="button" id="showResults">Show Results</button>
          <button class="button" type="button" id="undoImpact">Undo</button>
          <button class="button" type="button" id="clearMarks">Clear</button>
          <button class="button" type="button" id="saveMarks">Save Session</button>
          <input id="showGridCoordinates" type="checkbox" hidden />
        </div>
        <div class="evidence-preview evidence-workspace" id="targetEvidencePreview">
          <div class="evidence-meta evidence-status-stack">
            <div class="target-intel-stack" id="resultsGrid"></div>
          </div>
        </div>
        <p class="target-scroll-cue" id="targetScrollCue"><span aria-hidden="true">☝ ↓</span> Scroll down for your results, insights, and more</p>
      </section>
    </div>
  </section>
</main>
<script src="app_state.js"></script>
<script src="ops.js?v=ops-v3-0623"></script>
<script>
let session = SCZN3M4.read(SCZN3M4.KEYS.activeSession, null);

function isFinalizedSession(candidate) {
  return !!(candidate && (candidate.savedToSEC === true || candidate.targetDistanceLocked === true || candidate.savedAt));
}

if (isFinalizedSession(session)) {
  session = null;
}

if (!session && SCZN3M4.getActiveMatrix()) {
  session = SCZN3M4.createSession(SCZN3M4.getActiveMatrix());
}
let matrix = session && session.matrixSnapshot ? session.matrixSnapshot : SCZN3M4.getActiveMatrix();
const AUTHORITY_ENDPOINT_META = document.querySelector('meta[name="sczn3-authority-endpoint"]');
const PRODUCTION_AUTHORITY_ENDPOINT = AUTHORITY_ENDPOINT_META && AUTHORITY_ENDPOINT_META.content
  ? AUTHORITY_ENDPOINT_META.content.trim()
  : "https://sczn3-authority.onrender.com/api/authority/ugeo";
const LOCAL_AUTHORITY_ENDPOINT = "http://127.0.0.1:8098/api/authority/ugeo";
const IS_LOCAL_FRONTEND = ["localhost", "127.0.0.1", "::1"].includes(window.location.hostname);
const BACKEND_AUTHORITY_ENDPOINT = window.SCZN3_BACKEND_AUTHORITY_ENDPOINT || (IS_LOCAL_FRONTEND ? LOCAL_AUTHORITY_ENDPOINT : PRODUCTION_AUTHORITY_ENDPOINT);
const DISTANCE_CLICK_QUERY_ENDPOINT = window.SCZN3_DISTANCE_CLICK_QUERY_ENDPOINT || BACKEND_AUTHORITY_ENDPOINT.replace(/\/api\/authority\/ugeo\/?$/, "/api/authority/distance-click-query");
const TARGET_QUERY = new URLSearchParams(window.location.search);
const TARGET_PROFILE_LAUNCH_ID = TARGET_QUERY.get("target_profile_id") || TARGET_QUERY.get("targetProfileId") || "";
const DOT_TORTURE_PROFILE_IDS = new Set([
  "dot_torture_ez2c_style_17",
  "dot_torture_lite_ez2c",
  "revolving_dot_torture_ez2c"
]);
const DOT_TORTURE_PROFILE_LABELS = {
  dot_torture_ez2c_style_17: {
    targetName: "EZ2C Style 17 Dot Torture Training Drill",
    targetFamily: "Dot Torture"
  },
  dot_torture_lite_ez2c: {
    targetName: "EZ2C Dot Torture Lite Training Drill",
    targetFamily: "Dot Torture Lite"
  },
  revolving_dot_torture_ez2c: {
    targetName: "EZ2C Revolving Dot Torture Training Drill",
    targetFamily: "Revolving Dot Torture"
  }
};
let missionResolutionStatus = TARGET_PROFILE_LAUNCH_ID ? "resolving" : "idle";
let missionResolutionMessage = TARGET_PROFILE_LAUNCH_ID ? "Loading target mission..." : "";
let pendingEvidence = null;
let displayedEvidence = null;
const savedAuthorityPackage = session && (session.backendAuthorityPackage || session.ugeoAuthorityPackage)
  ? (session.backendAuthorityPackage || session.ugeoAuthorityPackage)
  : null;
let backendAuthorityPackage = compatibleAuthorityPackage(savedAuthorityPackage);
let markMode = "aim";
let currentAimPoint = session && session.aimPoint ? session.aimPoint : null;
let currentImpactPoints = session && Array.isArray(session.impactPoints) ? [...session.impactPoints] : [];
function backendScoreValue(authorityPackage) {
  const score = authorityPackage && authorityPackage.score;
  const value = score && typeof score === "object" ? score.value : score;
  return Number.isFinite(Number(value)) ? Number(value) : null;
}
let currentClicks = zeroingClicksFromAuthorityPackage(backendAuthorityPackage);
let currentScore = backendScoreValue(backendAuthorityPackage);
let resultsShown = isAuthorityPackageCalculated(backendAuthorityPackage);
let authorityStatusMessage = "";
let sessionSaved = false;
let trainingStageIndex = 0;
let trainingDrillFinished = false;
const savedDistance = session && (session.targetDistanceValue || session.targetDistance || session.distance || session.matrixSnapshot?.targetDistance || session.matrixSnapshot?.distance);
let selectedDistanceUnit = (session && (session.targetDistanceUnit || session.matrixSnapshot?.targetDistanceUnit)) || (/m(eters?)?$/i.test(String(savedDistance || "")) ? "M" : "YDS");
let selectedDistanceValue = parseDistanceValue(savedDistance) || "100";
let distanceLocked = !!(session && session.targetDistanceLocked);
let showGridCoordinates = false;
let selectedAdjustmentUnit = String((matrix && (matrix.opticAdjustmentUnit || matrix.adjustmentUnit)) || "MOA").toUpperCase() === "MRAD" ? "MRAD" : "MOA";
const BAKER_GRID_AUDIT = {
  imageWidth: 1102,
  imageHeight: 1713,
  leftPx: 68,
  topPx: 282,
  rightPx: 1047,
  bottomPx: 1652,
  squarePx: 49
};

function activeTargetProfileId() {
  const queryTargetProfileId = TARGET_QUERY.get("target_profile_id") || TARGET_QUERY.get("targetProfileId") || "";
  if (queryTargetProfileId) return String(queryTargetProfileId).toLowerCase();
  const sessionSource = session || {};
  const matrixSource = matrix || {};
  const targetAuthority = sessionSource.targetAuthority || {};
  const targetName = String(
    sessionSource.targetName
    || matrixSource.targetName
    || targetAuthority.targetName
    || targetAuthority.targetFamily
    || TARGET_QUERY.get("target")
    || TARGET_QUERY.get("targetName")
    || ""
  ).toLowerCase();
  if (targetName.includes("gssf") || targetName.includes("ac-1") || targetName.includes("ac1")) {
    return "gssf_ac_1";
  }
  return String(
    sessionSource.target_profile_id
    || sessionSource.targetProfileId
    || sessionSource.targetId
    || matrixSource.target_profile_id
    || matrixSource.targetProfileId
    || matrixSource.targetId
    || targetAuthority.target_profile_id
    || targetAuthority.targetProfileId
    || targetAuthority.targetId
    || ""
  ).toLowerCase();
}

function isDotTortureProfileId(value) {
  return DOT_TORTURE_PROFILE_IDS.has(String(value || "").toLowerCase());
}

function activeMissionFamily() {
  const sessionSource = session || {};
  const matrixSource = matrix || {};
  const targetAuthority = sessionSource.targetAuthority || {};
  const targetProfileId = activeTargetProfileId();
  if (targetProfileId === "gssf_ac_1") return "gssf";
  if (isDotTortureProfileId(targetProfileId)) return "";
  return String(
    sessionSource.mission_family
    || sessionSource.missionFamily
    || sessionSource.missionFamilyId
    || matrixSource.mission_family
    || matrixSource.missionFamily
    || matrixSource.missionFamilyId
    || targetAuthority.mission_family
    || targetAuthority.missionFamily
    || targetAuthority.missionFamilyId
    || TARGET_QUERY.get("mission_family")
    || TARGET_QUERY.get("missionFamily")
    || TARGET_QUERY.get("missionFamilyId")
    || ""
  ).toLowerCase();
}

function activeMissionName() {
  const sessionSource = session || {};
  const matrixSource = matrix || {};
  const targetAuthority = sessionSource.targetAuthority || {};
  return String(
    sessionSource.mission_name
    || sessionSource.missionName
    || matrixSource.mission_name
    || matrixSource.missionName
    || targetAuthority.mission_name
    || targetAuthority.missionName
    || TARGET_QUERY.get("mission_name")
    || TARGET_QUERY.get("missionName")
    || ""
  ).toLowerCase();
}

function isGssfAuthoritySession() {
  return activeTargetProfileId() === "gssf_ac_1" || activeMissionFamily() === "gssf";
}

function isDotTortureAuthoritySession() {
  const missionName = activeMissionName();
  return isDotTortureProfileId(activeTargetProfileId())
    || (activeMissionFamily() === "marksmanshiptraining" && (
      missionName === "dottorture"
      || missionName === "dottorturestandard"
      || missionName === "dottorturelite"
      || missionName === "revolvingdottorture"
    ));
}

function isGssfAuthorityPackage(authorityPackage) {
  return !!(authorityPackage && (
    authorityPackage.target_profile_id === "gssf_ac_1"
    || authorityPackage.targetProfileId === "gssf_ac_1"
    || authorityPackage.mission_family === "gssf"
    || authorityPackage.missionFamilyId === "gssf"
  ));
}

function isDotTortureTrainingPackage(authorityPackage) {
  if (!authorityPackage) return false;
  const missionFamily = String(authorityPackage.mission_family || authorityPackage.missionFamily || authorityPackage.missionFamilyId || "");
  const missionName = String(authorityPackage.mission_name || authorityPackage.missionName || "");
  const missionGroup = String(authorityPackage.mission_group || authorityPackage.missionGroup || "");
  const secTemplate = String(authorityPackage.sec_template || authorityPackage.secTemplate || "");
  return missionFamily === "marksmanshipTraining"
    && secTemplate === "trainingSEC"
    && (
      missionGroup === "dotTortureFamily"
      || missionName === "dotTorture"
      || missionName === "dotTortureStandard"
      || missionName === "dotTortureLite"
      || missionName === "revolvingDotTorture"
    );
}

function isNonZeroingAuthorityPackage(authorityPackage) {
  return isGssfAuthorityPackage(authorityPackage) || isDotTortureTrainingPackage(authorityPackage);
}

function isMissionResolving() {
  return missionResolutionStatus === "resolving";
}

function isMissionResolutionUnavailable() {
  return missionResolutionStatus === "unavailable";
}

function missionResolutionHtml() {
  const message = isMissionResolutionUnavailable()
    ? "Unable to load target mission. Try again."
    : (missionResolutionMessage || "Loading target mission...");
  const subtext = isMissionResolutionUnavailable()
    ? "Backend mission authority did not return a usable package."
    : "Backend authority is resolving the target profile.";
  return `
    <div class="authority-results-panel training-results-panel mission-resolution-panel" id="missionResolutionPanel" aria-label="Mission resolution" role="status" aria-live="polite">
      <div class="training-result-header">
        <span>Target Mission</span>
        <strong>${escapeHtml(message)}</strong>
        <em>${escapeHtml(subtext)}</em>
      </div>
    </div>
  `;
}

function setMissionResolutionChrome() {
  const isBlocked = isMissionResolving() || isMissionResolutionUnavailable();
  const workflow = document.querySelector(".workflow-control-row");
  const context = document.querySelector(".target-session-context");
  if (workflow) {
    workflow.hidden = isBlocked;
    workflow.style.display = isBlocked ? "none" : "";
  }
  if (context) {
    context.hidden = isBlocked;
    context.style.display = isBlocked ? "none" : "";
  }
  document.body.dataset.missionResolution = missionResolutionStatus;
}

function renderMissionResolutionState() {
  const preview = document.getElementById("targetEvidencePreview");
  if (preview) {
    preview.innerHTML = `<div class="evidence-meta evidence-status-stack"><div class="target-intel-stack" id="resultsGrid">${missionResolutionHtml()}</div></div>`;
  }
  renderMarkStatus();
}

function activeMissionKind() {
  if (isDotTortureAuthoritySession()) return "dotTortureFamily";
  if (isGssfAuthoritySession()) return "gssf";
  return "zeroing";
}

function authorityPackageMissionKind(authorityPackage) {
  if (!authorityPackage) return "";
  if (isDotTortureTrainingPackage(authorityPackage)) return "dotTortureFamily";
  if (isGssfAuthorityPackage(authorityPackage)) return "gssf";
  if (authorityPackage.status && authorityPackage.status.hasCorrection) return "zeroing";
  return "";
}

function authorityPackageTargetProfileId(authorityPackage) {
  return String(
    authorityPackage && (
      authorityPackage.target_profile_id
      || authorityPackage.targetProfileId
      || authorityPackage.targetId
      || ""
    )
  ).toLowerCase();
}

function isAuthorityPackageCompatibleWithActiveMission(authorityPackage) {
  const packageKind = authorityPackageMissionKind(authorityPackage);
  if (!packageKind) return false;
  const activeProfileId = activeTargetProfileId();
  const packageProfileId = authorityPackageTargetProfileId(authorityPackage);
  if (activeProfileId && packageProfileId && activeProfileId !== packageProfileId) return false;
  return packageKind === activeMissionKind();
}

function compatibleAuthorityPackage(authorityPackage) {
  return isAuthorityPackageCompatibleWithActiveMission(authorityPackage) ? authorityPackage : null;
}

function stripStaleAuthorityFields(record = {}) {
  if (!record || typeof record !== "object") return {};
  const next = { ...record };
  [
    "backendAuthorityPackage",
    "ugeoAuthorityPackage",
    "authorityPackage",
    "correctionData",
    "correctionStatus",
    "clicks",
    "poib",
    "groupCenter",
    "score",
    "scoreValue",
    "rawScore",
    "qualityPossible",
    "trainingManualResult"
  ].forEach(key => delete next[key]);
  return next;
}

function hasIncompatibleAuthorityPackage(record = {}) {
  if (!record || typeof record !== "object") return false;
  const packageToCheck = record.backendAuthorityPackage || record.ugeoAuthorityPackage || record.authorityPackage || null;
  return !!(packageToCheck && !isAuthorityPackageCompatibleWithActiveMission(packageToCheck));
}

function authoritySafeRecord(record = {}) {
  return hasIncompatibleAuthorityPackage(record) ? stripStaleAuthorityFields(record) : { ...record };
}

function clearIncompatibleAuthorityFromSession(candidate) {
  if (!candidate) return candidate;
  if (!hasIncompatibleAuthorityPackage(candidate)) return candidate;
  return {
    ...stripStaleAuthorityFields(candidate),
    matrixSnapshot: candidate.matrixSnapshot || {},
    targetAuthority: candidate.targetAuthority || {},
    shotData: {
      ...(candidate.shotData || {}),
      status: "authority-cleared-for-mission-change",
      score: null,
      scoreValue: null
    }
  };
}

function syncAuthorityDerivedState() {
  backendAuthorityPackage = compatibleAuthorityPackage(backendAuthorityPackage);
  currentClicks = zeroingClicksFromAuthorityPackage(backendAuthorityPackage);
  currentScore = backendScoreValue(backendAuthorityPackage);
  resultsShown = isAuthorityPackageCalculated(backendAuthorityPackage);
}

function zeroingClicksFromAuthorityPackage(authorityPackage) {
  if (!authorityPackage || isNonZeroingAuthorityPackage(authorityPackage)) return null;
  const correction = authorityPackage.correction || {};
  const clicks = authorityPackage.clicks || {};
  return {
    ...clicks,
    elevation: correction.elevation,
    windage: correction.windage,
    poib: authorityPackage.poib,
    authorityPackage
  };
}

function isAuthorityPackageCalculated(authorityPackage) {
  if (!authorityPackage) return false;
  if (isDotTortureTrainingPackage(authorityPackage)) {
    return authorityPackage.ok === true && ["created", "calculated"].includes(String(authorityPackage.status || ""));
  }
  if (isGssfAuthorityPackage(authorityPackage)) {
    return authorityPackage.ok === true && authorityPackage.status === "calculated";
  }
  return !!(authorityPackage.status && authorityPackage.status.hasCorrection);
}

function currentSetupName() {
  if (!matrix) return "Create setup in Weapon Setup";
  const weapon = SCZN3M4.weaponProfileDisplay ? SCZN3M4.weaponProfileDisplay(matrix) : null;
  return weapon ? weapon.summary : [matrix.weaponCategory, matrix.weaponManufacturer, matrix.weaponModelType, matrix.weaponModelCaliber].filter(Boolean).join(" / ");
}

function currentSetupMeta() {
  if (!matrix || !SCZN3M4.weaponProfileDisplay) return "";
  const weapon = SCZN3M4.weaponProfileDisplay(matrix);
  return [weapon.frameCategory, weapon.barrelLength, weapon.sightRadius, weapon.variantFlags]
    .filter(Boolean)
    .join(" / ");
}

function renderActiveSessionBar() {
  const sessionSummary = currentSetupName();
  const sessionMeta = currentSetupMeta();
  document.getElementById("activeSessionBar").innerHTML = session
    ? `<strong>${escapeHtml(sessionSummary)}</strong><span>${escapeHtml(sessionMeta)}</span>`
    : `<strong>No Active Session</strong><span>Create one in Weapon Setup</span>`;
  const targetSessionSummary = document.getElementById("targetSessionSummary");
  if (targetSessionSummary) {
    targetSessionSummary.textContent = session ? sessionSummary : "Create a weapon profile to begin";
  }
}

function defaultTargetMatrix() {
  return {
    weaponCategory: "Rifle",
    weaponManufacturer: "Baker",
    weaponModelType: "Smart Target",
    weaponModelCaliber: "Baker 100 Yard Smart Target",
    opticType: "Iron Sights",
    ammoLoad: "--",
    targetDistance: "100 yds",
    targetDistanceValue: "100",
    targetDistanceUnit: "YDS"
  };
}

function targetAttributionOverride(source = {}) {
  const targetProfileId = activeTargetProfileId();
  const missionFamily = activeMissionFamily();
  const base = authoritySafeRecord(source);
  if (isDotTortureProfileId(targetProfileId)) {
    const labels = DOT_TORTURE_PROFILE_LABELS[targetProfileId] || DOT_TORTURE_PROFILE_LABELS.dot_torture_ez2c_style_17;
    return {
      ...base,
      target_profile_id: targetProfileId,
      targetProfileId: targetProfileId,
      mission_family: "",
      missionFamilyId: "",
      mission_name: "",
      missionName: "",
      targetName: labels.targetName,
      targetFamily: labels.targetFamily,
      targetId: targetProfileId
    };
  }
  if (targetProfileId === "gssf_ac_1" || missionFamily === "gssf") {
    return {
      ...base,
      target_profile_id: "gssf_ac_1",
      targetProfileId: "gssf_ac_1",
      mission_family: "gssf",
      missionFamilyId: "gssf",
      targetName: "GSSF AC-1",
      targetFamily: "GSSF AC-1",
      targetId: "gssf_ac_1"
    };
  }
  return source;
}

function ensureTargetSession() {
  if (session) return session;
  matrix = targetAttributionOverride(SCZN3M4.getActiveMatrix() || defaultTargetMatrix());
  matrix = SCZN3M4.saveMatrixSnapshot(matrix);
  session = SCZN3M4.createSession(matrix);
  renderActiveSessionBar();
  return session;
}

function ensureTargetAttribution() {
  if (!isGssfAuthoritySession() && !isDotTortureAuthoritySession()) return;
  matrix = targetAttributionOverride(matrix || {});
  SCZN3M4.saveMatrixSnapshot(matrix);
  if (session) {
    const patchedSession = targetAttributionOverride(session);
    patchedSession.matrixSnapshot = targetAttributionOverride(session.matrixSnapshot || matrix);
    patchedSession.targetAuthority = targetAttributionOverride(session.targetAuthority || {});
    const nextSession = clearIncompatibleAuthorityFromSession(patchedSession);
    session = (SCZN3M4.replaceSession && SCZN3M4.replaceSession(nextSession)) || SCZN3M4.updateActiveSession(nextSession) || nextSession;
    matrix = session.matrixSnapshot || matrix;
    syncAuthorityDerivedState();
  }
}

ensureTargetAttribution();
renderActiveSessionBar();

function cleanSetupValue(value) {
  return /^(Select Manufacturer|Select Model Type|Select Model Caliber|Select Caliber|Select Load|Select Grain)$/i.test(value || "") ? "" : value;
}

function setupLine(label, value) {
  return `<div class="metric"><span>${label}</span><strong>${value || "--"}</strong></div>`;
}

function renderSetupSummary() {
  const setupSummaryGrid = document.getElementById("setupSummaryGrid");
  if (!setupSummaryGrid) return;
  const source = matrix || {};
  const weaponProfile = SCZN3M4.weaponProfileDisplay ? SCZN3M4.weaponProfileDisplay(source) : null;
  const weapon = weaponProfile ? weaponProfile.summary : [source.weaponCategory, source.weaponManufacturer, source.weaponModelType, source.weaponModelCaliber]
    .map(cleanSetupValue)
    .filter(Boolean)
    .join(" / ");
  const weaponMeta = weaponProfile ? [weaponProfile.frameCategory, weaponProfile.barrelLength, weaponProfile.sightRadius, weaponProfile.variantFlags].filter(Boolean).join(" / ") : "";
  const optic = [source.opticType, source.opticBrand, source.opticModel, source.magnification]
    .map(cleanSetupValue)
    .filter(Boolean)
    .join(" / ");
  const ammo = [source.ammoCaliber, source.ammoManufacturer, source.ammoLoad, source.bulletWeight]
    .map(cleanSetupValue)
    .filter(Boolean)
    .join(" / ");
  setupSummaryGrid.innerHTML = [
    setupLine("Weapon", weapon || source.rifle),
    weaponMeta ? setupLine("Glock Catalog", weaponMeta) : "",
    setupLine("Optic", optic),
    setupLine("Ammunition", ammo)
  ].join("");
}

function targetDistanceValue() {
  syncDistanceFromControls();
  return formatDistanceDisplay();
}

function parseDistanceValue(value) {
  const match = String(value || "").match(/\d+/);
  return match ? match[0] : "";
}

function distanceUnitLabel() {
  return selectedDistanceUnit === "M" ? "m" : "yds";
}

function formatDistanceDisplay() {
  return `${selectedDistanceValue || "100"} ${distanceUnitLabel()}`;
}

function distanceOptions() {
  return ["25", "50", "75", "100", "150", "175", "200", "250", "300", "400", "500", "Other"]
    .map(value => `<option${value === selectedDistanceValue || (value === "Other" && !["25", "50", "75", "100", "150", "175", "200", "250", "300", "400", "500"].includes(selectedDistanceValue)) ? " selected" : ""}>${value}</option>`)
    .join("");
}

function escapeHtml(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function trainingDistanceLabel(distance) {
  if (!distance || typeof distance !== "object") return "Distance unavailable";
  const value = distance.value ?? distance.distance ?? "";
  const unit = distance.unit || distance.units || "";
  return `${value} ${unit}`.trim() || "Distance unavailable";
}

function trainingStageGuidance(authorityPackage, index) {
  const stageGuidance = authorityPackage && authorityPackage.display && Array.isArray(authorityPackage.display.stageGuidance)
    ? authorityPackage.display.stageGuidance
    : [];
  const stages = authorityPackage && Array.isArray(authorityPackage.stages) ? authorityPackage.stages : [];
  const stage = stages[index] || {};
  return stageGuidance[index] || stage.guidance || `${stage.label || `Stage ${index + 1}`}: ${stage.rounds || 0} rounds`;
}

function trainingStageSummary(authorityPackage) {
  const stages = authorityPackage && Array.isArray(authorityPackage.stages) ? authorityPackage.stages : [];
  const totalRounds = authorityPackage.total_rounds || authorityPackage.totalRounds || stages.reduce((sum, stage) => sum + Number(stage.rounds || 0), 0);
  return `${stages.length || 0} stages / ${totalRounds || 0} rounds`;
}

function trainingStages(authorityPackage) {
  return authorityPackage && Array.isArray(authorityPackage.stages) ? authorityPackage.stages : [];
}

function trainingStageLabel(authorityPackage, index) {
  const stages = trainingStages(authorityPackage);
  const stage = stages[index] || {};
  return stage.label || `Stage ${index + 1}`;
}

  );

function parseTrainingTimeInput(value) {
  const raw = String(value || "").trim();
  if (!raw) return { ok: true, seconds: null, display: "optional/pending" };
  const clock = raw.match(/^(\d+):([0-5]\d)$/);
  if (clock) {
    const minutes = Number(clock[1]);
    const seconds = Number(clock[2]);
    return { ok: true, seconds: (minutes * 60) + seconds, display: `${minutes}:${String(seconds).padStart(2, "0")}` };
  }
  if (/^\d+(\.\d+)?$/.test(raw) && Number(raw) >= 0) {
    const seconds = Number(raw);
    return { ok: true, seconds, display: `${seconds} sec` };
  }
  return { ok: false, message: "Time must be seconds or mm:ss." };
}

function readTrainingStageScores() {
  const inputs = Array.from(document.querySelectorAll(".training-stage-score-input"));
  const hasAnyStageScore = inputs.some(input => String(input.value || "").trim() !== "");
  if (!hasAnyStageScore) return { ok: true, stageScores: null, total: null };
  const stageScores = [];
  for (const input of inputs) {
    const raw = String(input.value || "").trim();
    const label = input.dataset.stageLabel || "Stage";
    const max = Number(input.dataset.stageMax || 0);
    if (!raw) return { ok: false, message: "Enter all stage scores or use Total Score." };
    if (!/^\d+$/.test(raw)) return { ok: false, message: `${label} score must be a whole number from 0 to ${max}.` };
    const score = Number(raw);
    if (score < 0 || score > max) return { ok: false, message: `${label} score must be between 0 and ${max}.` };
    stageScores.push({
      stageIndex: Number(input.dataset.stageIndex || stageScores.length),
      label,
      score,
      max
    });
  }
  return {
    ok: true,
    stageScores,
    total: stageScores.reduce((sum, stage) => sum + stage.score, 0)
  };
}

function readTrainingManualResult({ requireScore = false } = {}) {
  const maxScore = trainingMaxScore();
  const scoreInput = document.getElementById("trainingManualScore");
  const missesInput = document.getElementById("trainingManualMisses");
  const timeInput = document.getElementById("trainingManualTime");
  const notesInput = document.getElementById("trainingManualNotes");
  const stageRead = readTrainingStageScores();
  if (!stageRead.ok) return stageRead;
  const scoreRaw = String(scoreInput ? scoreInput.value : "").trim();
  let score = stageRead.stageScores ? stageRead.total : null;
  if (score === null && !scoreRaw) {
    return requireScore
      ? { ok: false, message: `Enter a score from 0 to ${maxScore}.` }
      : { ok: true, result: null };
  }
  if (score === null) {
    if (!/^\d+$/.test(scoreRaw)) return { ok: false, message: `Score must be a whole number from 0 to ${maxScore}.` };
    score = Number(scoreRaw);
  }
  if (score < 0 || score > maxScore) return { ok: false, message: `Score must be between 0 and ${maxScore}.` };
  const missesRaw = String(missesInput ? missesInput.value : "").trim();
  let misses = null;
  if (missesRaw) {
    if (!/^\d+$/.test(missesRaw)) return { ok: false, message: "Misses must be zero or greater." };
    misses = Number(missesRaw);
  }
  const parsedTime = parseTrainingTimeInput(timeInput ? timeInput.value : "");
  if (!parsedTime.ok) return parsedTime;
  const notes = String(notesInput ? notesInput.value : "").trim();
  return {
    ok: true,
    result: {
      status: "manual",
      score,
      maxScore,
      percentage: trainingPercentage(score, maxScore),
      scoreSource: stageRead.stageScores ? "stageScores" : "totalScore",
      stageScores: stageRead.stageScores || [],
      misses,
      timeSeconds: parsedTime.seconds,
      timeDisplay: parsedTime.display,
      notes,
      source: "manual"
    }
  };
}

function bindDistanceControl() {
  const distanceInput = document.getElementById("targetDistance");

  distanceInput.addEventListener("change", () => {

    if (distanceInput.value === "Other") {
      selectedDistanceValue = "";
      otherInput.classList.remove("is-hidden");
      otherInput.value = "";
      otherInput.focus();
    } else {
      selectedDistanceValue = distanceInput.value;
      otherInput.classList.add("is-hidden");
      otherInput.value = "";
    }
    updateDistanceDisplay();
  });
  if (otherInput) {
    otherInput.addEventListener("input", () => {

      selectedDistanceValue = otherInput.value;
      updateDistanceDisplay();
    });
  }
  document.querySelectorAll("[data-target-distance-unit]").forEach(button => {
    button.addEventListener("click", () => {
      if (distanceLocked) return;
      selectedDistanceUnit = button.dataset.targetDistanceUnit;
      document.querySelectorAll("[data-target-distance-unit]").forEach(item => item.classList.toggle("is-active", item === button));
      updateDistanceDisplay();

function distanceClickQueryPayload(goToDistance) {
  const source = matrix || {};
  const opticAdjustmentUnit = selectedAdjustmentUnit;
  const opticClickValueMOA = source.opticClickValueMOA || source.clickValueMOA || source.opticClickValue || source.clickValue || 0.25;
  const opticClickValueMRAD = source.opticClickValueMRAD || source.clickValueMRAD || (opticAdjustmentUnit === "MRAD" ? 0.1 : null);
  const opticClickValue = opticAdjustmentUnit === "MRAD" ? opticClickValueMRAD : opticClickValueMOA;
  return {
    currentDistance: Number(selectedDistanceValue || 100),
    currentDistanceUnit: selectedDistanceUnit,
    adjustmentUnit: opticAdjustmentUnit,
    clickValue: Number(opticClickValue),
    goToDistance: Number(goToDistance)
  };
}

async function requestDistanceClickQuery(goToDistance) {
  const response = await fetch(DISTANCE_CLICK_QUERY_ENDPOINT, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(distanceClickQueryPayload(goToDistance))
  });
  if (!response.ok) {
    throw new Error(`Distance click authority failed: ${response.status}`);
  }
  return response.json();
}

function bindGuidanceCard() {
  const calculateButton = document.getElementById("calculateDistanceClicks");
  if (!calculateButton) return;
  calculateButton.addEventListener("click", async () => {
    const desired = Number(document.getElementById("desiredZeroDistance").value);
    const result = document.getElementById("guidanceResult");
    if (!Number.isFinite(desired)) {
      result.textContent = "Dial:";
      return;
    }
    result.textContent = "Dial: Checking authority...";
    result.dataset.unit = selectedDistanceUnit;
    result.dataset.adjustmentUnit = selectedAdjustmentUnit;
    try {
      const authority = await requestDistanceClickQuery(desired);
      result.textContent = authority && authority.ok === true && authority.display
        ? authority.display
        : "Dial: Backend authority required";
    } catch (error) {
      result.textContent = "Dial: Backend authority required";
    }
  });
}

    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(reader.error);
    reader.readAsDataURL(file);
  });
}

function downsizeImageDataUrl(dataUrl, maxSize = 1200) {
  return new Promise(resolve => {
    const image = new Image();
    image.onload = () => {
      const scale = Math.min(1, maxSize / Math.max(image.naturalWidth || 1, image.naturalHeight || 1));
      if (scale >= 1) {
        resolve(dataUrl);
        return;
      }
      const canvas = document.createElement("canvas");
      canvas.width = Math.max(1, Math.round(image.naturalWidth * scale));
      canvas.height = Math.max(1, Math.round(image.naturalHeight * scale));
      const context = canvas.getContext("2d");
      context.drawImage(image, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL("image/jpeg", 0.86));
    };
    image.onerror = () => resolve(dataUrl);
    image.src = dataUrl;
  });
}

function columnLabel(index) {
  let value = index + 1;
  let label = "";
  while (value > 0) {
    value -= 1;
    label = String.fromCharCode(65 + (value % 26)) + label;
    value = Math.floor(value / 26);
  }
  return label;
}

function renderGridCoordinateOverlay() {

  const columns = Math.round((grid.rightPx - grid.leftPx) / grid.squarePx);
  const rows = Math.round((grid.bottomPx - grid.topPx) / grid.squarePx);
  const columnLabels = Array.from({ length: columns }, (_, index) => {

function compactClick(value, axis) {
  if (!value) return "Not calculated";
  const label = typeof value === "object" && value.label ? value.label : String(value);
  const amount = typeof value === "object" && Number.isFinite(Number(value.clicks))
    ? String(Math.abs(Number(value.clicks)))
    : (label.match(/\d+/)?.[0] || "0");
  const upper = typeof value === "object" && value.direction
    ? String(value.direction).toUpperCase()
    : label.toUpperCase();
  if (axis === "elevation") {
    if (upper.includes("UP")) return `${amount} Clicks ↑`;
    if (upper.includes("DOWN")) return `${amount} Clicks ↓`;
  }
  if (axis === "windage") {
    if (upper.includes("RIGHT")) return `${amount} Clicks →`;
    if (upper.includes("LEFT")) return `${amount} Clicks ←`;
  }
  return `${amount} Clicks`;
}

    .concat(Array.from(document.querySelectorAll(".training-stage-score-input")));
  if (counter) counter.textContent = `Stage ${trainingStageIndex + 1} of ${Math.max(stages.length, 1)}`;
  if (stageLabel) stageLabel.textContent = trainingStageLabel(authorityPackage, trainingStageIndex);
  if (stageTitle) stageTitle.textContent = `Stage ${trainingStageIndex + 1}`;
  if (stageRounds) stageRounds.textContent = String((stages[trainingStageIndex] && stages[trainingStageIndex].rounds) || "--");
  if (guidance) guidance.innerHTML = hasBackendTrainingPackage
    ? conciseTrainingInstruction(authorityPackage, trainingStageIndex)
    : "Backend-authorized stage guidance is loading.";
  if (beginButton) {
    beginButton.disabled = !hasBackendTrainingPackage || trainingDrillFinished;
    beginButton.textContent = trainingStageIndex >= maxIndex ? "Finish Drill" : (trainingStageIndex === 0 ? "Begin Stage" : "Next Stage");
    beginButton.onclick = () => {
      if (!hasBackendTrainingPackage || trainingDrillFinished) return;
      if (trainingStageIndex < maxIndex) {
        trainingStageIndex += 1;
        renderDotTortureTrainingResults(authorityPackage);
      } else {
        trainingDrillFinished = true;
        renderDotTortureTrainingResults(authorityPackage);
        renderMarkStatus();
      }
    };
  }
  if (previousButton) {
    previousButton.disabled = !hasBackendTrainingPackage || trainingDrillFinished || trainingStageIndex <= 0;
    previousButton.onclick = () => {
      if (trainingStageIndex > 0) {
        trainingStageIndex -= 1;
        renderDotTortureTrainingResults(authorityPackage);
      }
    };
  }
  if (nextButton) {
    nextButton.disabled = !hasBackendTrainingPackage || trainingDrillFinished || trainingStageIndex >= maxIndex;
    nextButton.classList.toggle("secondary", !hasBackendTrainingPackage || trainingDrillFinished || trainingStageIndex >= maxIndex);
    nextButton.onclick = () => {
      if (trainingStageIndex < maxIndex) {
        trainingStageIndex += 1;
        renderDotTortureTrainingResults(authorityPackage);
      }
    };
  }
  if (finishButton) {
    const finishIsPrimary = hasBackendTrainingPackage && !trainingDrillFinished && trainingStageIndex >= maxIndex;
    finishButton.disabled = !hasBackendTrainingPackage;
    finishButton.textContent = trainingDrillFinished ? "Drill Complete" : "Finish Drill";
    finishButton.classList.toggle("secondary", !finishIsPrimary);
    finishButton.onclick = () => {
      trainingDrillFinished = true;
      renderDotTortureTrainingResults(authorityPackage);
      renderMarkStatus();
    };
  }
  if (status) {
    status.textContent = !hasBackendTrainingPackage
      ? "Backend stage guidance required."
      : (trainingDrillFinished ? "Training SEC ready. Save when ready." : "");
  }
  if (secPreview) secPreview.classList.toggle("is-hidden", !trainingDrillFinished);
  if (savedStatus) savedStatus.textContent = sessionSaved ? "saved" : "pending";
  manualFields.forEach(field => {
    if (!field.dataset.trainingManualBound) {
      field.addEventListener("input", updateTrainingManualPreview);
      field.dataset.trainingManualBound = "true";
    }
  });
  updateTrainingManualPreview();
  const message = document.getElementById("authorityStatusMessage");
  if (message) {
    message.innerHTML = authorityStatusMessage
      ? `<strong>${authorityStatusMessage}</strong><span class="authority-status-subtext">Your target data has not been lost.</span>`
      : "";
    message.classList.toggle("is-hidden", !authorityStatusMessage);
  }
}

function renderResults() {
  if (isMissionResolving() || isMissionResolutionUnavailable()) {
    renderMissionResolutionState();
    return;
  }
  syncAuthorityDerivedState();
  const impacts = currentImpactPoints;
  const numericScore = currentScore === null ? NaN : Number(currentScore);
  document.body.dataset.authorityStatus = authorityStatusMessage ? "true" : "false";
  if (isDotTortureAuthoritySession() || isDotTortureTrainingPackage(backendAuthorityPackage)) {
    renderDotTortureTrainingResults(dotTortureWorkspacePackage());
    return;
  }
  if (isGssfAuthorityPackage(backendAuthorityPackage)) {
    const resultBlock = document.getElementById("gssfAuthorityResult");
    const lines = backendAuthorityPackage.display && Array.isArray(backendAuthorityPackage.display.resultLines)
      ? backendAuthorityPackage.display.resultLines
      : [];
    if (resultBlock) {
      resultBlock.innerHTML = lines.map(line => `<div>${line}</div>`).join("");
    }
    const message = document.getElementById("authorityStatusMessage");
    if (message) {
      message.innerHTML = authorityStatusMessage
        ? `<strong>${authorityStatusMessage}</strong><span class="authority-status-subtext">Your target data has not been lost.</span>`
        : "";
      message.classList.toggle("is-hidden", !authorityStatusMessage);
    }
    return;
  }
  const scoreCell = document.getElementById("scoreCell");
  if (!scoreCell) return;
  scoreCell.className = `target-intel-score ${scoreClass(numericScore)}`;
  document.getElementById("scoreValue").textContent = Number.isFinite(numericScore) ? String(numericScore) : "--";
  const hitsParts = [`${impacts.length} Hits`];
  if (currentClicks) {
    hitsParts.push(compactClickToken(currentClicks.elevation, "elevation"), compactClickToken(currentClicks.windage, "windage"));
  }
  document.getElementById("hitsValue").textContent = hitsParts.join(" • ");
  const message = document.getElementById("authorityStatusMessage");
  if (message) {
    message.innerHTML = authorityStatusMessage
      ? `<strong>${authorityStatusMessage}</strong><span class="authority-status-subtext">Your target data has not been lost.</span>`
      : "";
    message.classList.toggle("is-hidden", !authorityStatusMessage);
  }
}

function hideShooterTip() {
  const tip = document.getElementById("shooterTip");
  const text = document.getElementById("shooterTipText");
  if (tip) tip.classList.add("is-hidden");
  if (text) text.textContent = "";
}

function shooterTipFromResults() {
  if (!currentClicks || !currentImpactPoints.length) return "Record confirmed impacts before saving.";
  if (currentImpactPoints.length < 3) return "Add more confirmed impacts for a stronger read.";
  const windage = Number(currentClicks.windageClicks || 0);
  const elevation = Number(currentClicks.elevationClicks || 0);
  const windageDirection = String(currentClicks.windageDirection || "CENTER").toLowerCase();
  const elevationDirection = String(currentClicks.elevationDirection || "CENTER").toLowerCase();
  if (windage === 0 && elevation === 0) return "Group is centered; confirm with another string.";
  if (elevation > windage) return "Apply elevation " + elevationDirection + ", then confirm.";
  if (windage > elevation) return "Apply windage " + windageDirection + ", then confirm.";
  return "Apply both corrections, then confirm.";
}

function showShooterTip() {
  const tip = document.getElementById("shooterTip");
  const text = document.getElementById("shooterTipText");
  if (!tip || !text) return;
  text.textContent = shooterTipFromResults();
  tip.classList.remove("is-hidden");
}

function clearCalculatedResults() {
  currentClicks = null;
  currentScore = null;
  backendAuthorityPackage = null;
  resultsShown = false;
  authorityStatusMessage = "";
  sessionSaved = false;
  hideShooterTip();
  renderResults();
}

function setNextStep(activeId) {
  ["chooseTargetButton", "setAimMode", "addImpactMode", "showResults", "saveMarks"].forEach(id => {
    document.getElementById(id).classList.toggle("next-step", !!activeId && id === activeId);
  });
}

function updateHitCounter() {
  const counter = document.getElementById("targetHitCounter");
  if (!counter) return;
  const count = currentImpactPoints.length;
  counter.querySelector("strong").textContent = String(count);
  counter.querySelector("span").textContent = count === 1 ? "Tap" : "Taps";
  counter.dataset.hitCount = String(count);
}

function rangeWorkflowState(canMark) {
  if (!canMark) return "choose-target";
  if (isDotTortureAuthoritySession()) {
    if (!resultsShown) return "show-results";
    if (!trainingDrillFinished) return "training-drill";
    if (!sessionSaved) return "save-session";
    return "view-sec";
  }
  if (isGssfAuthoritySession()) {
    if (!currentImpactPoints.length) return "tap-holes";
    if (!resultsShown) return "show-results";
    if (!sessionSaved) return "save-session";
    return "view-sec";
  }
  if (!currentAimPoint) return "tap-aim";
  if (!currentImpactPoints.length) return "tap-holes";
  if (!resultsShown) return "show-results";
  if (!sessionSaved) return "save-session";
  return "view-sec";
}

function renderMarkStatus() {
  if (isMissionResolving() || isMissionResolutionUnavailable()) {
    setMissionResolutionChrome();
    ["chooseTargetButton", "setAimMode", "addImpactMode", "showResults", "undoImpact", "clearMarks", "saveMarks"].forEach(id => {
      const control = document.getElementById(id);
      if (control) {
        control.disabled = true;
        control.classList.remove("next-step");
      }
    });
    document.body.dataset.rangeState = isMissionResolving() ? "mission-resolving" : "mission-unavailable";
    document.body.dataset.hasEvidence = "false";
    document.body.dataset.hasResults = "false";
    document.body.dataset.targetMission = "resolving";
    return;
  }
  setMissionResolutionChrome();
  const isGssf = isGssfAuthoritySession();
  const isTraining = isDotTortureAuthoritySession();
  const hasEvidence = hasMarkableEvidence();
  const canProceed = hasEvidence || isTraining;
  updateHitCounter();
  document.getElementById("setAimMode").disabled = !hasEvidence || isGssf || isTraining;
  document.getElementById("addImpactMode").disabled = !hasEvidence || isTraining || (!currentAimPoint && !isGssf);
  document.getElementById("undoImpact").disabled = !hasEvidence || isTraining || currentImpactPoints.length === 0;
  document.getElementById("clearMarks").disabled = !hasEvidence || isTraining || (!currentAimPoint && currentImpactPoints.length === 0);
  document.getElementById("saveMarks").disabled = !session || sessionSaved || !resultsShown || (isTraining && !trainingDrillFinished);
  document.getElementById("showResults").disabled = !canProceed || (!isTraining && currentImpactPoints.length === 0);
  let nextStep = "chooseTargetButton";
  if (canProceed && isTraining && !resultsShown) nextStep = "showResults";
  if (hasEvidence && isGssf && !currentImpactPoints.length) nextStep = "addImpactMode";
  if (hasEvidence && !isGssf && !isTraining && !currentAimPoint) nextStep = "setAimMode";
  if (hasEvidence && !isGssf && !isTraining && currentAimPoint && !currentImpactPoints.length) nextStep = "addImpactMode";
  if (hasEvidence && !isTraining && currentImpactPoints.length && !resultsShown) nextStep = "showResults";
  if (canProceed && resultsShown && (!isTraining || trainingDrillFinished)) nextStep = "saveMarks";
  if (sessionSaved) nextStep = null;
  setNextStep(nextStep);
  document.body.dataset.rangeState = rangeWorkflowState(canProceed);
  document.body.dataset.hasEvidence = hasEvidence ? "true" : "false";
  document.body.dataset.hasResults = resultsShown ? "true" : "false";
  document.body.dataset.targetMission = isTraining ? "marksmanshipTraining" : (isGssf ? "gssf" : "zeroing");
}

function setMode(mode) {
  markMode = mode;
  renderMarkStatus();
}

function handleMarkTap(event) {
  if (!hasMarkableEvidence()) return;
  if (resultsShown) return;
  syncOverlayLayerToDisplayedImage();
  const layer = document.getElementById("markerLayer");
  const rect = (layer || event.currentTarget).getBoundingClientRect();
  const xPercent = Math.max(0, Math.min(100, ((event.clientX - rect.left) / rect.width) * 100));
  const yPercent = Math.max(0, Math.min(100, ((event.clientY - rect.top) / rect.height) * 100));
  const point = {
    xPercent: Number(xPercent.toFixed(2)),
    yPercent: Number(yPercent.toFixed(2))
  };
  if (isGssfAuthoritySession()) {
    currentImpactPoints.push(point);
  } else if (markMode === "aim" || !currentAimPoint) {
    currentAimPoint = point;
    markMode = "impact";
  } else {
    currentImpactPoints.push(point);
  }
  clearCalculatedResults();
  setMode(markMode);
  renderMarkers();
  renderMarkStatus();
}

function handleMarkPointer(event) {
  if (resultsShown) return;
  if (!hasMarkableEvidence()) return;
  handleMarkTap(event);
  event.preventDefault();
}

if (TARGET_PROFILE_LAUNCH_ID) {
  renderMissionResolutionState();
} else {
  renderEvidencePreview(session && session.targetEvidenceImage);
}

document.getElementById("chooseTargetButton").addEventListener("click", () => {
  ensureTargetSession();
  const input = document.getElementById("targetImageInput");
  input.value = "";
});
document.getElementById("chooseTargetButton").addEventListener("keydown", event => {
  if (event.key === "Enter" || event.key === " ") {
    event.preventDefault();
    event.currentTarget.click();
  }
});

document.getElementById("targetImageInput").addEventListener("change", event => {
  ensureTargetSession();
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  readFileAsDataUrl(file).then(dataUrl => downsizeImageDataUrl(dataUrl)).then(dataUrl => {
    currentAimPoint = null;
    currentImpactPoints = [];
    sessionSaved = false;
    unlockDistanceForNewTarget();
    if (isDotTortureAuthoritySession()) {
      currentClicks = null;
      currentScore = null;
      authorityStatusMessage = "";
      hideShooterTip();
    } else {
      clearCalculatedResults();
    }
    pendingEvidence = {
      dataUrl,
      name: file.name,
      type: file.type,
      size: dataUrl.length,
      originalSize: file.size
    };
    renderEvidencePreview(pendingEvidence);
    setMode(isGssfAuthoritySession() ? "impact" : "aim");
    renderMarkStatus();
  }).catch(error => {
    console.warn("Target image read failed", error);
  });
});

document.getElementById("showGridCoordinates").addEventListener("change", event => {
  showGridCoordinates = event.target.checked;
  syncOverlayLayerToDisplayedImage();
  renderGridCoordinateOverlay();
});

document.getElementById("setAimMode").addEventListener("click", () => setMode("aim"));
document.getElementById("addImpactMode").addEventListener("click", () => {
  if (currentAimPoint || isGssfAuthoritySession()) setMode("impact");
});
document.getElementById("undoImpact").addEventListener("click", () => {
  currentImpactPoints.pop();
  clearCalculatedResults();
  renderMarkers();
  renderMarkStatus();
});
document.getElementById("clearMarks").addEventListener("click", () => {
  currentAimPoint = null;
  currentImpactPoints = [];
  clearCalculatedResults();
  SCZN3M4.updateActiveSession({
    aimPoint: null,
    impactPoints: [],
    backendAuthorityPackage: null,
    ugeoAuthorityPackage: null,
    poib: null,
    groupCenter: null,
    clicks: null,
    score: null,
    rawScore: null,
    qualityPossible: null,
    hits: 0,
    shotCount: 0,
    correctionStatus: "not-calculated",
    shotData: { shotCount: 0, hits: 0, score: null, status: "marks-cleared" },
    correctionData: { status: "not-calculated", clicks: null, windage: null, elevation: null }
  });
  setMode("aim");
  renderMarkers();
  renderMarkStatus();
});
document.getElementById("showResults").addEventListener("click", async () => {
  if ((!isGssfAuthoritySession() && !isDotTortureAuthoritySession() && !currentAimPoint) || (!isDotTortureAuthoritySession() && !currentImpactPoints.length)) return;
  if (isDotTortureAuthoritySession() && !session) ensureTargetSession();
  authorityStatusMessage = "";
  renderResults();
  try {
    const authorityPackage = await requestBackendAuthority();
    applyBackendAuthorityPackage(authorityPackage);
    try {
      if (window.SCZN3Ops) window.SCZN3Ops.recordShowResults(authorityPackage);
    } catch (error) {}
    renderMarkers();
    renderResults();
    if (resultsShown && !isNonZeroingAuthorityPackage(authorityPackage)) showShooterTip();
    if (resultsShown && isNonZeroingAuthorityPackage(authorityPackage)) hideShooterTip();
  } catch (error) {
    console.warn("Backend authority request failed", error);
    currentClicks = null;
    currentScore = null;
    backendAuthorityPackage = null;
    resultsShown = false;
    authorityStatusMessage = "Authority service unavailable. Please try again.";
    renderResults();
  }
  renderMarkStatus();
});
document.getElementById("saveMarks").addEventListener("click", () => {
  if (!session || !backendAuthorityPackage) return;
  let saved = null;
  if (pendingEvidence) {
    saved = SCZN3M4.saveTargetEvidenceImage(pendingEvidence);
    pendingEvidence = null;
  }
  lockDistanceForSession();
  const savedTimestamp = new Date().toISOString();
  let authorityPackage = backendAuthorityPackage;
  let trainingManualResult = null;
  if (isDotTortureTrainingPackage(authorityPackage)) {
    const manualRead = readTrainingManualResult({ requireScore: true });
    if (!manualRead.ok) {
      trainingDrillFinished = true;
      renderResults();
      showTrainingManualError(manualRead.message);
      return;
    }
    trainingManualResult = {
      ...manualRead.result,
      savedAt: savedTimestamp
    };
    authorityPackage = authorityPackageWithTrainingManualResult(authorityPackage, trainingManualResult, true);
    backendAuthorityPackage = authorityPackage;
  }
  const authorityClicks = zeroingClicksFromAuthorityPackage(authorityPackage);
  const hadSavedHistoryBefore = (SCZN3M4.getSessionHistory ? SCZN3M4.getSessionHistory() : [])
    .some(historySession => historySession && historySession.savedToSEC === true && historySession.sessionId !== session.sessionId);
  const savePatch = isDotTortureTrainingPackage(authorityPackage) ? {
    backendAuthorityPackage: authorityPackage,
    ugeoAuthorityPackage: authorityPackage,
    trainingManualResult,
    score: authorityPackage.score || null,
    scoreValue: trainingManualResult ? trainingManualResult.score : null,
    shotData: {
      status: "training-manual",
      score: authorityPackage.score || null,
      scoreValue: trainingManualResult ? trainingManualResult.score : null,
      authoritySource: "backend",
      manualSource: "shooter-entry"
    },
    hits: 0,
    shotCount: 0,
    correctionStatus: "not-applicable",
    savedToSEC: true,
    targetDistance: targetDistanceValue(),
    targetDistanceValue: selectedDistanceValue,
    targetDistanceUnit: selectedDistanceUnit,
    targetDistanceLocked: true,
    distance: targetDistanceValue(),
    timestamp: savedTimestamp,
    savedAt: savedTimestamp
  } : {
    aimPoint: safePoint(currentAimPoint),
    impactPoints: currentImpactPoints.map(safePoint).filter(Boolean),
    backendAuthorityPackage: authorityPackage,
    ugeoAuthorityPackage: authorityPackage,
    score: authorityPackage.score || null,
    scoreValue: backendScoreValue(authorityPackage),
    poib: authorityPackage.poib || null,
    groupCenter: authorityPackage.groupCenter || null,
    clicks: authorityClicks,
    correctionData: {
      status: authorityPackage.status && authorityPackage.status.hasCorrection ? "backend-authority-calculated" : "not-calculated",
      clicks: authorityClicks,
      correction: authorityPackage.correction || null,
      moa: authorityPackage.moa || null,
      vectors: authorityPackage.vectors || null
    },
    shotData: {
      aimPoint: safePoint(currentAimPoint),
      impactPoints: currentImpactPoints.map(safePoint).filter(Boolean),
      shotCount: currentImpactPoints.length,
      hits: currentImpactPoints.length,
      poib: authorityPackage.poib || null,
      groupCenter: authorityPackage.groupCenter || null,
      score: authorityPackage.score || null,
      scoreValue: backendScoreValue(authorityPackage),
      authoritySource: "backend"
    },
    hits: currentImpactPoints.length,
    shotCount: currentImpactPoints.length,
    correctionStatus: "backend-authority-calculated",
    savedToSEC: true,
    targetDistance: targetDistanceValue(),
    targetDistanceValue: selectedDistanceValue,
    targetDistanceUnit: selectedDistanceUnit,
    targetDistanceLocked: true,
    distance: targetDistanceValue(),
    timestamp: savedTimestamp,
    savedAt: savedTimestamp
  };
  saved = SCZN3M4.updateActiveSession(savePatch);
  if (saved && saved.targetEvidenceImage) {
    renderEvidencePreview(saved.targetEvidenceImage);
  }
  try {
    if (window.SCZN3Ops) window.SCZN3Ops.recordSessionSaved(saved, { hadSavedHistoryBefore });
  } catch (error) {}
  sessionSaved = true;
  renderMarkStatus();
  renderResults();
  if (saved) window.location.href = "records.html";
});

window.addEventListener("resize", () => {
  syncOverlayLayerToDisplayedImage();
  renderMarkers();
});

if (TARGET_PROFILE_LAUNCH_ID) {
  resolveMissionFromTargetProfile();
} else {
  setMode(isGssfAuthoritySession() ? "impact" : (currentAimPoint ? "impact" : "aim"));
  renderSetupSummary();
  renderResults();
}
</script>
</body>
</html>
