<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Weapon Setup</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<main class="shell">
  <header class="m4-header">
    <div class="vendor-slot">
      <img src="assets/BAKER_ST_100YD_SMART_AUTHORITY_v1_ORIGINAL.png" alt="Baker 100 Yard Smart Target thumbnail" />
      <div class="brand-lockup">
        <a class="vendor-name" href="index.html">Baker Smart Targets</a>
      </div>
    </div>
    <button class="mobile-menu-toggle" type="button" aria-label="Open navigation menu" aria-expanded="false">☰</button>
    <nav class="locked-nav" aria-label="Baker workflow navigation">
      <a class="locked-nav-item" href="index.html"><span class="nav-dot"></span><span>🏠 Home</span></a>
      <a class="locked-nav-item is-active" href="matrix.html"><span class="nav-dot"></span><span>Weapon Setup</span></a>
      <a class="locked-nav-item" href="shoot.html"><span class="nav-dot"></span><span class="target-nav-icon" aria-hidden="true"></span><span>Target</span></a>
      <a class="locked-nav-item" href="records.html"><span class="nav-dot"></span><span>SEC</span></a>
    </nav>
  </header>
  <section class="active-session-bar" id="activeSessionBar"></section>

  <section class="matrix-only">
    <form class="panel matrix-form" id="matrixForm">
      <span class="kicker">Setup</span>
      <h1>Weapon Setup</h1>
      <p>Review your setup or start a new session.</p>

      <div class="action-grid">
        <button class="button" type="button" id="newSetup">New Setup</button>
        <button class="button" type="button" id="saveSetup">Save Setup</button>
        <button class="button primary" type="submit">Start Session</button>
      </div>

      <section class="form-section">
        <h2>Weapon System</h2>
        <div class="category-pill-row" role="group" aria-label="Weapon Category">
          <button class="category-pill" type="button" data-weapon-category="Rifle">Rifle</button>
          <button class="category-pill" type="button" data-weapon-category="Pistol">Pistol</button>
          <button class="category-pill" type="button" data-weapon-category="Shotgun">Shotgun</button>
        </div>
        <input type="hidden" name="weaponCategory" id="weaponCategory" value="Rifle" />
        <div class="matrix-grid">
          <label>Manufacturer<select name="weaponManufacturer" id="weaponManufacturer">
            <option>Select Manufacturer</option><option>Colt</option><option>FN</option><option>Daniel Defense</option><option>BCM</option><option>Aero Precision</option><option>Smith & Wesson</option><option>Ruger</option><option>Sig Sauer</option><option>Springfield Armory</option><option>Other</option>
          </select></label>
          <label class="is-hidden">Custom Manufacturer<input name="customWeaponManufacturer" id="customWeaponManufacturer" placeholder="Optional custom manufacturer" /></label>
          <label>Model Type<select name="weaponModelType" id="weaponModelType">
            <option>Select Model Type</option><option>Other</option>
          </select></label>
          <label class="is-hidden">Custom Model Type<input name="customWeaponModelType" id="customWeaponModelType" placeholder="Optional custom model type" /></label>
          <label>Model Caliber<select name="weaponModelCaliber" id="weaponModelCaliber">
            <option>Select Model Caliber</option><option>Other</option>
          </select></label>
          <label class="is-hidden">Custom Model Caliber<input name="customWeaponModelCaliber" id="customWeaponModelCaliber" placeholder="Optional custom model caliber" /></label>
          <label>Barrel Length <span class="optional-label">Optional</span><input name="barrelLength" placeholder="Optional" /></label>
        </div>
      </section>

      <section class="form-section">
        <h2>Optic System</h2>
        <div class="matrix-grid">
          <label>Optic Type<select name="opticType" id="opticType">
            <option>Iron Sights</option><option>Red Dot</option><option>Holographic</option><option>Prism</option><option>LPVO</option><option>Scope</option><option>Other</option>
          </select></label>
          <label class="is-hidden">Custom Optic Type<input name="customOpticType" id="customOpticType" placeholder="Optional custom optic type" /></label>
          <label>Manufacturer<select name="opticBrand" id="opticBrand">
            <option>Iron Sights</option><option>Aimpoint</option><option>EOTech</option><option>Trijicon</option><option>Vortex</option><option>Leupold</option><option>Holosun</option><option>Primary Arms</option><option>Other</option>
          </select></label>
          <label class="is-hidden">Custom Manufacturer<input name="customOpticManufacturer" id="customOpticManufacturer" placeholder="Optional custom manufacturer" /></label>
          <label>Model<select name="opticModel" id="opticModel">
            <option>Iron Sights</option><option>Other</option>
          </select></label>
          <label class="is-hidden">Custom Model<input name="customOpticModel" id="customOpticModel" placeholder="Optional custom model" /></label>
          <label>Magnification<select name="magnification" id="magnification">
            <option>1x</option><option>1-4x</option><option>1-6x</option><option>1-8x</option><option>2-10x</option><option>3-9x</option><option>4-12x</option><option>Other</option>
          </select></label>
          <label class="is-hidden">Custom Magnification<input name="customMagnification" id="customMagnification" placeholder="Optional custom magnification" /></label>
          <label>Adjustment Unit<select name="opticAdjustmentUnit" id="opticAdjustmentUnit">
            <option selected>MOA</option><option>MRAD</option>
          </select></label>
          <label>Click Value<select name="opticClickValueLabel" id="opticClickValueLabel">
            <option selected>1/4 MOA</option><option>1/2 MOA</option><option>1 MOA</option><option>Custom</option>
          </select></label>
          <label class="is-hidden">Custom Click Value<input name="customOpticClickValue" id="customOpticClickValue" inputmode="decimal" placeholder="Optional click value" /></label>
        </div>
      </section>

      <section class="form-section">
        <h2>Ammunition</h2>
        <div class="matrix-grid">
          <label>Caliber<select name="ammoCaliber" id="ammoCaliber">
            <option>Select Caliber</option><option>5.56 NATO</option><option>.223 Rem</option><option>.308 Win</option><option>6.5 Creedmoor</option><option>9mm</option><option>.45 ACP</option><option>12 Gauge</option><option>20 Gauge</option><option>Other</option>
          </select></label>
          <label class="is-hidden">Custom Caliber<input name="customAmmoCaliber" id="customAmmoCaliber" placeholder="Optional custom caliber" /></label>
          <label>Manufacturer<select name="ammoManufacturer" id="ammoManufacturer">
            <option>Select Manufacturer</option><option>Lake City</option><option>Federal</option><option>Winchester</option><option>Hornady</option><option>Remington</option><option>PMC</option><option>IMI</option><option>Black Hills</option><option>Sig Sauer</option><option>Fiocchi</option><option>Sellier & Bellot</option><option>Prvi Partizan</option><option>Norma</option><option>Magtech</option><option>Other</option>
          </select></label>
          <label class="is-hidden">Custom Manufacturer<input name="customAmmoManufacturer" id="customAmmoManufacturer" placeholder="Optional custom manufacturer" /></label>
          <label>Load / Model<select name="ammoLoad" id="ammoLoad">
            <option>Select Load</option><option>Other</option>
          </select></label>
          <label class="is-hidden">Custom Load / Model<input name="customAmmoLoad" id="customAmmoLoad" placeholder="Optional custom load or model" /></label>
          <label>Grain<select name="bulletWeight" id="bulletWeight">
            <option>Select Grain</option><option>Other</option>
          </select></label>
          <label class="is-hidden">Custom Grain<input name="customBulletWeight" id="customBulletWeight" placeholder="Optional custom grain" /></label>
        </div>
      </section>

      <section class="form-section">
        <h2>Distance</h2>
        <div class="matrix-grid distance-setup-grid">
          <label>Distance<select name="targetDistanceValue" id="matrixDistanceValue">
            <option>25</option><option>50</option><option>75</option><option selected>100</option><option>150</option><option>175</option><option>200</option><option>250</option><option>300</option><option>400</option><option>500</option><option>Other</option>
          </select></label>
          <label class="is-hidden">Custom Distance<input name="customTargetDistanceValue" id="customTargetDistanceValue" inputmode="numeric" pattern="[0-9]*" /></label>
          <label>Unit<select name="targetDistanceUnit" id="matrixDistanceUnit">
            <option selected>YDS</option><option>M</option>
          </select></label>
        </div>
      </section>

      <section class="form-section attribution-banner">
        <h2>Attribution</h2>
        <div class="matrix-grid">
          <label>Shooter<input name="shooterName" autocomplete="name" /></label>
          <label>Unit<input name="unit" /></label>
          <label>Agency<input name="agency" /></label>
          <label>Instructor<input name="instructor" /></label>
        </div>
      </section>

      <section class="form-section">
        <h2>Weather</h2>
        <div class="matrix-grid">
          <label>Temperature<input name="temperature" placeholder="72 F" /></label>
          <label>Wind<input name="wind" placeholder="5 mph left to right" /></label>
          <label>Conditions<input name="weather" placeholder="clear" /></label>
        </div>
      </section>

      <section class="form-section">
        <h2>Saved Setups Library</h2>
        <div class="matrix-grid">
          <label>Saved Setup<select id="savedSetupSelect">
            <option value="">Select Saved Setup</option>
          </select></label>
          <label>Setup Name<input id="setupName" placeholder="Optional setup name" /></label>
        </div>
      </section>
    </form>
  </section>
</main>

function setOptions(select, options, selectedValue = "") {
  const values = [...new Set(options)];
  select.innerHTML = values.map(value => `<option>${value}</option>`).join("");
  if (selectedValue && !values.includes(selectedValue)) {
    select.insertAdjacentHTML("beforeend", `<option>${selectedValue}</option>`);
  }
  if (selectedValue) select.value = selectedValue;
}

function selectedWeaponCategory() {
  return document.getElementById("weaponCategory").value || "Rifle";
}

function setWeaponCategory(category = "Rifle") {
  const nextCategory = WEAPON_CATEGORY_MANUFACTURERS[category] ? category : "Rifle";
  document.getElementById("weaponCategory").value = nextCategory;
  document.querySelectorAll("[data-weapon-category]").forEach(button => {
    button.classList.toggle("is-active", button.dataset.weaponCategory === nextCategory);
  });
}

function inferWeaponCategory(values = {}) {
  if (values.weaponCategory && WEAPON_CATEGORY_MANUFACTURERS[values.weaponCategory]) return values.weaponCategory;
  const manufacturer = values.weaponManufacturer || "";
  const model = `${values.weaponModelType || ""} ${values.weaponModelCaliber || ""}`;
  if (["Mossberg", "Benelli", "Winchester", "Stoeger"].includes(manufacturer) || /12 Gauge|20 Gauge|Shotgun|Maverick|SuperNova|SXP/i.test(model)) return "Shotgun";
  if (["Glock", "Walther"].includes(manufacturer) || /Hellcat|P320|P365|Echelon|Shield|Pistol|G17|G19|G43|VP9|USP|PDP|PPQ|Shadow|9mm|\\.45 ACP|\\.40 S&W/i.test(model)) return "Pistol";
  return "Rifle";
}

function isSelectedPlaceholder(value) {
  return /^(Select Manufacturer|Select Model Type|Select Model Caliber|Select Caliber|Select Load|Select Grain)$/i.test(value || "");
}

function toggleField(selectId, shouldShow) {
  const field = document.getElementById(selectId);
  if (!field) return;
  field.closest("label").classList.toggle("is-hidden", !shouldShow);
}

function toggleCustom(inputId, shouldShow) {
  const input = document.getElementById(inputId);
  if (!input) return;
  input.closest("label").classList.toggle("is-hidden", !shouldShow);
  if (shouldShow) input.focus();
}

function updateWeaponManufacturers(selectedValue = "") {
  const options = WEAPON_CATEGORY_MANUFACTURERS[selectedWeaponCategory()] || WEAPON_CATEGORY_MANUFACTURERS.Rifle;
  setOptions(document.getElementById("weaponManufacturer"), options, selectedValue);
  toggleCustom("customWeaponManufacturer", document.getElementById("weaponManufacturer").value === "Other");
  updateWeaponModelTypes();
}

function updateWeaponModelTypes(selectedValue = "") {
  const manufacturer = document.getElementById("weaponManufacturer").value || "Select Manufacturer";
  const categoryModels = WEAPON_MODEL_TYPE_FILTERS[selectedWeaponCategory()] || {};
  setOptions(document.getElementById("weaponModelType"), categoryModels[manufacturer] || WEAPON_MODEL_TYPES[manufacturer] || WEAPON_MODEL_TYPES.Other, selectedValue);
  toggleField("weaponModelType", !isSelectedPlaceholder(manufacturer));
  toggleCustom("customWeaponManufacturer", manufacturer === "Other");
  updateWeaponModelCalibers();
}

function updateOpticClickValues(selectedValue = "") {

  const select = document.getElementById("opticClickValueLabel");
  setOptions(select, OPTIC_CLICK_VALUE_OPTIONS[unit], selectedValue);
  if (!select.value || !OPTIC_CLICK_VALUE_OPTIONS[unit].includes(select.value)) {
    select.value = OPTIC_CLICK_VALUE_OPTIONS[unit][0];
  }
  toggleCustom("customOpticClickValue", select.value === "Custom");

function cleanDecimal(value) {
  const match = String(value || "").match(/\d+(?:\.\d+)?/);
  return match ? match[0] : "";
}

function opticClickValueFromLabel(label, customValue) {
  if (label === "Custom") return Number(cleanDecimal(customValue));
  return OPTIC_CLICK_VALUE_NUMBERS[label] || 0;
}

function readSavedSetups() {
  try {
    return JSON.parse(localStorage.getItem(SAVED_SETUPS_KEY) || "[]");
  } catch (error) {
    console.warn("Saved setup read failed", error);
    return [];
  }
}

function writeSavedSetups(setups) {
  localStorage.setItem(SAVED_SETUPS_KEY, JSON.stringify(setups.slice(0, MAX_SAVED_SETUPS)));
}

function setupLabel(snapshot) {
  return document.getElementById("setupName").value.trim()
    || [snapshot.weaponManufacturer, snapshot.weaponModelCaliber, snapshot.opticModel, snapshot.ammoLoad].filter(Boolean).join(" / ")
    || "Saved Setup";
}

function setupPayload(snapshot) {
  const allowed = [
    "setupId",
    "setupName",
    "weaponCategory",
    "weaponManufacturer",
    "weaponModelType",
    "weaponModelCaliber",
    "barrelLength",
    "rifle",
    "caliber",
    "opticType",
    "opticBrand",
    "opticModel",
    "magnification",
    "opticAdjustmentUnit",
    "opticClickValue",
    "opticClickValueLabel",
    "opticClickValueMOA",
    "opticClickValueMRAD",
    "ammoCaliber",
    "ammoManufacturer",
    "ammoLoad",
    "bulletWeight",
    "targetDistanceValue",
    "targetDistanceUnit",
    "targetDistance",
    "distance",
    "shooterName",
    "unit",
    "agency",
    "instructor"
  ];
  return allowed.reduce((payload, key) => {
    if (snapshot[key]) payload[key] = snapshot[key];
    return payload;
  }, {});
}

function renderSavedSetups(selectedId = "") {
  const select = document.getElementById("savedSetupSelect");
  const setups = readSavedSetups();
  select.innerHTML = `<option value="">Select Saved Setup</option>` + setups
    .map(setup => `<option value="${setup.setupId}">${setup.setupName}</option>`)
    .join("");
  select.value = selectedId;
}

function saveCurrentSetupToLibrary() {
  const snapshot = collectForm();
  const setupId = document.getElementById("savedSetupSelect").value || snapshot.setupId || `setup-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
  const savedSetup = {
    ...setupPayload(snapshot),
    setupId,
    setupName: setupLabel(snapshot),
    updatedAt: new Date().toISOString()
  };
  const existing = readSavedSetups().filter(setup => setup.setupId !== setupId);
  writeSavedSetups([savedSetup, ...existing]);
  document.getElementById("setupName").value = savedSetup.setupName;
  renderSavedSetups(setupId);
  SCZN3M4.saveMatrixSnapshot({ ...snapshot, setupId, setupName: savedSetup.setupName });
  return savedSetup;
}

function loadSavedSetup(setupId) {
  const setup = readSavedSetups().find(item => item.setupId === setupId);
  if (!setup) return;
  document.getElementById("setupName").value = setup.setupName || "";
  setForm(setup);
  SCZN3M4.saveMatrixSnapshot(setupPayload(setup));
  renderSavedSetups(setupId);
}

function setForm(snapshot) {
  const values = { ...SCZN3M4.TARGET_AUTHORITY, ...snapshot };
  values.weaponCategory = inferWeaponCategory(values);
  values.weaponModelType = values.weaponModelType || (/^(Rifle|Shotgun|Pistol)$/i.test(values.rifle || "") ? "" : values.rifle);
  values.weaponModelCaliber = values.weaponModelCaliber || values.caliber;
  values.opticAdjustmentUnit = values.opticAdjustmentUnit === "MRAD" ? "MRAD" : "MOA";
  if (!values.opticClickValueLabel && values.opticClickValue) {
    values.opticClickValueLabel = `${values.opticClickValue} ${values.opticAdjustmentUnit}`;
  }
  if (values.opticClickValueLabel && !OPTIC_CLICK_VALUE_OPTIONS[values.opticAdjustmentUnit].includes(values.opticClickValueLabel)) {
    values.customOpticClickValue = values.opticClickValue || cleanDecimal(values.opticClickValueLabel);
    values.opticClickValueLabel = "Custom";
  }
  setWeaponCategory(values.weaponCategory);
  updateWeaponManufacturers(values.weaponManufacturer);
  updateWeaponModelTypes(values.weaponModelType);
  updateWeaponModelCalibers(values.weaponModelCaliber);
  updateOpticManufacturers(values.opticBrand);
  updateOpticModels(values.opticModel);
  updateMagnifications(values.magnification);
  updateOpticClickValues(values.opticClickValueLabel);
  setOptions(document.getElementById("ammoCaliber"), Object.keys(AMMO_CALIBER_MANUFACTURERS), values.ammoCaliber);
  updateAmmoManufacturers(values.ammoManufacturer);
  updateAmmoLoads(values.ammoLoad);
  updateAmmoGrains(values.bulletWeight);
  document.getElementById("setupName").value = values.setupName || "";
  Array.from(form.elements).forEach(field => {
    if (!field.name || field.type === "submit" || field.type === "button") return;
    if (field.tagName === "SELECT" && values[field.name] && !Array.from(field.options).some(option => option.value === values[field.name])) {
      field.insertAdjacentHTML("beforeend", `<option>${values[field.name]}</option>`);
    }
    field.value = values[field.name] || "";
  });
  toggleCustom("customWeaponManufacturer", document.getElementById("weaponManufacturer").value === "Other");
  toggleCustom("customWeaponModelType", document.getElementById("weaponModelType").value === "Other");
  toggleCustom("customWeaponModelCaliber", document.getElementById("weaponModelCaliber").value === "Other");
  toggleCustom("customOpticType", document.getElementById("opticType").value === "Other");
  toggleCustom("customOpticManufacturer", document.getElementById("opticBrand").value === "Other");
  toggleCustom("customOpticModel", document.getElementById("opticModel").value === "Other");
  toggleCustom("customOpticClickValue", document.getElementById("opticClickValueLabel").value === "Custom");
  toggleCustom("customAmmoCaliber", document.getElementById("ammoCaliber").value === "Other");
  toggleCustom("customAmmoManufacturer", document.getElementById("ammoManufacturer").value === "Other");
  toggleCustom("customAmmoLoad", document.getElementById("ammoLoad").value === "Other");
  toggleCustom("customBulletWeight", document.getElementById("bulletWeight").value === "Other");
  toggleCustom("customMagnification", document.getElementById("magnification").value === "Other");
}

function collectForm() {
  const data = {};
  Array.from(form.elements).forEach(field => {
    if (!field.name || field.type === "submit" || field.type === "button") return;
    data[field.name] = field.value.trim();
  });
  if (data.weaponManufacturer === "Other" && data.customWeaponManufacturer) data.weaponManufacturer = data.customWeaponManufacturer;
  if (data.weaponModelType === "Other" && data.customWeaponModelType) data.weaponModelType = data.customWeaponModelType;
  if (data.weaponModelCaliber === "Other" && data.customWeaponModelCaliber) data.weaponModelCaliber = data.customWeaponModelCaliber;
  if (data.opticType === "Other" && data.customOpticType) data.opticType = data.customOpticType;
  if (data.opticBrand === "Other" && data.customOpticManufacturer) data.opticBrand = data.customOpticManufacturer;
  if (data.opticModel === "Other" && data.customOpticModel) data.opticModel = data.customOpticModel;
  data.opticAdjustmentUnit = data.opticAdjustmentUnit === "MRAD" ? "MRAD" : "MOA";
  if (!OPTIC_CLICK_VALUE_OPTIONS[data.opticAdjustmentUnit].includes(data.opticClickValueLabel)) {
    data.opticClickValueLabel = OPTIC_CLICK_VALUE_OPTIONS[data.opticAdjustmentUnit][0];
  }
  data.opticClickValue = opticClickValueFromLabel(data.opticClickValueLabel, data.customOpticClickValue);
  if (!Number.isFinite(data.opticClickValue) || data.opticClickValue <= 0) {
    data.opticClickValue = OPTIC_CLICK_VALUE_NUMBERS[OPTIC_CLICK_VALUE_OPTIONS[data.opticAdjustmentUnit][0]];
    data.opticClickValueLabel = OPTIC_CLICK_VALUE_OPTIONS[data.opticAdjustmentUnit][0];
  }
  if (data.opticClickValueLabel === "Custom") {
    data.opticClickValueLabel = `${data.opticClickValue} ${data.opticAdjustmentUnit}`;
  }
  if (data.opticAdjustmentUnit === "MOA") {
    data.opticClickValueMOA = data.opticClickValue;
    delete data.opticClickValueMRAD;
  } else {
    data.opticClickValueMRAD = data.opticClickValue;
    delete data.opticClickValueMOA;
  }
  if (data.ammoCaliber === "Other" && data.customAmmoCaliber) data.ammoCaliber = data.customAmmoCaliber;
  if (data.ammoManufacturer === "Other" && data.customAmmoManufacturer) data.ammoManufacturer = data.customAmmoManufacturer;
  if (data.ammoLoad === "Other" && data.customAmmoLoad) data.ammoLoad = data.customAmmoLoad;
  if (data.bulletWeight === "Other" && data.customBulletWeight) data.bulletWeight = data.customBulletWeight;
  if (data.magnification === "Other" && data.customMagnification) data.magnification = data.customMagnification;
  if (data.targetDistanceValue === "Other" && data.customTargetDistanceValue) data.targetDistanceValue = data.customTargetDistanceValue.replace(/\D/g, "");
  data.weaponManufacturer = displayValue(data.weaponManufacturer);
  data.weaponModelType = displayValue(data.weaponModelType);
  data.weaponModelCaliber = displayValue(data.weaponModelCaliber);
  data.ammoCaliber = displayValue(data.ammoCaliber);
  data.ammoManufacturer = displayValue(data.ammoManufacturer);
  data.ammoLoad = displayValue(data.ammoLoad);
  data.bulletWeight = displayValue(data.bulletWeight);
  data.targetDistanceValue = (data.targetDistanceValue || "100").replace(/\D/g, "") || "100";
  data.targetDistanceUnit = data.targetDistanceUnit === "M" ? "M" : "YDS";
  data.targetDistance = `${data.targetDistanceValue} ${data.targetDistanceUnit === "M" ? "m" : "yds"}`;
  data.distance = data.targetDistance;
  Object.keys(data).forEach(key => {
    if (key.startsWith("custom")) delete data[key];
  });
  data.setupId = document.getElementById("savedSetupSelect").value || "";
  data.setupName = document.getElementById("setupName").value.trim();
  data.rifle = [data.weaponManufacturer, data.weaponModelType].filter(Boolean).join(" ");
  data.caliber = data.weaponModelCaliber;
  return data;
}

function clearSetupFields() {
  Array.from(form.elements).forEach(field => {
    if (!field.name || field.type === "submit" || field.type === "button") return;
    if (field.readOnly) {
      field.value = SCZN3M4.TARGET_AUTHORITY[field.name] || "";
      return;
    }
    field.value = "";
  });
  document.getElementById("savedSetupSelect").value = "";
  document.getElementById("setupName").value = "";
  document.getElementById("opticAdjustmentUnit").value = "MOA";
  updateOpticClickValues("1/4 MOA");
  setWeaponCategory("Rifle");
  updateWeaponManufacturers();
  renderSessionBar();
}

function renderSessionBar() {
  const snapshot = collectForm();
  const setup = [snapshot.weaponCategory, snapshot.weaponManufacturer, snapshot.weaponModelType, snapshot.weaponModelCaliber]
    .map(displayValue)
    .filter(Boolean)
    .join(" / ");
  const optic = [snapshot.opticType, snapshot.opticBrand, snapshot.opticModel, snapshot.opticClickValueLabel]
    .map(displayValue)
    .filter(Boolean)
    .join(" / ");
  document.getElementById("activeSessionBar").innerHTML = `<strong>${setup || "Weapon setup not selected"}</strong><span>${optic || "Setup"}</span>`;
}

function loadMatrix() {
  const snapshot = SCZN3M4.getActiveMatrix() || {
    weaponCategory: "Rifle",
    weaponManufacturer: "Select Manufacturer",
    weaponModelType: "Select Model Type",
    weaponModelCaliber: "Select Model Caliber",
    caliber: "",
    opticBrand: "Iron Sights",
    opticModel: "Iron Sights",
    magnification: "1x",
    opticAdjustmentUnit: "MOA",
    opticClickValue: 0.25,
    opticClickValueLabel: "1/4 MOA",
    opticClickValueMOA: 0.25,
    ammoCaliber: "Select Caliber",
    ammoManufacturer: "Select Manufacturer",
    ammoLoad: "Select Load",
    bulletWeight: "Select Grain",
    targetDistanceValue: "100",
    targetDistanceUnit: "YDS",
    targetDistance: "100 yds",
    distance: "100 yds"
  };
  setForm(snapshot);
}

form.addEventListener("submit", event => {
  event.preventDefault();
  const session = SCZN3M4.createSession(collectForm());
  window.location.href = `shoot.html?session=${encodeURIComponent(session.sessionId)}`;
});

document.getElementById("saveSetup").addEventListener("click", () => {
  saveCurrentSetupToLibrary();
});

document.getElementById("newSetup").addEventListener("click", clearSetupFields);
document.getElementById("savedSetupSelect").addEventListener("change", event => loadSavedSetup(event.target.value));
document.querySelectorAll("[data-weapon-category]").forEach(button => {
  button.addEventListener("click", () => {
    setWeaponCategory(button.dataset.weaponCategory);
    updateWeaponManufacturers();
  });
});
document.getElementById("weaponManufacturer").addEventListener("change", () => updateWeaponModelTypes());
document.getElementById("weaponModelType").addEventListener("change", () => updateWeaponModelCalibers());
document.getElementById("weaponModelCaliber").addEventListener("change", () => toggleCustom("customWeaponModelCaliber", document.getElementById("weaponModelCaliber").value === "Other"));
document.getElementById("opticType").addEventListener("change", () => updateOpticManufacturers());
document.getElementById("opticBrand").addEventListener("change", () => updateOpticModels());
document.getElementById("opticModel").addEventListener("change", () => updateMagnifications());
document.getElementById("opticAdjustmentUnit").addEventListener("change", () => updateOpticClickValues());
document.getElementById("opticClickValueLabel").addEventListener("change", () => toggleCustom("customOpticClickValue", document.getElementById("opticClickValueLabel").value === "Custom"));
document.getElementById("customOpticClickValue").addEventListener("input", event => { event.target.value = cleanDecimal(event.target.value); });
document.getElementById("ammoCaliber").addEventListener("change", () => updateAmmoManufacturers());
document.getElementById("ammoManufacturer").addEventListener("change", () => updateAmmoLoads());
document.getElementById("ammoLoad").addEventListener("change", () => updateAmmoGrains());
document.getElementById("bulletWeight").addEventListener("change", () => toggleCustom("customBulletWeight", document.getElementById("bulletWeight").value === "Other"));
document.getElementById("magnification").addEventListener("change", () => toggleCustom("customMagnification", document.getElementById("magnification").value === "Other"));
document.getElementById("matrixDistanceValue").addEventListener("change", () => toggleCustom("customTargetDistanceValue", document.getElementById("matrixDistanceValue").value === "Other"));
document.getElementById("customTargetDistanceValue").addEventListener("input", event => { event.target.value = event.target.value.replace(/\D/g, ""); });
form.addEventListener("input", renderSessionBar);
form.addEventListener("change", renderSessionBar);

loadMatrix();
renderSavedSetups((SCZN3M4.getActiveMatrix() || {}).setupId || "");
renderSessionBar();
</script>
</body>
</html>
