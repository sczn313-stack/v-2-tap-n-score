<html lang="en">

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Weapon Library</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body class="platform-page matrix-page">
<main class="shell">
  <header class="m4-header">
    <div class="vendor-slot">
      <img src="assets/BAKER_ST_100YD_SMART_AUTHORITY_v1_ORIGINAL.png" alt="Baker 100 Yard Smart Target thumbnail" />
      <div class="brand-lockup">
        <a class="vendor-name" href="index.html">Baker Smart Targets</a>
      </div>
    </div>
    <nav class="locked-nav" aria-label="Baker workflow navigation">
      <a class="locked-nav-item" href="index.html"><span class="nav-dot"></span><span>🏠 Home</span></a>
      <a class="locked-nav-item is-active" href="matrix.html"><span class="nav-dot"></span><span>Weapon Library</span></a>
      <a class="locked-nav-item" href="shoot.html"><span class="nav-dot"></span><span class="target-nav-icon" aria-hidden="true"></span><span>Target</span></a>
      <a class="locked-nav-item" href="records.html"><span class="nav-dot"></span><span>SEC</span></a>
      <a class="locked-nav-item" href="survey.html"><span class="nav-dot"></span><span>Survey</span></a>
    </nav>
    <details class="mobile-platform-menu">
      <summary aria-label="Open navigation menu">☰</summary>
      <a href="index.html">Home</a>
      <a href="matrix.html" aria-current="page">Weapon Library</a>
      <a href="shoot.html">Target</a>
      <a href="records.html">SEC</a>
      <a href="survey.html">Survey</a>
    </details>
  </header>
  <section class="active-session-bar" id="activeSessionBar"></section>

  <section class="matrix-only">
    <form class="panel matrix-form is-profile-collapsed" id="matrixForm">
      <div class="weapon-top-row">
        <button class="button primary weapon-list-toggle" type="button" id="weaponListToggle" aria-expanded="false" aria-controls="weaponListPanel">▼ View My Weapon Library</button>
        <button class="button" type="button" id="newSetup">New Weapon Setup</button>
        <button class="button" type="submit">Go To Target</button>
      </div>
      <div class="target-mode-pill is-hidden" id="targetModePill">Target Mode: GSSF AC-1</div>

      <section class="weapon-list-panel is-collapsed" id="weaponListPanel" aria-label="My Weapon Library">
        <h2 class="weapon-library-title">MY WEAPON LIBRARY</h2>
        <div class="weapon-list-grid" id="weaponListGrid"></div>
      </section>

      <section class="form-section primary-weapon-path">
        <h2>New Weapon Setup</h2>
        <div class="category-pill-row" role="group" aria-label="Weapon Category">
          <button class="category-pill" type="button" data-weapon-category="Rifle">Rifle</button>
          <button class="category-pill" type="button" data-weapon-category="Pistol">Pistol</button>
          <button class="category-pill" type="button" data-weapon-category="Shotgun">Shotgun</button>
        </div>
        <input type="hidden" name="weaponCategory" id="weaponCategory" value="Rifle" />
      </section>

      <details class="form-section secondary-profile-section">
        <summary>Weapon Details</summary>
        <div class="matrix-grid">
          <div class="weapon-photo-field">
            <span class="weapon-photo-label">Weapon Photo <span class="optional-label">Optional</span></span>
            <div class="weapon-photo-preview is-empty" id="weaponPhotoPreview">No photo saved</div>
            <div class="weapon-photo-actions">
              <label class="button" for="weaponPhotoInput">Add Photo</label>
              <button class="button" type="button" id="removeWeaponPhoto">Remove</button>
            </div>
            <input class="visually-hidden-file" id="weaponPhotoInput" type="file" accept="image/*" capture="environment" />
          </div>
          <label>Manufacturer<select name="weaponManufacturer" id="weaponManufacturer">
            <option>Select Manufacturer</option><option>Colt</option><option>FN</option><option>Daniel Defense</option><option>BCM</option><option>Aero Precision</option><option>Smith & Wesson</option><option>Ruger</option><option>Sig Sauer</option><option>Springfield Armory</option><option>Other</option>
          </select></label>
          <label class="is-hidden">Custom Manufacturer<input name="customWeaponManufacturer" id="customWeaponManufacturer" placeholder="Optional custom manufacturer" /></label>
          <label>Model Type<select name="weaponModelType" id="weaponModelType">
            <option>Select Model Type</option><option>Other</option>
          </select></label>
          <label class="is-hidden">Custom Model Type<input name="customWeaponModelType" id="customWeaponModelType" placeholder="Optional custom model type" /></label>
          <label>Model Caliber<select name="weaponModelCaliber" id="weaponModelCaliber">
            <option>Select Model Caliber</option><option>Other</option>
          </select></label>
          <label class="is-hidden">Custom Model Caliber<input name="customWeaponModelCaliber" id="customWeaponModelCaliber" placeholder="Optional custom model caliber" /></label>
          <label>Barrel Length <span class="optional-label">Optional</span><input name="barrelLength" placeholder="Optional" /></label>
        </div>
      </details>

      <details class="form-section secondary-profile-section">
        <summary>Optic Details</summary>
        <div class="matrix-grid">
          <label>Optic Type<select name="opticType" id="opticType">
            <option>Iron Sights</option><option>Red Dot</option><option>Holographic</option><option>Prism</option><option>LPVO</option><option>Scope</option><option>Other</option>
          </select></label>
          <label class="is-hidden">Custom Optic Type<input name="customOpticType" id="customOpticType" placeholder="Optional custom optic type" /></label>
          <label>Manufacturer<select name="opticBrand" id="opticBrand">
            <option>Iron Sights</option><option>Aimpoint</option><option>EOTech</option><option>Trijicon</option><option>Vortex</option><option>Leupold</option><option>Holosun</option><option>Primary Arms</option><option>Other</option>
          </select></label>
          <label class="is-hidden">Custom Manufacturer<input name="customOpticManufacturer" id="customOpticManufacturer" placeholder="Optional custom manufacturer" /></label>
          <label>Model<select name="opticModel" id="opticModel">
            <option>Iron Sights</option><option>Other</option>
          </select></label>
          <label class="is-hidden">Custom Model<input name="customOpticModel" id="customOpticModel" placeholder="Optional custom model" /></label>
          <label>Magnification<select name="magnification" id="magnification">
            <option>1x</option><option>1-4x</option><option>1-6x</option><option>1-8x</option><option>2-10x</option><option>3-9x</option><option>4-12x</option><option>Other</option>
          </select></label>
          <label class="is-hidden">Custom Magnification<input name="customMagnification" id="customMagnification" placeholder="Optional custom magnification" /></label>
          <label>Adjustment Unit<select name="opticAdjustmentUnit" id="opticAdjustmentUnit">
            <option selected>MOA</option><option>MRAD</option>
          </select></label>
          <label>Click Value<select name="opticClickValue" id="opticClickValue">
            <option value="0.25" selected>1/4 MOA</option><option value="0.5">1/2 MOA</option><option value="1">1 MOA</option><option value="Custom">Custom</option>
          </select></label>
          <label class="is-hidden">Custom Click Value<input name="customOpticClickValue" id="customOpticClickValue" inputmode="decimal" placeholder="0.25" /></label>
        </div>
      </details>

      <details class="form-section secondary-profile-section">
        <summary>Ammo Details</summary>
        <div class="matrix-grid">
          <label>Caliber / Gauge<select name="ammoCaliber" id="ammoCaliber">
            <option>Select Caliber</option><option>.17 HMR</option><option>.22 LR</option><option>.22 WMR</option><option>.223 Rem</option><option>5.56 NATO</option><option>.300 BLK</option><option>.308 Win</option><option>6.5 Creedmoor</option><option>Other</option>
          </select></label>
          <label class="is-hidden">Custom Caliber<input name="customAmmoCaliber" id="customAmmoCaliber" placeholder="Optional custom caliber" /></label>
          <label>Manufacturer<select name="ammoManufacturer" id="ammoManufacturer">
            <option>Select Manufacturer</option><option>Lake City</option><option>Federal</option><option>Winchester</option><option>Hornady</option><option>Remington</option><option>PMC</option><option>IMI</option><option>Black Hills</option><option>Sig Sauer</option><option>Fiocchi</option><option>Sellier & Bellot</option><option>Prvi Partizan</option><option>Norma</option><option>Magtech</option><option>Other</option>
          </select></label>
          <label class="is-hidden">Custom Manufacturer<input name="customAmmoManufacturer" id="customAmmoManufacturer" placeholder="Optional custom manufacturer" /></label>
          <label>Load / Model<select name="ammoLoad" id="ammoLoad">
            <option>Select Load</option><option>Other</option>
          </select></label>
          <label class="is-hidden">Custom Load / Model<input name="customAmmoLoad" id="customAmmoLoad" placeholder="Optional custom load or model" /></label>
          <label>Grain<select name="bulletWeight" id="bulletWeight">
            <option>Select Grain</option><option>Other</option>
          </select></label>
          <label class="is-hidden">Custom Grain<input name="customBulletWeight" id="customBulletWeight" placeholder="Optional custom grain" /></label>
        </div>
      </details>

      <details class="form-section secondary-profile-section">
        <summary>Session Distance</summary>
        <div class="matrix-grid distance-setup-grid">
          <label>Distance<select name="targetDistanceValue" id="matrixDistanceValue">
            <option>25</option><option>50</option><option selected>100</option><option>200</option><option>300</option><option>400</option><option>500</option><option>Other</option>
          </select></label>
          <label class="is-hidden">Custom Distance<input name="customTargetDistanceValue" id="customTargetDistanceValue" inputmode="numeric" pattern="[0-9]*" /></label>
          <label>Unit<select name="targetDistanceUnit" id="matrixDistanceUnit">
            <option selected>YDS</option><option>M</option>
          </select></label>
        </div>
      </details>

      <details class="form-section attribution-banner secondary-profile-section">
        <summary>Personal Details</summary>
        <div class="matrix-grid">
          <label>Shooter<input name="shooterName" autocomplete="name" /></label>
          <label>Unit<input name="unit" /></label>
          <label>Agency<input name="agency" /></label>
          <label>Instructor<input name="instructor" /></label>
        </div>
      </details>

      <div hidden>
        <select id="savedSetupSelect">
          <option value="">Select Weapon Profile</option>
        </select>
        <input id="setupName" />
      </div>

      <div class="setup-save-row">
        <button class="button" type="button" id="saveSetup">Save Weapon Profile</button>
      </div>
    </form>
  </section>
</main>

function setOptions(select, options, selectedValue = "", preserveExternal = true) {
  const values = [...new Set(options)];
  select.innerHTML = values.map(value => `<option>${value}</option>`).join("");
  if (preserveExternal && selectedValue && !values.includes(selectedValue)) {
    select.insertAdjacentHTML("beforeend", `<option>${selectedValue}</option>`);
  }
  if (selectedValue) select.value = selectedValue;
}

function selectedWeaponCategory() {
  return document.getElementById("weaponCategory").value || "Rifle";
}

function setWeaponCategory(category = "Rifle") {
  const nextCategory = WEAPON_CATEGORY_MANUFACTURERS[category] ? category : "Rifle";
  document.getElementById("weaponCategory").value = nextCategory;
  document.querySelectorAll("[data-weapon-category]").forEach(button => {
    button.classList.toggle("is-active", button.dataset.weaponCategory === nextCategory);
  });
}

function inferWeaponCategory(values = {}) {
  if (values.weaponCategory && WEAPON_CATEGORY_MANUFACTURERS[values.weaponCategory]) return values.weaponCategory;
  const manufacturer = values.weaponManufacturer || "";
  const model = `${values.weaponModelType || ""} ${values.weaponModelCaliber || ""}`;
  if (["Mossberg", "Benelli", "Winchester", "Stoeger"].includes(manufacturer) || /12 Gauge|20 Gauge|Shotgun|Maverick|SuperNova|SXP/i.test(model)) return "Shotgun";
  if (["Glock", "Walther"].includes(manufacturer) || /Hellcat|P320|P365|Echelon|Shield|Pistol|G17|G19|G43|VP9|USP|PDP|PPQ|Shadow|9mm|\\.45 ACP|\\.40 S&W/i.test(model)) return "Pistol";
  return "Rifle";
}

function isSelectedPlaceholder(value) {
  return /^(Select Manufacturer|Select Model Type|Select Model Caliber|Select Caliber|Select Gauge|Select Load|Select Grain)$/i.test(value || "");
}

function toggleField(selectId, shouldShow) {
  const field = document.getElementById(selectId);
  if (!field) return;
  field.closest("label").classList.toggle("is-hidden", !shouldShow);
}

function toggleCustom(inputId, shouldShow) {
  const input = document.getElementById(inputId);
  if (!input) return;
  input.closest("label").classList.toggle("is-hidden", !shouldShow);
  if (shouldShow) input.focus();
}

function updateWeaponManufacturers(selectedValue = "") {
  const options = WEAPON_CATEGORY_MANUFACTURERS[selectedWeaponCategory()] || WEAPON_CATEGORY_MANUFACTURERS.Rifle;
  setOptions(document.getElementById("weaponManufacturer"), options, selectedValue);
  toggleCustom("customWeaponManufacturer", document.getElementById("weaponManufacturer").value === "Other");
  updateWeaponModelTypes();
}

function updateWeaponModelTypes(selectedValue = "") {
  const manufacturer = document.getElementById("weaponManufacturer").value || "Select Manufacturer";
  const categoryModels = WEAPON_MODEL_TYPE_FILTERS[selectedWeaponCategory()] || {};
  setOptions(document.getElementById("weaponModelType"), categoryModels[manufacturer] || WEAPON_MODEL_TYPES[manufacturer] || WEAPON_MODEL_TYPES.Other, selectedValue, false);
  toggleField("weaponModelType", !isSelectedPlaceholder(manufacturer));
  toggleCustom("customWeaponManufacturer", manufacturer === "Other");
  updateWeaponModelCalibers();
}

function caliberFromModelLabel(label = "") {
  const allowed = WEAPON_CATEGORY_AMMO_CALIBERS[selectedWeaponCategory()] || [];
  return allowed.find(caliber => caliber !== "Other" && label.includes(caliber)) || "";
}

function syncAmmoCaliberFromWeaponModel() {
  const modelCaliber = document.getElementById("weaponModelCaliber").value || "";
  const caliber = caliberFromModelLabel(modelCaliber);
  if (!caliber) return;
  const ammoSelect = document.getElementById("ammoCaliber");
  if (!Array.from(ammoSelect.options).some(option => option.value === caliber)) return;
  ammoSelect.value = caliber;
  updateAmmoManufacturers();
}

function updateWeaponModelCalibers(selectedValue = "") {
  const modelType = document.getElementById("weaponModelType").value || "Select Model Type";
  const manufacturer = document.getElementById("weaponManufacturer").value || "Select Manufacturer";
  const manufacturerModels = WEAPON_MODEL_CALIBER_FILTERS[manufacturer] || {};
  setOptions(document.getElementById("weaponModelCaliber"), manufacturerModels[modelType] || WEAPON_MODEL_CALIBERS[modelType] || WEAPON_MODEL_CALIBERS.Other, selectedValue, false);
  toggleField("weaponModelCaliber", !isSelectedPlaceholder(modelType));
  toggleCustom("customWeaponModelType", modelType === "Other");
  toggleCustom("customWeaponModelCaliber", document.getElementById("weaponModelCaliber").value === "Other");
  syncAmmoCaliberFromWeaponModel();
}

function updateOpticModels(selectedValue = "") {
  const brand = document.getElementById("opticBrand").value || "Iron Sights";
  const type = document.getElementById("opticType").value || "Iron Sights";
  const typeModels = OPTIC_MODEL_FILTERS[type] || {};
  setOptions(document.getElementById("opticModel"), typeModels[brand] || OPTIC_MODELS[brand] || OPTIC_MODELS.Other, selectedValue);
  toggleField("opticModel", !isSelectedPlaceholder(brand));
  toggleCustom("customOpticManufacturer", brand === "Other");
  toggleCustom("customOpticModel", document.getElementById("opticModel").value === "Other");
  updateMagnifications();
}

function updateOpticTypes(selectedValue = "") {
  const options = WEAPON_CATEGORY_OPTIC_TYPES[selectedWeaponCategory()] || WEAPON_CATEGORY_OPTIC_TYPES.Rifle;
  setOptions(document.getElementById("opticType"), options, selectedValue, false);
  updateOpticManufacturers();
}

function updateOpticManufacturers(selectedValue = "") {
  const type = document.getElementById("opticType").value || "Iron Sights";
  setOptions(document.getElementById("opticBrand"), OPTIC_TYPE_MANUFACTURERS[type] || OPTIC_TYPE_MANUFACTURERS.Other, selectedValue);
  toggleCustom("customOpticType", type === "Other");
  toggleCustom("customOpticManufacturer", document.getElementById("opticBrand").value === "Other");
  updateOpticModels();
}

function updateMagnifications(selectedValue = "") {
  const model = document.getElementById("opticModel").value || "Iron Sights";
  const type = document.getElementById("opticType").value || "Iron Sights";
  const fallback = type === "Iron Sights" ? OPTIC_MAGNIFICATIONS["Iron Sights"] : ["1x", "1-4x", "1-6x", "1-8x", "2-10x", "3-9x", "4-12x", "Other"];
  setOptions(document.getElementById("magnification"), OPTIC_MAGNIFICATIONS[model] || fallback, selectedValue);
  toggleCustom("customOpticModel", model === "Other");
  toggleCustom("customMagnification", document.getElementById("magnification").value === "Other");
  toggleCustom("customTargetDistanceValue", document.getElementById("matrixDistanceValue").value === "Other");
}

function updateDistanceOptions(selectedValue = "") {
  const category = selectedWeaponCategory();
  const options = WEAPON_CATEGORY_DISTANCES[category] || WEAPON_CATEGORY_DISTANCES.Rifle;
  const fallback = WEAPON_CATEGORY_DEFAULT_DISTANCE[category] || "100";
  setOptions(document.getElementById("matrixDistanceValue"), options, selectedValue || fallback, false);
  toggleCustom("customTargetDistanceValue", document.getElementById("matrixDistanceValue").value === "Other");
}

function updateOpticClickValues(selectedValue = "") {
  const unit = document.getElementById("opticAdjustmentUnit").value === "MRAD" ? "MRAD" : "MOA";
  const options = OPTIC_CLICK_VALUES[unit] || OPTIC_CLICK_VALUES.MOA;
  const selectedString = String(selectedValue || "");
  const hasPreset = selectedString && options.some(option => option.value === selectedString);
  const selected = hasPreset ? selectedString : selectedString ? "Custom" : options[0].value;
  const select = document.getElementById("opticClickValue");
  select.innerHTML = options.map(option => `<option value="${option.value}">${option.label}</option>`).join("");
  select.value = selected;
  const customInput = document.getElementById("customOpticClickValue");
  if (customInput && selected === "Custom" && selectedString !== "Custom") customInput.value = selectedString;
  toggleCustom("customOpticClickValue", select.value === "Custom");
}

function updateAmmoCalibers(selectedValue = "") {
  const options = WEAPON_CATEGORY_AMMO_CALIBERS[selectedWeaponCategory()] || WEAPON_CATEGORY_AMMO_CALIBERS.Rifle;
  setOptions(document.getElementById("ammoCaliber"), options, selectedValue, false);

function updateAmmoManufacturers(selectedValue = "") {
  const caliber = document.getElementById("ammoCaliber").value || "Select Caliber";

function updateAmmoLoads(selectedValue = "") {
  const maker = document.getElementById("ammoManufacturer").value || "Select Manufacturer";
  const caliber = document.getElementById("ammoCaliber").value || "Select Caliber";
  const caliberLoads = AMMO_LOAD_FILTERS[caliber] || {};
  setOptions(document.getElementById("ammoLoad"), caliberLoads[maker] || AMMO_LOADS[maker] || AMMO_LOADS.Other, selectedValue);
  toggleField("ammoLoad", !isSelectedPlaceholder(maker));
  toggleCustom("customAmmoManufacturer", maker === "Other");
  toggleCustom("customAmmoLoad", document.getElementById("ammoLoad").value === "Other");
  updateAmmoGrains();
}

function updateAmmoGrains(selectedValue = "") {

function escapeHtml(value = "") {
  return String(value).replace(/[&<>"']/g, character => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    "\"": "&quot;",
    "'": "&#39;"
  }[character]));
}

function readPendingTargetProfile() {

  };
  const pending = readJson(sessionStorage) || readJson(localStorage) || null;

function readFileAsDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(reader.error);
    reader.readAsDataURL(file);
  });
}

function downsizeWeaponPhoto(dataUrl, maxSize = 900) {
  return new Promise(resolve => {
    const image = new Image();
    image.onload = () => {
      const scale = Math.min(1, maxSize / Math.max(image.width, image.height));
      if (scale >= 1) {
        resolve(dataUrl);
        return;
      }
      const canvas = document.createElement("canvas");
      canvas.width = Math.round(image.width * scale);
      canvas.height = Math.round(image.height * scale);
      const context = canvas.getContext("2d");
      context.drawImage(image, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL("image/jpeg", 0.82));
    };
    image.onerror = () => resolve(dataUrl);
    image.src = dataUrl;
  });
}

async function setWeaponPhotoFromFile(file) {

  currentWeaponPhoto = {

  const adjustmentUnit = setup.opticAdjustmentUnit === "MRAD" ? "MRAD" : setup.opticAdjustmentUnit === "MOA" ? "MOA" : "";
  return adjustmentUnit && !new RegExp(`\\b${adjustmentUnit}\\b`, "i").test(distance) ? `${distance} ${adjustmentUnit}` : distance;

function setupUsageStats(setup) {
  const history = typeof SCZN3M4.getSessionHistory === "function" ? SCZN3M4.getSessionHistory() : [];
  const sessions = history.filter(session => session.savedToSEC === true && session.matrixSnapshot && session.matrixSnapshot.setupId === setup.setupId);
  const latest = sessions
    .map(session => session.timestamp || session.createdAt || session.savedAt || "")
    .filter(Boolean)
    .sort()
    .pop();
  return {
    sessionCount: sessions.length,
    lastUsed: latest ? new Date(latest).toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" }) : "Not yet recorded"
  };
}

  const savedSetup = {
    ...setupPayload(snapshot),

    setupName: setupLabel(snapshot),
    updatedAt: new Date().toISOString()
  };
  const existing = readSavedSetups().filter(setup => setup.setupId !== setupId);

  renderSavedSetups(setupId);

  if (data.opticModel === "Other" && data.customOpticModel) data.opticModel = data.customOpticModel;
  if (data.ammoCaliber === "Other" && data.customAmmoCaliber) data.ammoCaliber = data.customAmmoCaliber;

  if (data.ammoLoad === "Other" && data.customAmmoLoad) data.ammoLoad = data.customAmmoLoad;

  if (data.magnification === "Other" && data.customMagnification) data.magnification = data.customMagnification;
  if (data.opticClickValue === "Custom" && data.customOpticClickValue) data.opticClickValue = data.customOpticClickValue;
  if (data.targetDistanceValue === "Other" && data.customTargetDistanceValue) data.targetDistanceValue = data.customTargetDistanceValue.replace(/\D/g, "");
  data.weaponManufacturer = displayValue(data.weaponManufacturer);
  data.weaponModelType = displayValue(data.weaponModelType);
  data.weaponModelCaliber = displayValue(data.weaponModelCaliber);
  data.ammoCaliber = displayValue(data.ammoCaliber);
  data.ammoManufacturer = displayValue(data.ammoManufacturer);
  data.ammoLoad = displayValue(data.ammoLoad);
  data.bulletWeight = displayValue(data.bulletWeight);
  data.targetDistanceValue = (data.targetDistanceValue || "100").replace(/\D/g, "") || "100";
  data.targetDistanceUnit = data.targetDistanceUnit === "M" ? "M" : "YDS";
  data.opticAdjustmentUnit = data.opticAdjustmentUnit === "MRAD" ? "MRAD" : "MOA";
  data.opticClickValue = Number(data.opticClickValue) > 0 ? String(Number(data.opticClickValue)) : (data.opticAdjustmentUnit === "MRAD" ? "0.1" : "0.25");
  data.opticClickValueLabel = `${data.opticClickValue} ${data.opticAdjustmentUnit}`;

function targetAttributionFromContext(data = {}) {
  const queryTargetProfileId = MATRIX_QUERY.get("target_profile_id") || MATRIX_QUERY.get("targetProfileId") || "";
  const activeSession = SCZN3M4.read(SCZN3M4.KEYS.activeSession, null) || {};
  const sessionMatrix = activeSession.matrixSnapshot || {};
  const sessionAuthority = activeSession.targetAuthority || {};
  const activeMatrix = SCZN3M4.getActiveMatrix() || {};
  const pendingTarget = readPendingTargetProfile();
  const targetProfileId = String(
    queryTargetProfileId
    || activeSession.target_profile_id
    || activeSession.targetProfileId
    || activeSession.targetId
    || sessionMatrix.target_profile_id
    || sessionMatrix.targetProfileId
    || sessionMatrix.targetId
    || sessionAuthority.target_profile_id
    || sessionAuthority.targetProfileId
    || sessionAuthority.targetId
    || pendingTarget.target_profile_id
    || pendingTarget.targetProfileId
    || pendingTarget.targetId
    || data.target_profile_id
    || data.targetProfileId
    || data.targetId
    || activeMatrix.target_profile_id
    || activeMatrix.targetProfileId
    || activeMatrix.targetId
    || ""
  ).toLowerCase();
  const missionFamily = String(
    activeSession.mission_family
    || activeSession.missionFamily
    || activeSession.missionFamilyId
    || sessionMatrix.mission_family
    || sessionMatrix.missionFamily
    || sessionMatrix.missionFamilyId
    || sessionAuthority.mission_family
    || sessionAuthority.missionFamily
    || sessionAuthority.missionFamilyId
    || pendingTarget.mission_family
    || pendingTarget.missionFamily
    || pendingTarget.missionFamilyId
    || MATRIX_QUERY.get("mission_family")
    || MATRIX_QUERY.get("missionFamily")
    || MATRIX_QUERY.get("missionFamilyId")
    || data.mission_family
    || data.missionFamily
    || data.missionFamilyId
    || activeMatrix.mission_family
    || activeMatrix.missionFamily
    || activeMatrix.missionFamilyId
    || ""
  ).toLowerCase();
  const targetName = String(
    activeSession.targetName
    || activeSession.targetFamily
    || sessionMatrix.targetName
    || sessionMatrix.targetFamily
    || sessionAuthority.targetName
    || sessionAuthority.targetFamily
    || pendingTarget.targetName
    || pendingTarget.targetFamily
    || MATRIX_QUERY.get("target")
    || MATRIX_QUERY.get("targetName")
    || data.targetName
    || data.targetFamily
    || activeMatrix.targetName
    || activeMatrix.targetFamily
    || ""
  ).toLowerCase();
  if (
    targetProfileId === "gssf_ac_1"
    || missionFamily === "gssf"
    || targetName.includes("gssf")
    || targetName.includes("ac-1")
    || targetName.includes("ac1")
  ) {
    return canonicalGssfAttribution();
  }
  if (
    targetProfileId === "dot_torture_ez2c_style_17"
    || targetName.includes("dot torture")
  ) {
    return canonicalDotTortureAttribution();
  }
  return {};
}

    opticClickValueMRAD: "",
    ammoCaliber: "Select Caliber",
    ammoManufacturer: "Select Manufacturer",
    ammoLoad: "Select Load",
    bulletWeight: "Select Grain",
    targetDistanceValue: "100",
    targetDistanceUnit: "YDS",
    targetDistance: "100 yds",
    distance: "100 yds"
  };
  const attribution = targetAttributionFromContext(snapshot);
  const nextSnapshot = attribution.target_profile_id ? { ...snapshot, ...attribution } : snapshot;
  if (attribution.target_profile_id) {
    SCZN3M4.saveMatrixSnapshot(nextSnapshot);
  }
  setForm(nextSnapshot);
}

form.addEventListener("submit", event => {
  event.preventDefault();
  goToTarget();
});

document.getElementById("saveSetup").addEventListener("click", () => {
  saveCurrentSetupToLibrary();
  setProfileEditorVisible(false);
  setWeaponListExpanded(true);
});

document.getElementById("newSetup").addEventListener("click", () => {
  setWeaponListExpanded(false);
  setProfileEditorVisible(true);
  clearSetupFields();
});
document.getElementById("savedSetupSelect").addEventListener("change", event => loadSavedSetup(event.target.value));
document.getElementById("weaponListToggle").addEventListener("click", () => {
  const isExpanded = document.getElementById("weaponListToggle").getAttribute("aria-expanded") === "true";
  const shouldOpen = !isExpanded;
  if (shouldOpen) setProfileEditorVisible(false);
  setWeaponListExpanded(shouldOpen);
});
document.getElementById("weaponListPanel").addEventListener("click", event => {
  if (event.target.closest("[data-empty-library-action='new-setup']")) {
    setWeaponListExpanded(false);
    setProfileEditorVisible(true);
    clearSetupFields();
    return;
  }
  const button = event.target.closest("[data-setup-action]");
  if (!button) return;
  const setupId = button.dataset.setupId;
  if (!setupId) return;
  selectWeaponFromList(setupId, button.dataset.setupAction);
});
document.querySelectorAll("[data-weapon-category]").forEach(button => {
  button.addEventListener("click", () => {
    setWeaponCategory(button.dataset.weaponCategory);
    updateWeaponManufacturers();
    updateOpticTypes();
    updateAmmoCalibers();
    updateDistanceOptions();
    renderWeaponList();
  });
});
document.getElementById("weaponManufacturer").addEventListener("change", () => updateWeaponModelTypes());
document.getElementById("weaponModelType").addEventListener("change", () => updateWeaponModelCalibers());
document.getElementById("weaponModelCaliber").addEventListener("change", () => {
  toggleCustom("customWeaponModelCaliber", document.getElementById("weaponModelCaliber").value === "Other");
  syncAmmoCaliberFromWeaponModel();
});
document.getElementById("opticType").addEventListener("change", () => updateOpticManufacturers());
document.getElementById("opticBrand").addEventListener("change", () => updateOpticModels());
document.getElementById("opticModel").addEventListener("change", () => updateMagnifications());
document.getElementById("opticAdjustmentUnit").addEventListener("change", () => updateOpticClickValues());
document.getElementById("opticClickValue").addEventListener("change", () => toggleCustom("customOpticClickValue", document.getElementById("opticClickValue").value === "Custom"));
document.getElementById("ammoCaliber").addEventListener("change", () => updateAmmoManufacturers());
document.getElementById("ammoManufacturer").addEventListener("change", () => updateAmmoLoads());
document.getElementById("ammoLoad").addEventListener("change", () => updateAmmoGrains());
document.getElementById("bulletWeight").addEventListener("change", () => toggleCustom("customBulletWeight", document.getElementById("bulletWeight").value === "Other"));
document.getElementById("magnification").addEventListener("change", () => toggleCustom("customMagnification", document.getElementById("magnification").value === "Other"));
document.getElementById("matrixDistanceValue").addEventListener("change", () => toggleCustom("customTargetDistanceValue", document.getElementById("matrixDistanceValue").value === "Other"));
document.getElementById("customTargetDistanceValue").addEventListener("input", event => { event.target.value = event.target.value.replace(/\D/g, ""); });
document.getElementById("weaponPhotoInput").addEventListener("change", event => {
  setWeaponPhotoFromFile(event.target.files && event.target.files[0]).catch(error => {
    console.warn("Weapon photo could not be loaded", error);
  });
});
document.getElementById("removeWeaponPhoto").addEventListener("click", () => {
  currentWeaponPhoto = null;
  document.getElementById("weaponPhotoInput").value = "";
  renderWeaponPhotoPreview();
});
form.addEventListener("input", renderSessionBar);
form.addEventListener("change", renderSessionBar);

loadMatrix();
renderSavedSetups((SCZN3M4.getActiveMatrix() || {}).setupId || "");
renderWeaponList();
renderSessionBar();
</script>
</body>
</html>
