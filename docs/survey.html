<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tap-n-Score Feedback Survey</title>
<link rel="stylesheet" href="styles.css" />
<script src="ops.js?v=ops-v3-0623"></script>
<script src="navigation.js" defer></script>
</head>
<body class="platform-page survey-page">
<main class="shell">
  <header class="m4-header">
    <div class="vendor-slot">
      <img src="assets/crosshair-cross-emblem.png" alt="Tap-n-Score emblem" />
      <div class="brand-lockup">
        <a class="vendor-name" href="index.html">Tap-n-Score™</a>
      </div>
    </div>
    <nav class="locked-nav" aria-label="Target workflow navigation">
      <a class="locked-nav-item" href="index.html"><span class="nav-dot"></span><span>🏠 Home</span></a>
      <a class="locked-nav-item" href="matrix.html"><span class="nav-dot"></span><span>Weapon Library</span></a>
      <a class="locked-nav-item" href="shoot.html"><span class="nav-dot"></span><span class="target-nav-icon" aria-hidden="true"></span><span>Target</span></a>
      <a class="locked-nav-item" href="records.html"><span class="nav-dot"></span><span>SEC</span></a>
      <a class="locked-nav-item is-active" href="survey.html"><span class="nav-dot"></span><span>Survey</span></a>
    </nav>
    <details class="mobile-platform-menu">
      <summary aria-label="Open navigation">☰</summary>
      <a href="index.html">Home</a>
      <a href="matrix.html">Weapon Library</a>
      <a href="shoot.html">Target</a>
      <a href="records.html">SEC</a>
      <a href="survey.html" aria-current="page">Survey</a>
    </details>
  </header>
  <section class="active-session-bar"><strong>Survey</strong><span>Tap-n-Score Feedback</span></section>

  <section class="panel matrix-form">
    <span class="kicker">Feedback</span>
    <h1>Shooter Feedback Survey</h1>
    <form id="surveyForm">
      <section class="form-section">
        <h2>Survey</h2>
        <div class="matrix-grid">
          <label>Was the target easy to understand?
            <select name="targetUnderstand" required>
              <option value="">Select Answer</option><option>Yes</option><option>No</option><option>Somewhat</option>
            </select>
          </label>
          <label>Was the Weapon Setup page easy to use?
            <select name="weaponSetupEasy" required>
              <option value="">Select Answer</option><option>Yes</option><option>No</option><option>Somewhat</option>
            </select>
          </label>
          <label>Did the Target page help you understand your shot correction?
            <select name="targetCorrectionHelp" required>
              <option value="">Select Answer</option><option>Yes</option><option>No</option><option>Somewhat</option>
            </select>
          </label>
          <label>Did you save or view your SEC?
            <select name="secViewed" required>
              <option value="">Select Answer</option><option>Yes</option><option>No</option><option>I did not know what SEC was</option>
            </select>
          </label>
          <label>Would you use SCZN3 again?
            <select name="useAgain" required>
              <option value="">Select Answer</option><option>Yes</option><option>No</option><option>Maybe</option>
            </select>
          </label>
          <label>What should we improve?
            <textarea name="improve" rows="5"></textarea>
          </label>
          <label>What worked well?
            <textarea name="workedWell" rows="5"></textarea>
          </label>
        </div>
      </section>

      <div class="action-grid">
        <button class="button primary" type="submit">Submit Survey</button>
        <a class="button" href="index.html">Back Home</a>
      </div>
      <p class="survey-message" id="surveyMessage" role="status" aria-live="polite"></p>
    </form>
  </section>
</main>
<script>
const SURVEY_KEY = "SCZN3_SURVEY_RESPONSES";
const form = document.getElementById("surveyForm");
const message = document.getElementById("surveyMessage");

function readResponses() {
  try {
    return JSON.parse(localStorage.getItem(SURVEY_KEY) || "[]");
  } catch (error) {
    console.warn("Survey response read failed", error);
    return [];
  }
}

form.addEventListener("submit", event => {
  event.preventDefault();
  const data = Object.fromEntries(new FormData(form).entries());
  const responses = readResponses();
  responses.unshift({ ...data, submittedAt: new Date().toISOString() });
  localStorage.setItem(SURVEY_KEY, JSON.stringify(responses));
  message.textContent = "Thank you for helping improve Tap-n-Score.";
  form.reset();
});
</script>
</body>
</html>
