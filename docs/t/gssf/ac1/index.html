<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#06070a" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <title>GSSF / AC-1</title>
  <style>
    body{margin:0;background:#06070a;color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    main{min-height:100vh;display:grid;place-items:center;padding:24px;box-sizing:border-box}
    section{width:min(100%,520px);padding:24px;border:1px solid rgba(255,255,255,.12);border-radius:18px;background:rgba(255,255,255,.06)}
    h1{margin:0 0 8px;font-size:24px}p{margin:0;line-height:1.5;color:rgba(255,255,255,.82)}
    [data-state="unavailable"] h1{color:#ffca44}
  </style>
</head>
<body>
  <main>
    <section id="productResolution" data-state="resolving" aria-live="polite">
      <h1 id="resolutionTitle">GSSF / AC-1</h1>
      <p id="resolutionMessage">Resolving the governed product experience…</p>
    </section>
  </main>
  <script>
    (() => {
      "use strict";
      const PUBLISHER_ROUTE_ID = "gssf";
      const PRODUCT_ROUTE_ID = "ac1";
      const EXPECTED_CONTRACT_ID = "gssf-ac-1-live-canonical-v1";
      const local = location.hostname === "localhost" || location.hostname === "127.0.0.1";
      const endpoint = local
        ? "http://127.0.0.1:8098/api/catalog/product-route"
        : "https://sczn3-authority.onrender.com/api/catalog/product-route";
      const status = document.getElementById("productResolution");
      const title = document.getElementById("resolutionTitle");
      const message = document.getElementById("resolutionMessage");

      function refuse(kind, detail) {
        status.dataset.state = "unavailable";
        title.textContent = kind === "authority_unavailable" ? "Authority unavailable" : "Product unavailable";
        message.textContent = detail || "This product is not currently available.";
      }

      function approvedExperienceUrl(value) {
        try {
          const resolved = new URL(value, location.origin);
          return resolved.origin === location.origin
            && resolved.pathname === "/shoot.html"
            && resolved.searchParams.get("target_profile_id") === "gssf_ac_1"
            && resolved.searchParams.get("publisher_route_id") === PUBLISHER_ROUTE_ID
            && resolved.searchParams.get("product_route_id") === PRODUCT_ROUTE_ID
            && resolved.searchParams.get("catalog_entry_id") === "gssf-ac1-public-route-v1";
        } catch (_) {
          return false;
        }
      }

      const url = new URL(endpoint);
      url.searchParams.set("publisherRouteId", PUBLISHER_ROUTE_ID);
      url.searchParams.set("productRouteId", PRODUCT_ROUTE_ID);
      fetch(url.toString(), { headers: { "Accept": "application/json" }, cache: "no-store" })
        .then(async response => ({ response, payload: await response.json() }))
        .then(({ response, payload }) => {
          const authority = payload && payload.authorityResolution;
          const valid = response.ok
            && payload.ok === true
            && payload.status === "resolved"
            && payload.publisher && payload.publisher.publisherRouteId === PUBLISHER_ROUTE_ID
            && payload.product && payload.product.productRouteId === PRODUCT_ROUTE_ID
            && authority && authority.missionFamily === "gssf"
            && authority.targetExecutionContractId === EXPECTED_CONTRACT_ID
            && approvedExperienceUrl(payload.experienceUrl);
          if (!valid) {
            refuse(payload && payload.status, payload && payload.reason);
            return;
          }
          location.replace(payload.experienceUrl);
        })
        .catch(() => refuse("authority_unavailable", "Product authority could not be resolved."));
    })();
  </script>
</body>
</html>
