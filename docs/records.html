<script src="app_state.js"></script>
<script src="ops.js?v=ops-v3-0623"></script>
<script>
const historyList = document.getElementById("historyList");

function cleanDateTime(value) {
  const date = value ? new Date(value) : new Date();
  return date.toLocaleString(undefined, {
    month: "short",
    day: "numeric",
    year: "numeric",
    hour: "numeric",
    minute: "2-digit"
  });
}

function cleanSetupValue(value) {
  return /^(Select Manufacturer|Select Model Type|Select Model Caliber|Select Caliber|Select Load|Select Grain)$/i.test(value || "") ? "" : value;
}

function compactClick(value, axis) {
  if (!value) return "--";
  const amount = String(value).match(/\d+/)?.[0] || "0";
  const upper = String(value).toUpperCase();
  if (axis === "elevation") {
    if (upper.includes("UP")) return `${amount}↑`;
    if (upper.includes("DOWN")) return `${amount}↓`;
  }
  if (axis === "windage") {
    if (upper.includes("RIGHT")) return `${amount}→`;
    if (upper.includes("LEFT")) return `${amount}←`;
  }
  return amount;
}

function distanceDisplay(session) {
  if (session.targetDistanceValue) {
    return `${session.targetDistanceValue} ${session.targetDistanceUnit === "M" ? "m" : "yds"}`;
  }
  return session.targetDistance || session.distance || "100 yds";
}

function scoreClass(score) {
  const numeric = Number(score);
  if (!Number.isFinite(numeric)) return "score-pending";
  if (numeric >= 90) return "score-green";
  if (numeric >= 80) return "score-yellow";
  if (numeric >= 70) return "score-orange";
  return "score-red";
}

function authorityScoreValue(pkg) {
  const score = pkg && pkg.score;
  const value = score && typeof score === "object" ? score.value : score;
  return Number.isFinite(Number(value)) ? Number(value) : null;
}

function authorityPackage(session) {
  return session && (session.ugeoAuthorityPackage || session.backendAuthorityPackage) || null;
}

function escapeHtml(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function isDotTortureTrainingPackage(pkg) {
  if (!pkg) return false;
  const missionFamily = String(pkg.mission_family || pkg.missionFamily || pkg.missionFamilyId || "");
  const missionName = String(pkg.mission_name || pkg.missionName || "");
  const missionGroup = String(pkg.mission_group || pkg.missionGroup || "");
  const secTemplate = String(pkg.sec_template || pkg.secTemplate || "");
  return missionFamily === "marksmanshipTraining"
    && secTemplate === "trainingSEC"
    && (
      missionGroup === "dotTortureFamily"
      || missionName === "dotTorture"
      || missionName === "dotTortureStandard"
      || missionName === "dotTortureLite"
      || missionName === "revolvingDotTorture"
    );
}

function trainingDistanceLabel(distance) {
  if (!distance || typeof distance !== "object") return "Distance unavailable";
  const value = distance.value ?? distance.distance ?? "";
  const unit = distance.unit || distance.units || "";
  return `${value} ${unit}`.trim() || "Distance unavailable";
}

function trainingStageSummary(pkg) {
  const stages = Array.isArray(pkg && pkg.stages) ? pkg.stages : [];
  const totalRounds = pkg && (pkg.total_rounds || pkg.totalRounds) || stages.reduce((sum, stage) => sum + Number(stage.rounds || 0), 0);
  return `${stages.length || 0} stages / ${totalRounds || 0} rounds`;
}

function trainingTimeLabel(pkg) {
  const time = pkg && (pkg.timeSeconds ?? pkg.raw_time_seconds ?? pkg.rawTimeSeconds);
  return Number.isFinite(Number(time)) ? `${Number(time)} sec` : "optional/pending";
}

function trainingStageBreakdownHtml(stageScores) {
  if (!stageScores || !stageScores.length) return "";
  return `
    <div class="training-sec-stage-breakdown">
      ${stageScores
        .sort((a, b) => Number(a.stageIndex) - Number(b.stageIndex))
        .map(stage => `<span>${escapeHtml(stage.label)} <strong>${escapeHtml(stage.score)} / ${escapeHtml(stage.max)}</strong></span>`)
        .join("")}
    </div>
  `;
}

function trainingManualResult(session, pkg) {
  const sec = pkg && pkg.trainingSEC || {};
  return session.trainingManualResult || pkg.trainingManualResult || sec.manualResult || {};
}

function trainingScoreRecord(session) {
  const pkg = authorityPackage(session);
  if (!isDotTortureTrainingPackage(pkg)) return null;
  const sec = pkg.trainingSEC || {};
  const manual = trainingManualResult(session, pkg);
  const maxScore = Number(manual.maxScore ?? pkg.max_score ?? pkg.maxScore ?? sec.scoreMax ?? 50);
  const score = Number(manual.score ?? sec.scoreTotal);
  if (!Number.isFinite(score) || !Number.isFinite(maxScore) || maxScore <= 0) return null;
  const derivedPercentage = (score / maxScore) * 100;
  const percentage = Number(manual.percentage ?? sec.percentage);
  return {
    session,
    pkg,
    groupKey: pkg.target_profile_id || pkg.targetProfileId || pkg.mission_name || pkg.missionName || "dotTortureFamily",
    groupLabel: pkg.target_display_name || pkg.targetDisplayName || pkg.target_name || pkg.targetName || "Dot Torture",
    score,
    maxScore,
    percentage: Number.isFinite(percentage) ? percentage : derivedPercentage,
    stageScores: manual.stageScores || sec.stageScores || [],
    timestamp: new Date(session.timestamp || 0).getTime()
  };
}

function groupTrainingScoreRecords(records) {
  return records.reduce((groups, record) => {
    const key = record.groupKey || "dotTortureFamily";
    const current = groups.get(key) || { label: record.groupLabel || "Dot Torture", records: [] };
    current.records.push(record);
    groups.set(key, current);
    return groups;
  }, new Map());
}

function scoreAverage(records) {
  if (!records.length) return 0;
  return records.reduce((sum, record) => sum + record.score, 0) / records.length;
}

function percentageAverage(records) {
  if (!records.length) return 0;
  return records.reduce((sum, record) => sum + record.percentage, 0) / records.length;
}

function formatTrendNumber(value) {
  const rounded = Math.round(Number(value) * 10) / 10;
  return Number.isInteger(rounded) ? String(rounded) : rounded.toFixed(1);
}

function weakestDotTortureStage(records) {
  const stages = new Map();
  records.forEach(record => {
    (record.stageScores || []).forEach(stage => {
      const score = Number(stage.score);
      const max = Number(stage.max);
      if (!Number.isFinite(score) || !Number.isFinite(max) || max <= 0) return;
      const key = stage.label || `Stage ${stage.stageIndex || stages.size + 1}`;
      const bucket = stages.get(key) || { label: key, totalPercentage: 0, count: 0 };
      bucket.totalPercentage += (score / max) * 100;
      bucket.count += 1;
      stages.set(key, bucket);
    });
  });
  let weakest = null;
  stages.forEach(stage => {
    const average = stage.count ? stage.totalPercentage / stage.count : 100;
    if (!weakest || average < weakest.average) {
      weakest = { label: stage.label, average };
    }
  });
  return weakest ? weakest.label : "Not enough stage data";
}

function renderDotTortureTrendCard(records, label = "Dot Torture") {
  if (!records.length) return "";
  const sorted = records.slice().sort((a, b) => b.timestamp - a.timestamp);
  const last = sorted[0];
  const best = records.reduce((top, record) => record.score > top.score ? record : top, records[0]);
  const bestPercentage = Math.max(...records.map(record => record.percentage));
  const averageScore = scoreAverage(records);
  const averagePercentage = percentageAverage(records);
  const maxScore = last.maxScore || 50;
  return `
    <article class="history-card dot-training-trend-card">
      <div class="dot-training-trend-heading">
        <span>${escapeHtml(label)} Training Trends</span>
        <strong>Keep Improving</strong>
      </div>
      <div class="dot-training-trend-grid">
        <div><span>Sessions</span><strong>${records.length}</strong></div>
        <div><span>Last</span><strong>${formatTrendNumber(last.score)} / ${formatTrendNumber(maxScore)}</strong></div>
        <div><span>Best</span><strong>${formatTrendNumber(best.score)} / ${formatTrendNumber(best.maxScore || maxScore)}</strong></div>
        <div><span>Average</span><strong>${formatTrendNumber(averageScore)} / ${formatTrendNumber(maxScore)}</strong></div>
        <div><span>Best Percentage</span><strong>${formatTrendNumber(bestPercentage)}%</strong></div>
        <div><span>Average Percentage</span><strong>${formatTrendNumber(averagePercentage)}%</strong></div>
        <div><span>Weakest Stage</span><strong>${escapeHtml(weakestDotTortureStage(records))}</strong></div>
      </div>
      <p class="dot-training-trend-message">Training history is building. Keep improving one clean stage at a time.</p>
    </article>
  `;
}

function renderTrainingSecCard(session, index, pkg) {
  const snapshot = session.matrixSnapshot || {};
  const weaponProfile = window.SCZN3M4 && SCZN3M4.weaponProfileDisplay ? SCZN3M4.weaponProfileDisplay(snapshot) : null;
  const weapon = weaponProfile ? weaponProfile.summary : [snapshot.weaponCategory, snapshot.weaponManufacturer, snapshot.weaponModelType, snapshot.weaponModelCaliber].map(cleanSetupValue).filter(Boolean).join(" / ") || snapshot.rifle;
  const weaponMeta = weaponProfile ? [weaponProfile.frameCategory, weaponProfile.barrelLength, weaponProfile.sightRadius, weaponProfile.variantFlags].filter(Boolean).join(" / ") : "";
  const targetName = pkg.target_name || pkg.targetName || "Dot Torture Training Drill";
  const targetDisplayName = pkg.target_display_name || pkg.targetDisplayName || targetName;
  const sec = pkg.trainingSEC || {};
  const manual = trainingManualResult(session, pkg);
  const maxScore = pkg.max_score || pkg.maxScore || sec.scoreMax || 50;
  const totalRounds = pkg.total_rounds || pkg.totalRounds || 50;
  const distance = sec.distance || pkg.distance || pkg.recommended_distance || pkg.recommendedDistance;
  const stageSummary = trainingStageSummary(pkg);
  const score = manual.score ?? sec.scoreTotal;
  const percentage = manual.percentage ?? sec.percentage;
  const misses = manual.misses ?? sec.missesTotal;
  const time = manual.timeDisplay || sec.timeDisplay || (Number.isFinite(Number(sec.timeSeconds)) ? `${Number(sec.timeSeconds)} sec` : trainingTimeLabel(pkg));
  const scoreDisplay = Number.isFinite(Number(score)) ? `${Number(score)} / ${maxScore}` : "pending/manual";
  const percentageDisplay = percentage !== null && percentage !== undefined && percentage !== "" ? `${percentage}%` : "pending/manual";
  const missesDisplay = misses !== null && misses !== undefined && misses !== "" ? String(misses) : "pending/manual";
  const notesLine = manual.notes ? `<div><span>Notes</span><strong>${escapeHtml(manual.notes)}</strong></div>` : "";
  const stageBreakdown = trainingStageBreakdownHtml(manual.stageScores || sec.stageScores);
  const hashLine = pkg.evidenceHash ? `<div class="sec-authority-hash">Evidence: ${pkg.evidenceHash.slice(0, 12)}</div>` : "";
  return `
    <article class="history-card training-sec-card" data-session-id="${session.sessionId}">
      <div class="training-sec-card-heading">
        <span>Training SEC</span>
        <strong>Shooter Experience Card — Training</strong>
        <em>${cleanDateTime(session.timestamp)}</em>
      </div>
      <div class="training-sec-card-grid">
        <div><span>Mission</span><strong>${escapeHtml(targetDisplayName)}</strong></div>
        <div><span>Target</span><strong>${escapeHtml(targetName)}</strong></div>
        <div><span>Weapon</span><strong>${escapeHtml(weapon)}</strong></div>
        ${weaponMeta ? `<div><span>Weapon Catalog</span><strong>${escapeHtml(weaponMeta)}</strong></div>` : ""}
        <div><span>Distance</span><strong>${escapeHtml(trainingDistanceLabel(distance))}</strong></div>
        <div><span>Total Rounds</span><strong>${escapeHtml(totalRounds)}</strong></div>
        <div><span>Max Score</span><strong>${escapeHtml(maxScore)}</strong></div>
        <div><span>Score</span><strong>${escapeHtml(scoreDisplay)}</strong></div>
        <div><span>Percentage</span><strong>${escapeHtml(percentageDisplay)}</strong></div>
        <div><span>Stage Summary</span><strong>${escapeHtml(stageSummary)}</strong></div>
        <div><span>Misses</span><strong>${escapeHtml(missesDisplay)}</strong></div>
        <div><span>Time</span><strong>${escapeHtml(time)}</strong></div>
        <div><span>Session Saved</span><strong>${session.savedToSEC ? "saved" : "pending"}</strong></div>
        ${notesLine}
      </div>
      ${stageBreakdown}
      ${hashLine}
    </article>
  `;
}

function authorityPoint(point) {
  return SCZN3M4.UGEO.normalizePoint(point);
}

function markerHtml(className, point, content = "", attrs = "") {
  const safe = authorityPoint(point);
  if (!safe) return "";
  return `<span class="${className}" style="left:${safe.xPercent}%;top:${safe.yPercent}%"${attrs ? ` ${attrs}` : ""}>${content}</span>`;
}

function authorityVisual(session) {
  const pkg = authorityPackage(session);
  if (!pkg || !pkg.renderCoordinates) return "";
  const render = pkg.renderCoordinates;
  const parts = [];
  (render.impacts || []).forEach((point, index) => {
    parts.push(markerHtml("history-thumb-impact", point, String(index + 1)));
  });
  parts.push(markerHtml("aim-arrow", render.aim, ""));
  parts.push(markerHtml("poib-dot", render.poib, "<span></span>"));
  return parts.join("");
}

function syncSecEvidenceLayers() {
  document.querySelectorAll(".history-thumb").forEach((frame) => {
    const image = frame.querySelector("img");
    const layer = frame.querySelector(".history-evidence-layer");
    SCZN3M4.UGEO.syncEvidenceLayerToImage(layer, image, frame);
  });
}

function attributionLine(snapshot) {
  const parts = [
    ["Shooter", snapshot.shooterName],
    ["Unit", snapshot.unit],
    ["Agency", snapshot.agency],
    ["Instructor", snapshot.instructor]
  ]
    .filter(([, value]) => value)
    .map(([label, value]) => `${label}: ${value}`);
  return parts.length ? `<div class="sec-attribution-line">${parts.join(" | ")}</div>` : "";
}

function poibDisplay(pkg) {
  const correction = pkg && pkg.correction;
  if (!correction || !Number.isFinite(Number(correction.xInches)) || !Number.isFinite(Number(correction.yInches))) return "";
  const x = Number(correction.xInches);
  const y = Number(correction.yInches);
  const windage = Math.abs(x) < 0.05 ? "Centered" : `${Math.abs(x).toFixed(1)}\" ${x > 0 ? "Right" : "Left"}`;
  const elevation = Math.abs(y) < 0.05 ? "Centered" : `${Math.abs(y).toFixed(1)}\" ${y > 0 ? "Low" : "High"}`;
  if (windage === "Centered" && elevation === "Centered") return "Centered";
  if (windage === "Centered") return elevation;
  if (elevation === "Centered") return windage;
  return `${elevation}, ${windage}`;
}

function authorityDetailLine(pkg) {
  if (!pkg) return "";
  const parts = [];
  if (pkg.group && pkg.group.display) parts.push(`Group: ${pkg.group.display}`);
  const poib = poibDisplay(pkg);
  if (poib) parts.push(`POIB: ${poib}`);
  return parts.length ? `<div class="sec-authority-detail">${parts.join(" | ")}</div>` : "";
}

function renderHistory() {
  const savedSessions = SCZN3M4.getSessionHistory().slice()
    .filter(session => session && session.savedToSEC === true)
    .sort((a, b) => {
      const timeDelta = new Date(b.timestamp || 0) - new Date(a.timestamp || 0);
      if (timeDelta) return timeDelta;
      return Number(b.sessionNumber || 0) - Number(a.sessionNumber || 0);
    });
  const sessions = savedSessions.slice(0, 10);
  if (!sessions.length) {
    historyList.innerHTML = `<article class="history-card empty-state"><strong>No saved Shooter Experience Cards yet.</strong><span>Save a completed session from Target to create a Baker SEC record.</span></article>`;
    return;
  }

  const trainingRecords = savedSessions.map(trainingScoreRecord).filter(Boolean);
  const dotTortureTrendCard = Array.from(groupTrainingScoreRecords(trainingRecords).values())
    .map(group => renderDotTortureTrendCard(group.records, group.label))
    .join("");
  historyList.innerHTML = dotTortureTrendCard + sessions.map((session, index) => {
    const snapshot = session.matrixSnapshot || {};
    const evidence = session.targetEvidenceImage;
    const pkg = authorityPackage(session);
    if (isDotTortureTrainingPackage(pkg)) {
      return renderTrainingSecCard(session, index, pkg);
    }
    const hasAuthority = !!(pkg && pkg.status);
    const shotCount = hasAuthority ? Number(pkg.status.impactCount || 0) : 0;
    const score = hasAuthority ? authorityScoreValue(pkg) : null;
    const weaponProfile = window.SCZN3M4 && SCZN3M4.weaponProfileDisplay ? SCZN3M4.weaponProfileDisplay(snapshot) : null;
    const weapon = weaponProfile ? weaponProfile.summary : [snapshot.weaponCategory, snapshot.weaponManufacturer, snapshot.weaponModelType, snapshot.weaponModelCaliber].map(cleanSetupValue).filter(Boolean).join(" / ") || snapshot.rifle;
    const weaponMeta = weaponProfile ? [weaponProfile.frameCategory, weaponProfile.barrelLength, weaponProfile.sightRadius, weaponProfile.variantFlags].filter(Boolean).join(" / ") : "";
    const optic = [snapshot.opticType, snapshot.opticBrand, snapshot.opticModel, snapshot.magnification].map(cleanSetupValue).filter(Boolean).join(" / ");
    const ammo = [snapshot.ammoCaliber, snapshot.ammoManufacturer, snapshot.ammoLoad, snapshot.bulletWeight].map(cleanSetupValue).filter(Boolean).join(" / ");
    const correction = hasAuthority ? (pkg.correction || {}) : {};
    const clicks = hasAuthority ? { ...(pkg.clicks || {}), elevation: correction.elevation, windage: correction.windage } : {};
    const thumbnail = evidence && evidence.dataUrl ? evidence.dataUrl : "assets/BAKER_ST_100YD_SMART_AUTHORITY_v1_ORIGINAL.png";
    const scorePill = score !== null ? `<span class="sec-score ${scoreClass(score)}">SCORE <strong>${score}</strong></span>` : "";
    const authorityMessage = hasAuthority ? "" : `<div class="sec-authority-missing">Backend authority package unavailable.</div>`;
    const hashLine = hasAuthority && pkg.evidenceHash ? `<div class="sec-authority-hash">Evidence: ${pkg.evidenceHash.slice(0, 12)}</div>` : "";
    return `
      <article class="history-card" data-session-id="${session.sessionId}">
          <div class="history-thumb">
            <img src="${thumbnail}" alt="Uploaded target evidence thumbnail" />
            <div class="history-evidence-layer">${authorityVisual(session)}</div>
          </div>
        <div class="history-copy">
          <div class="history-title">
            <strong>Session #${index + 1}</strong>
            <span>${cleanDateTime(session.timestamp)}</span>
          </div>
          <div class="sec-setup-line">${[weapon, weaponMeta, optic, ammo].filter(Boolean).join(" | ") || "--"}</div>
          ${attributionLine(snapshot)}
          ${authorityMessage}
          ${hasAuthority ? authorityDetailLine(pkg) : ""}
          <div class="sec-intel-pill">
            <span>${distanceDisplay(session)}</span>
            ${scorePill}
            <span class="sec-clicks"><strong>${compactClick(clicks.elevation, "elevation")}</strong><em>CLICKS</em><strong>${compactClick(clicks.windage, "windage")}</strong></span>
            <span>${shotCount} Hits</span>
          </div>
          ${hashLine}
        </div>
      </article>
    `;
  }).join("");
  requestAnimationFrame(syncSecEvidenceLayers);
}

renderHistory();
window.addEventListener("resize", syncSecEvidenceLayers);
document.getElementById("saveSecPage").addEventListener("click", saveSecPageImage);

function saveSecPageImage() {
  const target = document.querySelector(".history-panel");
  const width = Math.ceil(target.scrollWidth);
  const height = Math.ceil(target.scrollHeight);
  const styles = Array.from(document.styleSheets)
    .map(sheet => {
      try {
        return Array.from(sheet.cssRules).map(rule => rule.cssText).join("\n");
      } catch (error) {
        return "";
      }
    })
    .join("\n");
  const clone = target.cloneNode(true);
  const svg = `
    <svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}">
      <foreignObject width="100%" height="100%">
        <div xmlns="http://www.w3.org/1999/xhtml">
          <style>${styles}</style>
          ${clone.outerHTML}
        </div>
      </foreignObject>
    </svg>`;
  const image = new Image();
  image.onload = () => {
    const canvas = document.createElement("canvas");
    canvas.width = width;
    canvas.height = height;
    const context = canvas.getContext("2d");
    context.fillStyle = "#eadbbd";
    context.fillRect(0, 0, width, height);
    context.drawImage(image, 0, 0);
    const link = document.createElement("a");
    link.download = `SEC-${new Date().toISOString().slice(0, 10)}.png`;
    link.href = canvas.toDataURL("image/png");
    link.click();
    URL.revokeObjectURL(image.src);
  };
  image.src = URL.createObjectURL(new Blob([svg], { type: "image/svg+xml;charset=utf-8" }));
}
</script>
