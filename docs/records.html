<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SEC - Shooter Experience Card</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<main class="shell">
  <header class="m4-header">
    <div class="vendor-slot">
      <img src="assets/BAKER_ST_100YD_SMART_AUTHORITY_v1_ORIGINAL.png" alt="Baker 100 Yard Smart Target thumbnail" />
      <div class="brand-lockup">
        <a class="vendor-name" href="index.html">Baker Smart Targets</a>
      </div>
    </div>
    <nav class="locked-nav" aria-label="Baker workflow navigation">
      <a class="locked-nav-item" href="index.html"><span class="nav-dot"></span><span>🏠 Home</span></a>
      <a class="locked-nav-item" href="matrix.html"><span class="nav-dot"></span><span>Weapon Setup</span></a>
      <a class="locked-nav-item" href="shoot.html"><span class="nav-dot"></span><span class="target-nav-icon" aria-hidden="true"></span><span>Target</span></a>
      <a class="locked-nav-item is-active" href="records.html"><span class="nav-dot"></span><span>SEC</span></a>
    </nav>
  </header>
  <section class="panel history-panel">
    <div class="section-heading sec-heading">
      <div>
        <h1>SEC</h1>
        <h2>Shooter Experience Card</h2>
      </div>
      <a class="vendor-pill vendor-site-link" href="https://BakerTargets.com" aria-label="Open BakerTargets.com">
        <img src="assets/BAKER_ST_100YD_SMART_AUTHORITY_v1_ORIGINAL.png" alt="" />
        <span>BakerTargets.com</span>
      </a>
      <button class="vendor-pill save-page-button" type="button" id="saveSecPage">Save This Page</button>
    </div>
    <div class="history-list" id="historyList"></div>
  </section>
</main>
<script src="app_state.js"></script>
<script src="ops.js?v=ops-v3-0623"></script>
<script>
const historyList = document.getElementById("historyList");

function cleanDateTime(value) {
  const date = value ? new Date(value) : new Date();
  return date.toLocaleString(undefined, {
    month: "short",
    day: "numeric",
    year: "numeric",
    hour: "numeric",
    minute: "2-digit"
  });
}

function cleanSetupValue(value) {
  return /^(Select Manufacturer|Select Model Type|Select Model Caliber|Select Caliber|Select Load|Select Grain)$/i.test(value || "") ? "" : value;
}

function compactClick(value, axis) {
  if (!value) return "--";
  const amount = String(value).match(/\d+/)?.[0] || "0";
  const upper = String(value).toUpperCase();
  if (axis === "elevation") {
    if (upper.includes("UP")) return `${amount}↑`;
    if (upper.includes("DOWN")) return `${amount}↓`;
  }
  if (axis === "windage") {
    if (upper.includes("RIGHT")) return `${amount}→`;
    if (upper.includes("LEFT")) return `${amount}←`;
  }
  return amount;
}

function distanceDisplay(session) {
  if (session.targetDistanceValue) {
    return `${session.targetDistanceValue} ${session.targetDistanceUnit === "M" ? "m" : "yds"}`;
  }
  return session.targetDistance || session.distance || "100 yds";
}

function scoreClass(score) {
  const numeric = Number(score);
  if (!Number.isFinite(numeric)) return "score-pending";
  if (numeric >= 90) return "score-green";
  if (numeric >= 80) return "score-yellow";
  if (numeric >= 70) return "score-orange";
  return "score-red";
}

function authorityScoreValue(pkg) {
  const score = pkg && pkg.score;
  const value = score && typeof score === "object" ? score.value : score;
  return Number.isFinite(Number(value)) ? Number(value) : null;
}

function authorityPackage(session) {
  return session && (session.ugeoAuthorityPackage || session.backendAuthorityPackage) || null;
}

function authorityPoint(point) {
  return SCZN3M4.UGEO.normalizePoint(point);
}

function markerHtml(className, point, content = "", attrs = "") {
  const safe = authorityPoint(point);
  if (!safe) return "";
  return `<span class="${className}" style="left:${safe.xPercent}%;top:${safe.yPercent}%"${attrs ? ` ${attrs}` : ""}>${content}</span>`;
}

function authorityVisual(session) {
  const pkg = authorityPackage(session);
  if (!pkg || !pkg.renderCoordinates) return "";
  const render = pkg.renderCoordinates;
  const parts = [];
  (render.impacts || []).forEach((point, index) => {
    parts.push(markerHtml("history-thumb-impact", point, String(index + 1)));
  });
  parts.push(markerHtml("aim-arrow", render.aim, ""));
  parts.push(markerHtml("poib-dot", render.poib, "<span></span>"));
  return parts.join("");
}

function syncSecEvidenceLayers() {
  document.querySelectorAll(".history-thumb").forEach((frame) => {
    const image = frame.querySelector("img");
    const layer = frame.querySelector(".history-evidence-layer");
    SCZN3M4.UGEO.syncEvidenceLayerToImage(layer, image, frame);
  });
}

function attributionLine(snapshot) {
  const parts = [
    ["Shooter", snapshot.shooterName],
    ["Unit", snapshot.unit],
    ["Agency", snapshot.agency],
    ["Instructor", snapshot.instructor]
  ]
    .filter(([, value]) => value)
    .map(([label, value]) => `${label}: ${value}`);
  return parts.length ? `<div class="sec-attribution-line">${parts.join(" | ")}</div>` : "";
}

function poibDisplay(pkg) {
  const correction = pkg && pkg.correction;
  if (!correction || !Number.isFinite(Number(correction.xInches)) || !Number.isFinite(Number(correction.yInches))) return "";
  const x = Number(correction.xInches);
  const y = Number(correction.yInches);
  const windage = Math.abs(x) < 0.05 ? "Centered" : `${Math.abs(x).toFixed(1)}\" ${x > 0 ? "Right" : "Left"}`;
  const elevation = Math.abs(y) < 0.05 ? "Centered" : `${Math.abs(y).toFixed(1)}\" ${y > 0 ? "Low" : "High"}`;
  if (windage === "Centered" && elevation === "Centered") return "Centered";
  if (windage === "Centered") return elevation;
  if (elevation === "Centered") return windage;
  return `${elevation}, ${windage}`;
}

function authorityDetailLine(pkg) {
  if (!pkg) return "";
  const parts = [];
  if (pkg.group && pkg.group.display) parts.push(`Group: ${pkg.group.display}`);
  const poib = poibDisplay(pkg);
  if (poib) parts.push(`POIB: ${poib}`);
  return parts.length ? `<div class="sec-authority-detail">${parts.join(" | ")}</div>` : "";
}

function renderHistory() {
  const sessions = SCZN3M4.getSessionHistory().slice()
    .filter(session => session && session.savedToSEC === true)
    .sort((a, b) => {
      const timeDelta = new Date(b.timestamp || 0) - new Date(a.timestamp || 0);
      if (timeDelta) return timeDelta;
      return Number(b.sessionNumber || 0) - Number(a.sessionNumber || 0);
    }).slice(0, 10);
  if (!sessions.length) {
    historyList.innerHTML = `<article class="history-card empty-state"><strong>No saved Shooter Experience Cards yet.</strong><span>Save a completed session from Target to create a Baker SEC record.</span></article>`;
    return;
  }

  historyList.innerHTML = sessions.map((session, index) => {
    const snapshot = session.matrixSnapshot || {};
    const evidence = session.targetEvidenceImage;
    const pkg = authorityPackage(session);
    const hasAuthority = !!(pkg && pkg.status);
    const shotCount = hasAuthority ? Number(pkg.status.impactCount || 0) : 0;
    const score = hasAuthority ? authorityScoreValue(pkg) : null;
    const weapon = [snapshot.weaponCategory, snapshot.weaponManufacturer, snapshot.weaponModelType, snapshot.weaponModelCaliber].map(cleanSetupValue).filter(Boolean).join(" / ") || snapshot.rifle;
    const optic = [snapshot.opticType, snapshot.opticBrand, snapshot.opticModel, snapshot.magnification].map(cleanSetupValue).filter(Boolean).join(" / ");
    const ammo = [snapshot.ammoCaliber, snapshot.ammoManufacturer, snapshot.ammoLoad, snapshot.bulletWeight].map(cleanSetupValue).filter(Boolean).join(" / ");
    const correction = hasAuthority ? (pkg.correction || {}) : {};
    const clicks = hasAuthority ? { ...(pkg.clicks || {}), elevation: correction.elevation, windage: correction.windage } : {};
    const thumbnail = evidence && evidence.dataUrl ? evidence.dataUrl : "assets/BAKER_ST_100YD_SMART_AUTHORITY_v1_ORIGINAL.png";
    const scorePill = score !== null ? `<span class="sec-score ${scoreClass(score)}">SCORE <strong>${score}</strong></span>` : "";
    const authorityMessage = hasAuthority ? "" : `<div class="sec-authority-missing">Backend authority package unavailable.</div>`;
    const hashLine = hasAuthority && pkg.evidenceHash ? `<div class="sec-authority-hash">Evidence: ${pkg.evidenceHash.slice(0, 12)}</div>` : "";
    return `
      <article class="history-card" data-session-id="${session.sessionId}">
          <div class="history-thumb">
            <img src="${thumbnail}" alt="Uploaded target evidence thumbnail" />
            <div class="history-evidence-layer">${authorityVisual(session)}</div>
          </div>
        <div class="history-copy">
          <div class="history-title">
            <strong>Session #${index + 1}</strong>
            <span>${cleanDateTime(session.timestamp)}</span>
          </div>
          <div class="sec-setup-line">${[weapon, optic, ammo].filter(Boolean).join(" | ") || "--"}</div>
          ${attributionLine(snapshot)}
          ${authorityMessage}
          ${hasAuthority ? authorityDetailLine(pkg) : ""}
          <div class="sec-intel-pill">
            <span>${distanceDisplay(session)}</span>
            ${scorePill}
            <span class="sec-clicks"><strong>${compactClick(clicks.elevation, "elevation")}</strong><em>CLICKS</em><strong>${compactClick(clicks.windage, "windage")}</strong></span>
            <span>${shotCount} Hits</span>
          </div>
          ${hashLine}
        </div>
      </article>
    `;
  }).join("");
  requestAnimationFrame(syncSecEvidenceLayers);
}

renderHistory();
window.addEventListener("resize", syncSecEvidenceLayers);
document.getElementById("saveSecPage").addEventListener("click", saveSecPageImage);

function saveSecPageImage() {
  const target = document.querySelector(".history-panel");
  const width = Math.ceil(target.scrollWidth);
  const height = Math.ceil(target.scrollHeight);
  const styles = Array.from(document.styleSheets)
    .map(sheet => {
      try {
        return Array.from(sheet.cssRules).map(rule => rule.cssText).join("\n");
      } catch (error) {
        return "";
      }
    })
    .join("\n");
  const clone = target.cloneNode(true);
  const svg = `
    <svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}">
      <foreignObject width="100%" height="100%">
        <div xmlns="http://www.w3.org/1999/xhtml">
          <style>${styles}</style>
          ${clone.outerHTML}
        </div>
      </foreignObject>
    </svg>`;
  const image = new Image();
  image.onload = () => {
    const canvas = document.createElement("canvas");
    canvas.width = width;
    canvas.height = height;
    const context = canvas.getContext("2d");
    context.fillStyle = "#eadbbd";
    context.fillRect(0, 0, width, height);
    context.drawImage(image, 0, 0);
    const link = document.createElement("a");
    link.download = `SEC-${new Date().toISOString().slice(0, 10)}.png`;
    link.href = canvas.toDataURL("image/png");
    link.click();
    URL.revokeObjectURL(image.src);
  };
  image.src = URL.createObjectURL(new Blob([svg], { type: "image/svg+xml;charset=utf-8" }));
}
</script>
</body>
</html>
