<script>
const historyList = document.getElementById("historyList");

function cleanDateTime(value) {
  const date = value ? new Date(value) : new Date();
  return date.toLocaleString(undefined, {
    month: "short",
    day: "numeric",
    year: "numeric",
    hour: "numeric",
    minute: "2-digit"
  });
}

function cleanSetupValue(value) {
  return /^(Select Manufacturer|Select Model Type|Select Model Caliber|Select Caliber|Select Load|Select Grain)$/i.test(value || "") ? "" : value;
}

function compactClick(value, axis) {
  if (!value) return "--";
  const amount = String(value).match(/\d+/)?.[0] || "0";
  const upper = String(value).toUpperCase();
  if (axis === "elevation") {
    if (upper.includes("UP")) return `${amount}↑`;
    if (upper.includes("DOWN")) return `${amount}↓`;
  }
  if (axis === "windage") {
    if (upper.includes("RIGHT")) return `${amount}→`;
    if (upper.includes("LEFT")) return `${amount}←`;
  }
  return amount;
}

function distanceDisplay(session) {
  if (session.targetDistanceValue) {
    return `${session.targetDistanceValue} ${session.targetDistanceUnit === "M" ? "m" : "yds"}`;
  }
  return session.targetDistance || session.distance || "100 yds";
}

function scoreClass(score) {
  const numeric = Number(score);
  if (!Number.isFinite(numeric)) return "score-pending";
  if (numeric >= 90) return "score-green";
  if (numeric >= 80) return "score-yellow";
  if (numeric >= 70) return "score-orange";
  return "score-red";
}

function authorityScoreValue(pkg) {
  const score = pkg && pkg.score;
  const value = score && typeof score === "object" ? score.value : score;
  return Number.isFinite(Number(value)) ? Number(value) : null;
}

function authorityPackage(session) {
  return session && (session.ugeoAuthorityPackage || session.backendAuthorityPackage) || null;
}

function escapeHtml(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function isDotTortureTrainingPackage(pkg) {
  if (!pkg) return false;
  const missionFamily = String(pkg.mission_family || pkg.missionFamily || pkg.missionFamilyId || "");
  const missionName = String(pkg.mission_name || pkg.missionName || "");
  const missionGroup = String(pkg.mission_group || pkg.missionGroup || "");
  const secTemplate = String(pkg.sec_template || pkg.secTemplate || "");
  return missionFamily === "marksmanshipTraining"
    && secTemplate === "trainingSEC"
    && (
      missionGroup === "dotTortureFamily"
      || missionName === "dotTorture"
      || missionName === "dotTortureStandard"
      || missionName === "dotTortureLite"
      || missionName === "revolvingDotTorture"
    );
}

function isGssfAuthorityPackage(pkg) {
  if (!pkg || typeof pkg !== "object") return false;
  if (pkg.ok !== true || pkg.status !== "calculated") return false;
  if (pkg.target_profile_id !== "gssf_ac_1" || pkg.mission_family !== "gssf") return false;
  if (pkg.resultPackageType !== "gssfPaperPenaltyResult" || pkg.resultSource !== "backend") return false;
  if (typeof pkg.totalPaperPenaltySeconds !== "number" || !Number.isFinite(pkg.totalPaperPenaltySeconds) || pkg.totalPaperPenaltySeconds < 0) return false;
  const breakdown = pkg.scoringBreakdown;
  if (!Array.isArray(breakdown) || breakdown.length !== 4) return false;
  const expectedZones = new Set(["downZero", "plusOne", "plusThree", "miss"]);
  const seenZones = new Set();
  const seenShotIds = new Set();
  for (const bucket of breakdown) {
    if (!bucket || typeof bucket !== "object" || !expectedZones.has(bucket.zone) || seenZones.has(bucket.zone)) return false;
    if (typeof bucket.count !== "number" || !Number.isFinite(bucket.count) || !Number.isInteger(bucket.count) || bucket.count < 0) return false;
    if (typeof bucket.penaltySecondsPerHit !== "number" || !Number.isFinite(bucket.penaltySecondsPerHit)) return false;
    if (typeof bucket.subtotalPenaltySeconds !== "number" || !Number.isFinite(bucket.subtotalPenaltySeconds)) return false;
    if (!Array.isArray(bucket.shotIds) || bucket.shotIds.length !== bucket.count) return false;
    for (const shotId of bucket.shotIds) {
      if (typeof shotId !== "number" || !Number.isFinite(shotId) || !Number.isInteger(shotId) || shotId < 1 || seenShotIds.has(shotId)) return false;
      seenShotIds.add(shotId);
    }
    seenZones.add(bucket.zone);
  }
  return seenZones.size === expectedZones.size;
}

function hasGssfAuthorityIdentity(pkg) {
  return !!(pkg && (
    pkg.target_profile_id === "gssf_ac_1"
    || pkg.mission_family === "gssf"
    || pkg.resultPackageType === "gssfPaperPenaltyResult"
  ));
}

function backendHitClassifications(pkg) {
  return Array.isArray(pkg && pkg.hitClassifications) ? pkg.hitClassifications : [];
}

function gssfZoneTone(zone) {
  const normalized = String(zone || "").trim().toLowerCase().replace(/[\s_-]+/g, "");
  if (normalized === "downzero" || normalized === "0") return "down-zero";
  if (normalized === "plusone" || normalized === "+1" || normalized === "1") return "plus-one";
  if (normalized === "plusthree" || normalized === "+3" || normalized === "3") return "plus-three";
  if (normalized === "miss") return "miss";
  return "other";
}

function gssfBucketDefinitions() {
  return [
    { id: "down-zero", zone: "downZero", label: "Down Zero" },
    { id: "plus-one", zone: "plusOne", label: "+1" },
    { id: "plus-three", zone: "plusThree", label: "+3" },
    { id: "miss", zone: "miss", label: "Miss / Other" }
  ];
}

function gssfAuthoritativeBreakdown(pkg) {
  if (!isGssfAuthorityPackage(pkg)) return [];
  const breakdownByZone = new Map(pkg.scoringBreakdown.map(bucket => [bucket.zone, bucket]));
  return gssfBucketDefinitions().map(bucket => ({ ...bucket, source: breakdownByZone.get(bucket.zone) }));
}

function gssfBucketSummaryHtml(pkg) {
  const buckets = gssfAuthoritativeBreakdown(pkg);
  if (!buckets.length) return "";
  return `
    <div class="sec-gssf-rail-shell">
      <button class="sec-gssf-rail-arrow is-previous" type="button" aria-label="Previous scoring zone">‹</button>
      <div class="sec-gssf-bucket-grid" aria-label="Competition paper target scoring buckets">
        ${buckets.map(bucket => {
        const count = Number(bucket.source.count);
        const multiplier = Number(bucket.source.penaltySecondsPerHit);
        const subtotal = Number(bucket.source.subtotalPenaltySeconds);
        const shotIds = bucket.source.shotIds.map(String);
        return `
          <div class="sec-gssf-bucket gssf-zone-card-${bucket.id}">
            <div class="sec-gssf-bucket-head">
              <span><i class="gssf-zone-dot gssf-zone-${bucket.id}"></i>${escapeHtml(bucket.label)}</span>
            </div>
            <em class="sec-gssf-bucket-math"><span>${escapeHtml(count)}</span><i>×</i><span>${escapeHtml(multiplier)}</span><i class="mobile-equals">=</i></em>
            <strong class="sec-gssf-bucket-subtotal"><i class="desktop-equals">=</i>${escapeHtml(`${subtotal} sec`)}</strong>
            <span class="sec-gssf-bucket-rule" aria-hidden="true"></span>
            <b><span>Hits:</span><strong>${escapeHtml(count)}</strong></b>
            <small><span>Shots:</span> <i class="gssf-shot-id-list">${escapeHtml(shotIds.length ? shotIds.join(", ") : "None")}</i></small>
          </div>
        `;
        }).join("")}
      </div>
      <button class="sec-gssf-rail-arrow is-next" type="button" aria-label="Next scoring zone">›</button>
      <div class="sec-gssf-rail-dots" aria-hidden="true">${buckets.map((_, index) => `<i${index === 0 ? ' class="is-active"' : ""}></i>`).join("")}</div>
    </div>
  `;
}

function gssfScoringSourceLine(pkg) {
  const source = String(pkg.resultSource || pkg.scoringSource || pkg.authorityTrace?.source || "backend");
  const packageId = pkg.authorityPackageId || pkg.authorityTrace?.authorityPackageId || pkg.evidenceHash || "";
  return [
    `Scoring source: ${source === "backend" ? "Backend" : source}`,
    packageId ? `Authority package: ${packageId}` : ""
  ].filter(Boolean).join(" | ");
}

function gssfResultLine(pkg, label) {
  const lines = pkg && pkg.display && Array.isArray(pkg.display.resultLines) ? pkg.display.resultLines : [];
  return lines.find(line => String(line).toLowerCase().startsWith(`${label.toLowerCase()}:`)) || "";
}

function gssfFormatSeconds(value) {
  return typeof value === "number" && Number.isFinite(value) ? `${value.toFixed(2)} sec` : "unavailable";
}

function optionalNumber(...values) {
  const value = values.find(item => typeof item === "number" && Number.isFinite(item) && item >= 0);
  return value === undefined ? null : value;
}

function gssfCompetitionRecord(session, pkg) {
  const officialMatchTimeSeconds = optionalNumber(session.officialMatchTimeSeconds, session.gssfOfficialMatchTimeSeconds, session.shotData?.officialMatchTimeSeconds);
  const totalPaperPenaltySeconds = isGssfAuthorityPackage(pkg) ? pkg.totalPaperPenaltySeconds : null;
  const officialFinalScoreSeconds = officialMatchTimeSeconds === null || totalPaperPenaltySeconds === null
    ? null
    : Number((officialMatchTimeSeconds + totalPaperPenaltySeconds).toFixed(2));
  return {
    officialMatchTimeSeconds,
    totalPaperPenaltySeconds,
    officialFinalScoreSeconds,
    finalScoreStatus: totalPaperPenaltySeconds === null
      ? "authority_unavailable"
      : (officialFinalScoreSeconds === null ? "unavailable_without_official_time" : "calculated"),
    manualTimeSource: session.gssfManualTimeSource || session.shotData?.manualTimeSource || "shooter-entered-official-timer",
    scoringSource: session.gssfScoringSource || "backend-penalty-plus-manual-time"
  };
}

function gssfShotClassificationsListHtml(pkg) {
  const classifications = backendHitClassifications(pkg);
  if (!classifications.length) return "";
  return `
    <ol class="sec-gssf-classification-list">
      ${classifications.map(hit => {
        const coordinate = hit.coordinate || {};
        const x = Number.isFinite(Number(coordinate.xPercent)) ? `${Number(coordinate.xPercent).toFixed(2)}%` : "--";
        const y = Number.isFinite(Number(coordinate.yPercent)) ? `${Number(coordinate.yPercent).toFixed(2)}%` : "--";
        const penalty = Number.isFinite(Number(hit.penaltySeconds)) ? `+${hit.penaltySeconds} sec` : "--";
        return `
          <li class="gssf-zone-card-${gssfZoneTone(hit.zone)}">
            <strong>Shot ${escapeHtml(hit.shot || "")}</strong>
            <span>${escapeHtml(hit.zone || "unclassified")}</span>
            <em>${escapeHtml(penalty)}</em>
            <small>${escapeHtml(x)} / ${escapeHtml(y)}</small>
          </li>
        `;
      }).join("")}
    </ol>
  `;
}

function gssfSecValidationDetailsHtml(session, pkg, competition) {
  const evidenceLine = pkg.evidenceHash ? `<div>Evidence ID: ${escapeHtml(pkg.evidenceHash.slice(0, 12))}</div>` : "";
  const classifications = gssfShotClassificationsListHtml(pkg);
  return `
    <details class="sec-gssf-validation-details">
      <summary>Validation</summary>
      <div class="sec-gssf-validation-body">
        <div>${escapeHtml(gssfScoringSourceLine(pkg))}</div>
        <div>Manual time source: ${escapeHtml(competition.manualTimeSource)}</div>
        ${evidenceLine}
        ${classifications ? `<strong>Backend shot classifications</strong>${classifications}` : ""}
      </div>
    </details>
  `;
}

function gssfExportEvidenceMetaHtml(pkg) {
  const trace = pkg && pkg.authorityTrace || {};
  const evidenceId = pkg && pkg.evidenceHash ? String(pkg.evidenceHash).slice(0, 16) : "Unavailable";
  const targetVersion = pkg && pkg.targetProfileVersion || trace.targetProfileVersion || "Unavailable";
  const registrationVersion = trace.registrationPackageVersion || "Unavailable";
  return `
    <section class="sec-gssf-export-evidence-meta" hidden>
      <strong>Verified Evidence</strong>
      <span>Evidence ID: ${escapeHtml(evidenceId)}</span>
      <span>Target version: ${escapeHtml(targetVersion)}</span>
      <span>Registration version: ${escapeHtml(registrationVersion)}</span>
    </section>
  `;
}

function trainingDistanceLabel(distance) {
  if (!distance || typeof distance !== "object") return "Distance unavailable";
  const value = distance.value ?? distance.distance ?? "";
  const unit = distance.unit || distance.units || "";
  return `${value} ${unit}`.trim() || "Distance unavailable";
}

function trainingStageSummary(pkg) {
  const stages = Array.isArray(pkg && pkg.stages) ? pkg.stages : [];
  const totalRounds = pkg && (pkg.total_rounds || pkg.totalRounds) || stages.reduce((sum, stage) => sum + Number(stage.rounds || 0), 0);
  return `${stages.length || 0} stages / ${totalRounds || 0} rounds`;
}

function trainingTimeLabel(pkg) {
  const time = pkg && (pkg.timeSeconds ?? pkg.raw_time_seconds ?? pkg.rawTimeSeconds);
  return Number.isFinite(Number(time)) ? `${Number(time)} sec` : "optional/pending";
}

function trainingStageBreakdownHtml(stageScores) {
  if (!stageScores || !stageScores.length) return "";
  return `
    <div class="training-sec-stage-breakdown">
      ${stageScores
        .sort((a, b) => Number(a.stageIndex) - Number(b.stageIndex))
        .map(stage => `<span>${escapeHtml(stage.label)} <strong>${escapeHtml(stage.score)} / ${escapeHtml(stage.max)}</strong></span>`)
        .join("")}
    </div>
  `;
}

function trainingManualResult(session, pkg) {
  const sec = pkg && pkg.trainingSEC || {};
  return session.trainingManualResult || pkg.trainingManualResult || sec.manualResult || {};
}

function trainingScoreRecord(session) {
  const pkg = authorityPackage(session);
  if (!isDotTortureTrainingPackage(pkg)) return null;
  const sec = pkg.trainingSEC || {};
  const manual = trainingManualResult(session, pkg);
  const maxScore = Number(manual.maxScore ?? pkg.max_score ?? pkg.maxScore ?? sec.scoreMax ?? 50);
  const score = Number(manual.score ?? sec.scoreTotal);
  if (!Number.isFinite(score) || !Number.isFinite(maxScore) || maxScore <= 0) return null;
  const derivedPercentage = (score / maxScore) * 100;
  const percentage = Number(manual.percentage ?? sec.percentage);
  return {
    session,
    pkg,
    groupKey: pkg.target_profile_id || pkg.targetProfileId || pkg.mission_name || pkg.missionName || "dotTortureFamily",
    groupLabel: pkg.target_display_name || pkg.targetDisplayName || pkg.target_name || pkg.targetName || "Dot Torture",
    score,
    maxScore,
    percentage: Number.isFinite(percentage) ? percentage : derivedPercentage,
    stageScores: manual.stageScores || sec.stageScores || [],
    timestamp: new Date(session.timestamp || 0).getTime()
  };
}

function groupTrainingScoreRecords(records) {
  return records.reduce((groups, record) => {
    const key = record.groupKey || "dotTortureFamily";
    const current = groups.get(key) || { label: record.groupLabel || "Dot Torture", records: [] };
    current.records.push(record);
    groups.set(key, current);
    return groups;
  }, new Map());
}

function scoreAverage(records) {
  if (!records.length) return 0;
  return records.reduce((sum, record) => sum + record.score, 0) / records.length;
}

function percentageAverage(records) {
  if (!records.length) return 0;
  return records.reduce((sum, record) => sum + record.percentage, 0) / records.length;
}

function formatTrendNumber(value) {
  const rounded = Math.round(Number(value) * 10) / 10;
  return Number.isInteger(rounded) ? String(rounded) : rounded.toFixed(1);
}

function weakestDotTortureStage(records) {
  const stages = new Map();
  records.forEach(record => {
    (record.stageScores || []).forEach(stage => {
      const score = Number(stage.score);
      const max = Number(stage.max);
      if (!Number.isFinite(score) || !Number.isFinite(max) || max <= 0) return;
      const key = stage.label || `Stage ${stage.stageIndex || stages.size + 1}`;
      const bucket = stages.get(key) || { label: key, totalPercentage: 0, count: 0 };
      bucket.totalPercentage += (score / max) * 100;
      bucket.count += 1;
      stages.set(key, bucket);
    });
  });
  let weakest = null;
  stages.forEach(stage => {
    const average = stage.count ? stage.totalPercentage / stage.count : 100;
    if (!weakest || average < weakest.average) {
      weakest = { label: stage.label, average };
    }
  });
  return weakest ? weakest.label : "Not enough stage data";
}

function renderDotTortureTrendCard(records, label = "Dot Torture") {
  if (!records.length) return "";
  const sorted = records.slice().sort((a, b) => b.timestamp - a.timestamp);
  const last = sorted[0];
  const best = records.reduce((top, record) => record.score > top.score ? record : top, records[0]);
  const bestPercentage = Math.max(...records.map(record => record.percentage));
  const averageScore = scoreAverage(records);
  const averagePercentage = percentageAverage(records);
  const maxScore = last.maxScore || 50;
  return `
    <article class="history-card dot-training-trend-card">
      <div class="dot-training-trend-heading">
        <span>${escapeHtml(label)} Training Trends</span>
        <strong>Keep Improving</strong>
      </div>
      <div class="dot-training-trend-grid">
        <div><span>Sessions</span><strong>${records.length}</strong></div>
        <div><span>Last</span><strong>${formatTrendNumber(last.score)} / ${formatTrendNumber(maxScore)}</strong></div>
        <div><span>Best</span><strong>${formatTrendNumber(best.score)} / ${formatTrendNumber(best.maxScore || maxScore)}</strong></div>
        <div><span>Average</span><strong>${formatTrendNumber(averageScore)} / ${formatTrendNumber(maxScore)}</strong></div>
        <div><span>Best Percentage</span><strong>${formatTrendNumber(bestPercentage)}%</strong></div>
        <div><span>Average Percentage</span><strong>${formatTrendNumber(averagePercentage)}%</strong></div>
        <div><span>Weakest Stage</span><strong>${escapeHtml(weakestDotTortureStage(records))}</strong></div>
      </div>
      <p class="dot-training-trend-message">Training history is building. Keep improving one clean stage at a time.</p>
    </article>
  `;
}

function renderTrainingSecCard(session, index, pkg) {
  const snapshot = session.matrixSnapshot || {};
  const evidence = session.targetEvidenceImage;
  const thumbnail = evidence && evidence.dataUrl ? evidence.dataUrl : "assets/BAKER_ST_100YD_SMART_AUTHORITY_v1_ORIGINAL.png";
  const weaponProfile = window.SCZN3M4 && SCZN3M4.weaponProfileDisplay ? SCZN3M4.weaponProfileDisplay(snapshot) : null;
  const weapon = weaponProfile ? weaponProfile.summary : [snapshot.weaponCategory, snapshot.weaponManufacturer, snapshot.weaponModelType, snapshot.weaponModelCaliber].map(cleanSetupValue).filter(Boolean).join(" / ") || snapshot.rifle;
  const weaponMeta = weaponProfile ? [weaponProfile.frameCategory, weaponProfile.barrelLength, weaponProfile.sightRadius, weaponProfile.variantFlags].filter(Boolean).join(" / ") : "";
  const targetName = pkg.target_name || pkg.targetName || "Dot Torture Training Drill";
  const targetDisplayName = pkg.target_display_name || pkg.targetDisplayName || targetName;
  const sec = pkg.trainingSEC || {};
  const manual = trainingManualResult(session, pkg);
  const maxScore = pkg.max_score || pkg.maxScore || sec.scoreMax || 50;
  const totalRounds = pkg.total_rounds || pkg.totalRounds || 50;
  const distance = sec.distance || pkg.distance || pkg.recommended_distance || pkg.recommendedDistance;
  const stageSummary = trainingStageSummary(pkg);
  const score = manual.score ?? sec.scoreTotal;
  const percentage = manual.percentage ?? sec.percentage;
  const misses = manual.misses ?? sec.missesTotal;
  const time = manual.timeDisplay || sec.timeDisplay || (Number.isFinite(Number(sec.timeSeconds)) ? `${Number(sec.timeSeconds)} sec` : trainingTimeLabel(pkg));
  const scoreDisplay = Number.isFinite(Number(score)) ? `${Number(score)} / ${maxScore}` : "pending/manual";
  const percentageDisplay = percentage !== null && percentage !== undefined && percentage !== "" ? `${percentage}%` : "pending/manual";
  const missesDisplay = misses !== null && misses !== undefined && misses !== "" ? String(misses) : "pending/manual";
  const notesLine = manual.notes ? `<div><span>Notes</span><strong>${escapeHtml(manual.notes)}</strong></div>` : "";
  const stageBreakdown = trainingStageBreakdownHtml(manual.stageScores || sec.stageScores);
  const validationLine = pkg.evidenceHash ? `
    <details class="sec-gssf-validation-details">
      <summary>Validation</summary>
      <div class="sec-gssf-validation-body">
        <div>Evidence ID: ${escapeHtml(pkg.evidenceHash.slice(0, 12))}</div>
      </div>
    </details>
  ` : "";
  return `
    <article class="history-card training-sec-card" data-session-id="${session.sessionId}">
      <div class="history-thumb training-sec-thumb">
        <img src="${thumbnail}" alt="Saved training target evidence" />
      </div>
      <div class="training-sec-card-body">
        <div class="training-sec-card-heading">
          <span>Practice</span>
          <strong>${escapeHtml(targetDisplayName)}</strong>
          <em>${cleanDateTime(session.timestamp)}</em>
        </div>
        <section class="sec-journal-score" aria-label="Saved practice score">
          <span>Final Score</span>
          <strong>${escapeHtml(scoreDisplay)}</strong>
        </section>
        <div class="sec-journal-grid">
          <div><span>Firearm</span><strong>${escapeHtml(weapon || "--")}</strong></div>
          <div><span>Date</span><strong>${escapeHtml(cleanDateTime(session.timestamp))}</strong></div>
          <div><span>Distance</span><strong>${escapeHtml(trainingDistanceLabel(distance))}</strong></div>
          <div><span>Time</span><strong>${escapeHtml(time)}</strong></div>
          ${weaponMeta ? `<div><span>Weapon Details</span><strong>${escapeHtml(weaponMeta)}</strong></div>` : ""}
        </div>
        <div class="training-sec-card-grid">
          <div><span>Target</span><strong>${escapeHtml(targetName)}</strong></div>
          <div><span>Total Rounds</span><strong>${escapeHtml(totalRounds)}</strong></div>
          <div><span>Max Score</span><strong>${escapeHtml(maxScore)}</strong></div>
          <div><span>Percentage</span><strong>${escapeHtml(percentageDisplay)}</strong></div>
          <div><span>Stage Summary</span><strong>${escapeHtml(stageSummary)}</strong></div>
          <div><span>Misses</span><strong>${escapeHtml(missesDisplay)}</strong></div>
          ${notesLine}
        </div>
        ${stageBreakdown}
        ${validationLine}
      </div>
    </article>
  `;
}

function renderGssfSecCard(session, index, pkg) {
  const snapshot = session.matrixSnapshot || {};
  const weaponProfile = window.SCZN3M4 && SCZN3M4.weaponProfileDisplay ? SCZN3M4.weaponProfileDisplay(snapshot) : null;
  const weapon = weaponProfile ? weaponProfile.summary : [snapshot.weaponCategory, snapshot.weaponManufacturer, snapshot.weaponModelType, snapshot.weaponModelCaliber].map(cleanSetupValue).filter(Boolean).join(" / ") || snapshot.rifle || "--";

function gssfCanonicalSavedEvidenceContract() {
  return {
    targetProfileId: "gssf_ac_1",
    targetProfileVersion: "1",
    registrationPackageId: "gssf-ac-1-clean-png-registration-v1",
    registrationPackageVersion: "1",
    targetExecutionContractId: "gssf-ac-1-live-canonical-v1",
    canonicalAssetId: "gssf_ac_1_clean_reference_png_v1",
    canonicalAssetSha256: "e08eb090f31e64a2fd75f6e88b7267ed9798da4eb438322d1dbc8246e362f030",
    coordinateSystemVersion: "gssf-ac-1-canonical-coordinate-system-v1",
    imageWidthPx: 1125,
    imageHeightPx: 1373,
    dataUrl: "assets/gssf_ac_1_clean_reference.png"
  };
}

function hasGssfCanonicalSavedEvidenceAuthority(pkg) {
  if (!isGssfAuthorityPackage(pkg) || pkg.canonicalAssetScoring !== "accepted") return false;
  const expected = gssfCanonicalSavedEvidenceContract();
  const trace = pkg.authorityTrace || {};
  return pkg.targetProfileVersion === expected.targetProfileVersion
    && trace.targetProfileId === expected.targetProfileId
    && trace.targetProfileVersion === expected.targetProfileVersion
    && trace.registrationPackageId === expected.registrationPackageId
    && trace.registrationPackageVersion === expected.registrationPackageVersion
    && trace.targetExecutionContractId === expected.targetExecutionContractId
    && trace.canonicalAssetId === expected.canonicalAssetId
    && trace.canonicalAssetSha256 === expected.canonicalAssetSha256
    && trace.coordinateSystemVersion === expected.coordinateSystemVersion;
}

function gssfSavedEvidenceDataUrl(session, pkg) {
  if (!isGssfAuthorityPackage(pkg)) return null;
  const evidence = session && session.targetEvidenceImage;
  if (!evidence || typeof evidence.dataUrl !== "string") return null;
  const dataUrl = evidence.dataUrl.trim();
  if (evidence.evidenceType === "uploaded-target-image") {
    return /^data:image\/(?:png|jpeg|webp);base64,[a-z0-9+/]+={0,2}$/i.test(dataUrl) ? dataUrl : null;
  }
  if (!hasGssfCanonicalSavedEvidenceAuthority(pkg)) return null;
  const expected = gssfCanonicalSavedEvidenceContract();
  return dataUrl === expected.dataUrl
    && evidence.assetRole === "scorable_canonical_asset"
    && evidence.canonicalAssetId === expected.canonicalAssetId
    && evidence.canonicalAssetSha256 === expected.canonicalAssetSha256
    && evidence.registrationPackageId === expected.registrationPackageId
    && evidence.registrationPackageVersion === expected.registrationPackageVersion
    && evidence.canonicalCoordinateSystemVersion === expected.coordinateSystemVersion
    && evidence.imageWidthPx === expected.imageWidthPx
    && evidence.imageHeightPx === expected.imageHeightPx
    ? dataUrl
    : null;
}

function gssfSavedEvidenceHtml(session, pkg) {
  const dataUrl = gssfSavedEvidenceDataUrl(session, pkg);
  if (!dataUrl) {
    return `
      <div class="history-thumb gssf-sec-thumb is-unavailable" role="status" aria-label="Target image unavailable">
        <div class="sec-authority-missing">Target image unavailable</div>
      </div>
    `;
  }
  return `
    <div class="history-thumb gssf-sec-thumb has-evidence">
      <img src="${escapeHtml(dataUrl)}" alt="Saved scored competition paper target evidence" />
      <div class="history-evidence-layer">${authorityVisual(session)}</div>
    </div>
  `;
}

function authorityPoint(point) {
  return SCZN3M4.UGEO.normalizePoint(point);
}

function markerHtml(className, point, content = "", attrs = "") {
  const safe = authorityPoint(point);
  if (!safe) return "";
  return `<span class="${className}" style="left:${safe.xPercent}%;top:${safe.yPercent}%"${attrs ? ` ${attrs}` : ""}>${content}</span>`;
}

function backendRenderedHitEntries(pkg) {
  const render = pkg && pkg.renderCoordinates ? pkg.renderCoordinates : {};
  const hits = Array.isArray(render.hits) ? render.hits : [];
  const impacts = Array.isArray(render.impacts) ? render.impacts : [];
  return hits.length ? hits : impacts;
}

function backendRenderedHitCoordinates(pkg) {
  return backendRenderedHitEntries(pkg).map(authorityPoint).filter(Boolean);
}

function authorityVisual(session) {
  const pkg = authorityPackage(session);
  if (!pkg || !pkg.renderCoordinates) return "";
  const render = pkg.renderCoordinates;
  const parts = [];
  if (isGssfAuthorityPackage(pkg)) {
    const classifications = backendHitClassifications(pkg);
    backendRenderedHitCoordinates(pkg).forEach((point, index) => {
      const hit = classifications[index] || {};
      const renderedHit = backendRenderedHitEntries(pkg)[index];
      const shotNumber = hit.shot || (renderedHit && renderedHit.shot);
      const zoneClass = `gssf-zone-${gssfZoneTone(hit.zone)}`;
      const label = shotNumber === undefined || shotNumber === null ? "" : String(shotNumber);
      parts.push(markerHtml(`history-thumb-impact history-gssf-impact ${zoneClass}`, point, label, `data-backend-zone="${escapeHtml(hit.zone || "")}"`));
    });
    return parts.join("");
  }
  (render.impacts || []).forEach((point, index) => {
    parts.push(markerHtml("history-thumb-impact", point, String(index + 1)));
  });
  parts.push(markerHtml("aim-arrow", render.aim, ""));
  parts.push(markerHtml("poib-dot", render.poib, "<span></span>"));
  return parts.join("");
}

function syncGssfScoringRails() {
  document.querySelectorAll(".sec-gssf-rail-shell").forEach(shell => {
    if (shell.dataset.ready === "true") return;
    shell.dataset.ready = "true";
    const rail = shell.querySelector(".sec-gssf-bucket-grid");
    const cards = Array.from(rail.querySelectorAll(".sec-gssf-bucket"));
    const dots = Array.from(shell.querySelectorAll(".sec-gssf-rail-dots i"));
    const previous = shell.querySelector(".sec-gssf-rail-arrow.is-previous");
    const next = shell.querySelector(".sec-gssf-rail-arrow.is-next");
    const activeIndex = () => cards.reduce((best, card, index) =>
      Math.abs(card.offsetLeft - rail.scrollLeft) < Math.abs(cards[best].offsetLeft - rail.scrollLeft) ? index : best, 0);
    const update = () => dots.forEach((dot, index) => dot.classList.toggle("is-active", index === activeIndex()));
    const move = direction => {
      const index = Math.max(0, Math.min(cards.length - 1, activeIndex() + direction));
      rail.scrollTo({ left: cards[index].offsetLeft, behavior: "smooth" });
    };
    previous.addEventListener("click", () => move(-1));
    next.addEventListener("click", () => move(1));
    rail.addEventListener("scroll", update, { passive: true });
    update();
  });
}

function attributionLine(snapshot) {
  const parts = [
    ["Shooter", snapshot.shooterName],
    ["Unit", snapshot.unit],
    ["Agency", snapshot.agency],
    ["Instructor", snapshot.instructor]
  ]
    .filter(([, value]) => value)

  return parts.length ? `<div class="sec-attribution-line">${parts.join(" | ")}</div>` : "";
}

function poibDisplay(pkg) {
  const correction = pkg && pkg.correction;
  if (!correction || !Number.isFinite(Number(correction.xInches)) || !Number.isFinite(Number(correction.yInches))) return "";
  const x = Number(correction.xInches);
  const y = Number(correction.yInches);
  const windage = Math.abs(x) < 0.05 ? "Centered" : `${Math.abs(x).toFixed(1)}\" ${x > 0 ? "Right" : "Left"}`;
  const elevation = Math.abs(y) < 0.05 ? "Centered" : `${Math.abs(y).toFixed(1)}\" ${y > 0 ? "Low" : "High"}`;
  if (windage === "Centered" && elevation === "Centered") return "Centered";
  if (windage === "Centered") return elevation;
  if (elevation === "Centered") return windage;
  return `${elevation}, ${windage}`;
}

function authorityDetailLine(pkg) {
  if (!pkg) return "";
  const parts = [];
  if (pkg.group && pkg.group.display) parts.push(`Group: ${pkg.group.display}`);
  const poib = poibDisplay(pkg);
  if (poib) parts.push(`POIB: ${poib}`);
  return parts.length ? `<div class="sec-authority-detail">${parts.join(" | ")}</div>` : "";
}

function renderHistory() {
  const savedSessions = SCZN3M4.getSessionHistory().slice()
    .filter(session => session && session.savedToSEC === true)
    .sort((a, b) => {
      const timeDelta = new Date(b.timestamp || 0) - new Date(a.timestamp || 0);
      if (timeDelta) return timeDelta;
      return Number(b.sessionNumber || 0) - Number(a.sessionNumber || 0);
    });
  const sessions = savedSessions.slice(0, 10);
  if (!sessions.length) {
    document.body.dataset.secState = "empty";
    historyList.innerHTML = `<article class="history-card empty-state"><strong>No saved Shooter Experience Cards yet.</strong><span>Save a completed session from Target to create your next SEC record.</span></article>`;
    return;
  }
  document.body.dataset.secState = "saved";

  const trainingRecords = savedSessions.map(trainingScoreRecord).filter(Boolean);
  const dotTortureTrendCard = Array.from(groupTrainingScoreRecords(trainingRecords).values())
    .map(group => renderDotTortureTrendCard(group.records, group.label))
    .join("");
  historyList.innerHTML = dotTortureTrendCard + sessions.map((session, index) => {
    const snapshot = session.matrixSnapshot || {};
    const evidence = session.targetEvidenceImage;
    const pkg = authorityPackage(session);
    if (isDotTortureTrainingPackage(pkg)) {
      return renderTrainingSecCard(session, index, pkg);
    }
    if (isGssfAuthorityPackage(pkg)) {
      return renderGssfSecCard(session, index, pkg);
    }
    if (hasGssfAuthorityIdentity(pkg)) {
      return renderInvalidGssfSecCard(session);
    }
    const hasAuthority = !!(pkg && pkg.status);
    const shotCount = hasAuthority ? Number(pkg.status.impactCount || 0) : 0;
    const score = hasAuthority ? authorityScoreValue(pkg) : null;
    const weaponProfile = window.SCZN3M4 && SCZN3M4.weaponProfileDisplay ? SCZN3M4.weaponProfileDisplay(snapshot) : null;
    const weapon = weaponProfile ? weaponProfile.summary : [snapshot.weaponCategory, snapshot.weaponManufacturer, snapshot.weaponModelType, snapshot.weaponModelCaliber].map(cleanSetupValue).filter(Boolean).join(" / ") || snapshot.rifle;
    const weaponMeta = weaponProfile ? [weaponProfile.frameCategory, weaponProfile.barrelLength, weaponProfile.sightRadius, weaponProfile.variantFlags].filter(Boolean).join(" / ") : "";
    const optic = [snapshot.opticType, snapshot.opticBrand, snapshot.opticModel, snapshot.magnification].map(cleanSetupValue).filter(Boolean).join(" / ");
    const ammo = [snapshot.ammoCaliber, snapshot.ammoManufacturer, snapshot.ammoLoad, snapshot.bulletWeight].map(cleanSetupValue).filter(Boolean).join(" / ");
    const correction = hasAuthority ? (pkg.correction || {}) : {};
    const clicks = hasAuthority ? { ...(pkg.clicks || {}), elevation: correction.elevation, windage: correction.windage } : {};
    const thumbnail = evidence && evidence.dataUrl ? evidence.dataUrl : "assets/BAKER_ST_100YD_SMART_AUTHORITY_v1_ORIGINAL.png";
    const authorityMessage = hasAuthority ? "" : `<div class="sec-authority-missing">Scoring details unavailable.</div>`;
    const scoreDisplay = score !== null ? String(score) : "--";
    const correctionDisplay = [
      compactClick(clicks.elevation, "elevation"),
      compactClick(clicks.windage, "windage")
    ].filter(Boolean).join(" / ") || "--";
    return `
      <article class="history-card zeroing-sec-card" data-session-id="${session.sessionId}">
          <div class="history-thumb">
            <img src="${thumbnail}" alt="Uploaded target evidence thumbnail" />
            <div class="history-evidence-layer">${authorityVisual(session)}</div>
          </div>
        <div class="history-copy">
          <section class="sec-journal-score" aria-label="Saved target score">
            <span>Final Score</span>
            <strong>${escapeHtml(scoreDisplay)}</strong>
          </section>
          <div class="sec-journal-grid">
            <div><span>Firearm</span><strong>${escapeHtml(weapon || "--")}</strong></div>
            <div><span>Date</span><strong>${escapeHtml(cleanDateTime(session.timestamp))}</strong></div>
            <div><span>Distance</span><strong>${escapeHtml(distanceDisplay(session))}</strong></div>
            <div><span>Corrections</span><strong>${escapeHtml(correctionDisplay)}</strong></div>
            <div><span>Hits</span><strong>${escapeHtml(shotCount)}</strong></div>
          </div>
          ${weaponMeta || optic || ammo ? `<div class="sec-setup-line">${[weaponMeta, optic, ammo].filter(Boolean).join(" | ")}</div>` : ""}
          ${attributionLine(snapshot)}
          ${authorityMessage}
          ${hasAuthority ? authorityDetailLine(pkg) : ""}
          ${zeroingValidationDetailsHtml(pkg, hasAuthority)}
        </div>
      </article>
    `;
  }).join("");
  requestAnimationFrame(syncSecEvidenceLayers);
  requestAnimationFrame(syncGssfScoringRails);
}

const GSSF_SEC_EXPORT_WIDTH = 390;

function cloneGssfExportSection(card, selector) {

function gssfExportHeader(pageLabel) {

function buildGssfSecExportPages(card) {
  if (!card || card.dataset.gssfExportReady !== "true") return [];
  const pageOne = document.createElement("article");
  pageOne.className = "gssf-sec-export-page gssf-sec-export-results";
  pageOne.dataset.exportPage = "1";
  pageOne.append(gssfExportHeader("Results"));
  [
    ".sec-gssf-story-result",
    ".sec-gssf-story-explanation",
    ".sec-gssf-story-buckets"
  ].forEach(selector => {
    const section = cloneGssfExportSection(card, selector);
    if (section) pageOne.append(section);
  });

  const pageTwo = document.createElement("article");
  pageTwo.className = "gssf-sec-export-page gssf-sec-export-evidence";
  pageTwo.dataset.exportPage = "2";
  pageTwo.append(gssfExportHeader("Evidence"));
  [
    ".sec-gssf-story-target",
    ".sec-gssf-story-session",

  });
  return [pageOne, pageTwo];
}

function imageDataUrl(image) {
  if (!image || !image.complete || !image.naturalWidth || !image.naturalHeight) return null;
  const canvas = document.createElement("canvas");
  canvas.width = image.naturalWidth;
  canvas.height = image.naturalHeight;
  const context = canvas.getContext("2d");
  context.drawImage(image, 0, 0);
  try {
    return canvas.toDataURL("image/png");
  } catch (error) {
    return null;
  }
}

async function prepareGssfExportPage(page) {
  const images = Array.from(page.querySelectorAll("img"));
  await Promise.all(images.map(image => image.complete
    ? Promise.resolve()
    : new Promise(resolve => {
      image.addEventListener("load", resolve, { once: true });
      image.addEventListener("error", resolve, { once: true });
    })));
  images.forEach(image => {
    const dataUrl = imageDataUrl(image);
    if (dataUrl) image.src = dataUrl;
  });
  page.querySelectorAll(".history-thumb").forEach(frame => {
    const image = frame.querySelector("img");
    const layer = frame.querySelector(".history-evidence-layer");
    SCZN3M4.UGEO.syncEvidenceLayerToImage(layer, image, frame);
  });
  await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));
}

function collectedStyles() {
  return Array.from(document.styleSheets)
    .map(sheet => {
      try {
        return Array.from(sheet.cssRules).map(rule => rule.cssText).join("\n");
      } catch (error) {
        return "";
      }
    })
    .join("\n");
}

async function captureSecNode(target, fileName, fixedWidth = null) {
  const width = fixedWidth || Math.ceil(target.scrollWidth);
  const height = Math.ceil(target.scrollHeight);
  const styles = collectedStyles();
  const clone = target.cloneNode(true);
  const svg = `
    <svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}">
      <foreignObject width="100%" height="100%">
        <div xmlns="http://www.w3.org/1999/xhtml" class="records-page gssf-sec-export-canvas">
          <style>${styles}</style>
          ${clone.outerHTML}
        </div>
      </foreignObject>
    </svg>`;
  const image = new Image();
  await new Promise((resolve, reject) => {
    image.onload = resolve;
    image.onerror = reject;
    image.src = URL.createObjectURL(new Blob([svg], { type: "image/svg+xml;charset=utf-8" }));
  });
  const scale = 2;
  const canvas = document.createElement("canvas");
  canvas.width = width * scale;
  canvas.height = height * scale;
  const context = canvas.getContext("2d");
  context.scale(scale, scale);
  context.fillStyle = "#070707";
  context.fillRect(0, 0, width, height);
  context.drawImage(image, 0, 0, width, height);
  URL.revokeObjectURL(image.src);
  const blob = await new Promise(resolve => canvas.toBlob(resolve, "image/png"));
  const link = document.createElement("a");
  link.download = fileName;
  link.href = URL.createObjectURL(blob);
  link.click();
  setTimeout(() => URL.revokeObjectURL(link.href), 1000);
}

async function saveGssfSecTwoPageImages(card) {
  const pages = buildGssfSecExportPages(card);
  if (pages.length !== 2) throw new Error("GSSF SEC export requires exactly two pages.");
  const stage = document.createElement("div");
  stage.className = "gssf-sec-export-stage";
  pages.forEach(page => stage.append(page));
  document.body.append(stage);
  try {
    for (const page of pages) await prepareGssfExportPage(page);
    const stamp = new Date().toISOString().slice(0, 10);
    await captureSecNode(pages[0], `SEC-${stamp}-01-results.png`, GSSF_SEC_EXPORT_WIDTH);
    await captureSecNode(pages[1], `SEC-${stamp}-02-evidence.png`, GSSF_SEC_EXPORT_WIDTH);
  } finally {
    stage.remove();
  }
}

async function saveSecPageImage() {
  const gssfCard = document.querySelector('.gssf-sec-card[data-gssf-export-ready="true"]');
  if (gssfCard) {
    await saveGssfSecTwoPageImages(gssfCard);
    return;
  }
  const target = document.querySelector(".history-panel");
  const width = Math.ceil(target.scrollWidth);
  const height = Math.ceil(target.scrollHeight);
  const styles = collectedStyles();
  const clone = target.cloneNode(true);
  const svg = `
    <svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}">
      <foreignObject width="100%" height="100%">
        <div xmlns="http://www.w3.org/1999/xhtml">
          <style>${styles}</style>
          ${clone.outerHTML}
        </div>
      </foreignObject>
    </svg>`;
  const image = new Image();
  image.onload = () => {
    const canvas = document.createElement("canvas");
    canvas.width = width;
    canvas.height = height;
    const context = canvas.getContext("2d");
    context.fillStyle = "#eadbbd";
    context.fillRect(0, 0, width, height);
    context.drawImage(image, 0, 0);
    const link = document.createElement("a");
    link.download = `SEC-${new Date().toISOString().slice(0, 10)}.png`;
    link.href = canvas.toDataURL("image/png");
    link.click();
    URL.revokeObjectURL(image.src);
  };
  image.src = URL.createObjectURL(new Blob([svg], { type: "image/svg+xml;charset=utf-8" }));
}
</script>
</body>
