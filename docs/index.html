<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#06070a" />

  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <title>Tap-n-Score™</title>

  <link rel="stylesheet" href="./styles.css?v=IPAD-FIT-SEC-FULL-1" />
</head>

<body>
  <main class="page">

    <section id="landingView" class="hero" aria-label="Tap-n-Score landing">
      <div class="brandRow">
        <div class="brandTitle">
          <span class="r">TAP</span><span class="w">-N-</span><span class="b">SCORE</span><span class="w">™</span>
        </div>
        <div class="brandSub">After-Shot Intelligence</div>
      </div>

      <div class="heroSECSeal">
        <div class="heroSEC">
          <span class="r">S</span><span class="w">E</span><span class="b">C</span>
        </div>
        <div class="heroSECSub">
          <span><span class="r">S</span>hooter</span>
          <span><span class="w">E</span>xperience</span>
          <span><span class="b">C</span>ard</span>
        </div>
      </div>

      <div class="heroMid">
        <button id="photoBtn" class="heroBtn" type="button">📷 TAP TO ADD TARGET PHOTO</button>
      </div>

      <input id="photoInput" class="fileHidden" type="file" accept="image/*" />
    </section>

    <section id="workspaceView" class="workspace scoreHidden" aria-label="Target workspace">
      <div class="workspaceTop card">
        <div class="cardTitle cardTitleSEC">
          <div class="secTitle">
            <span class="r">T</span><span class="w">ARGET</span>
            <span class="w"> </span>
            <span class="b">WORKSPACE</span>
          </div>
          <div class="secTag">LIVE</div>
        </div>

        <div class="topActionRow" aria-label="Target controls">
          <div class="pill">Shots: <span id="shotCount">0</span>/7</div>
          <button id="backBtn" class="btnSecondary" type="button">Back</button>
          <button id="undoBtn" class="btnSecondary" type="button">Undo</button>
          <button id="clearBtn" class="btnSecondary" type="button">Clear</button>
          <button id="showResultsBtn" class="btnPrimaryTop" type="button">Show Results</button>
        </div>

        <p id="instructionLine" class="instructionLine">Add a target photo.</p>
        <p id="statusLine" class="hint">Add a target photo to begin.</p>
      </div>

      <div id="resultsStage" class="targetStage">
        <div id="targetWrap" class="targetWrap targetWrapFull" aria-label="Target image area">
          <img id="targetImg" alt="Target" draggable="false" />
          <div id="dotsLayer" class="dotsLayer" aria-hidden="true"></div>
          <div id="freezeScrim" class="freezeScrim isHidden" aria-hidden="true"></div>
        </div>
      </div>
    </section>

    <section id="secOverlay" class="secOverlay isHidden" aria-label="SEC overlay">
      <div class="secShell">
        <div class="secShellHeader">
          <div class="secCardTitle">
            <span class="r">S</span><span class="w">E</span><span class="b">C</span>
          </div>

          <div class="secHeaderActions">
            <button id="secBackBtn" class="secBackBtn" type="button">Back</button>
            <button id="saveSecBtn" class="secSaveBtn" type="button">Save</button>
          </div>
        </div>

        <div class="secShellBody">
          <div class="secGrid">
            <div class="secBlock">
              <div class="secLabel">Shots</div>
              <div id="secShotCount" class="secValue">0</div>
            </div>

            <div class="secBlock">
              <div class="secLabel">Status</div>
              <div id="secStatus" class="secValue secValueSm">Ready</div>
            </div>

            <div class="secBlock secBlockWide">
              <div class="secLabel">Windage</div>
              <div id="secWindage" class="secValue secValueSm">—</div>
            </div>

            <div class="secBlock secBlockWide">
              <div class="secLabel">Elevation</div>
              <div id="secElevation" class="secValue secValueSm">—</div>
            </div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <script src="./index.js?v=IPAD-FIT-SEC-FULL-1"></script>
</body>
</html>
