<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#06070a" />
  <title>Page Not Found</title>
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <style>
    body{
      margin:0;
      background:#06070a;
      color:#fff;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    .box{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .card{
      max-width:520px;
      width:100%;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.10);
      border-radius:16px;
      padding:18px 16px;
      box-sizing:border-box;
    }
    .h{
      font-weight:800;
      font-size:20px;
      margin:0 0 6px;
    }
    .p{
      opacity:.85;
      margin:0 0 14px;
      line-height:1.45;
    }
    a{
      color:#8ab4ff;
      text-decoration:none;
      font-weight:700;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="card">
      <p class="h">Page Not Found</p>
      <p class="p">This page could not be found. Sending you back to Tap-n-Score.</p>
      <a href="/">Go to Tap-n-Score</a>
    </div>
  </div>

  <script>
    location.replace("/");
  </script>
</body>
</html>
