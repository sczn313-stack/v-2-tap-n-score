<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#06070a" />
  <title>Page Not Found</title>
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <style>
    body{
      margin:0;
      background:#06070a;
      color:#fff;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    .box{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .card{
      max-width:520px;
      width:100%;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.10);
      border-radius:16px;
      padding:18px 16px;
      box-sizing:border-box;
    }
    .h{
      font-weight:800;
      font-size:20px;
      margin:0 0 6px;
    }
    .p{
      opacity:.85;
      margin:0 0 14px;
      line-height:1.45;
    }
    a{
      color:#8ab4ff;
      text-decoration:none;
      font-weight:700;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="card">
      <p class="h" id="errorTitle">Page Not Found</p>
      <p class="p" id="errorMessage">This page could not be found. Sending you back to Tap-n-Score.</p>
      <a href="/" id="homeLink">Go to Tap-n-Score</a>
    </div>
  </div>

  <script>
    (() => {
      "use strict";
      const match = location.pathname.match(/^\/t\/([^/]+)\/([^/]+)\/?$/);
      if (!match) {
        location.replace("/");
        return;
      }

      const publisherRouteId = decodeURIComponent(match[1]).toLowerCase();
      const productRouteId = decodeURIComponent(match[2]).toLowerCase();
      const local = location.hostname === "localhost" || location.hostname === "127.0.0.1";
      const endpoint = local
        ? "http://127.0.0.1:8098/api/catalog/product-route"
        : "https://sczn3-authoritative-clean.onrender.com/api/catalog/product-route";
      const title = document.getElementById("errorTitle");
      const message = document.getElementById("errorMessage");
      const homeLink = document.getElementById("homeLink");
      title.textContent = "Product unavailable";
      message.textContent = "Resolving the requested product identity…";
      homeLink.hidden = true;

      function refuse(kind, detail) {
        title.textContent = kind === "authority_unavailable"
          ? "Authority unavailable"
          : kind === "product_retired" ? "Product retired" : "Product unavailable";
        message.textContent = detail || "This product is not currently available.";
      }

      function approvedExperienceUrl(value) {
        try {
          const resolved = new URL(value, location.origin);
          return resolved.origin === location.origin
            && resolved.pathname === "/shoot.html"
            && resolved.searchParams.get("target_profile_id") === "gssf_ac_1"
            && resolved.searchParams.get("publisher_route_id") === publisherRouteId
            && resolved.searchParams.get("product_route_id") === productRouteId
            && resolved.searchParams.get("catalog_entry_id") === "gssf-ac1-public-route-v1";
        } catch (_) {
          return false;
        }
      }

      const url = new URL(endpoint);
      url.searchParams.set("publisherRouteId", publisherRouteId);
      url.searchParams.set("productRouteId", productRouteId);
      fetch(url.toString(), { headers: { "Accept": "application/json" }, cache: "no-store" })
        .then(async response => ({ response, payload: await response.json() }))
        .then(({ response, payload }) => {
          const authority = payload && payload.authorityResolution;
          const valid = response.ok
            && payload.ok === true
            && payload.status === "resolved"
            && payload.publisher && payload.publisher.publisherRouteId === publisherRouteId
            && payload.product && payload.product.productRouteId === productRouteId
            && authority && authority.missionFamily === "gssf"
            && authority.targetExecutionContractId === "gssf-ac-1-live-canonical-v1"
            && approvedExperienceUrl(payload.experienceUrl);
          if (valid) {
            location.replace(payload.experienceUrl);
            return;
          }
          refuse(payload && payload.status, payload && payload.reason);
        })
        .catch(() => refuse("authority_unavailable", "Product authority could not be resolved."));
    })();
  </script>
</body>
</html>
